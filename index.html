// 81 FLASHCARDS — per lesson
const AC=[
  // INTRO(8)
  {id:1,lid:"intro",f:"What is Linux?",b:"Free open-source OS kernel by Linus Torvalds (1991). Powers 90%+ of servers, Android, and cloud infrastructure."},
  {id:2,lid:"intro",f:"What is a kernel?",b:"The core of an OS — manages CPU, RAM, hardware. Linux IS the kernel. Distros package it with extra software on top."},
  {id:3,lid:"intro",f:"What is a Linux distro?",b:"A packaged version of Linux with tools, defaults, and a package manager. Ubuntu, Fedora, Debian, Arch are popular examples."},
  {id:4,lid:"intro",f:"What does open-source mean?",b:"Source code is public. Anyone can read, modify, and distribute it. That's why Linux is free and community-powered."},
  {id:5,lid:"intro",cmd:"echo",f:"echo",b:"Echo — prints text to the terminal. echo 'Hi' → Hi. Prints variables too: echo $HOME → /home/alice"},
  {id:6,lid:"intro",cmd:"man",f:"man",b:"Manual — opens full docs for any command. Press q to quit, / to search, arrows to scroll."},
  {id:7,lid:"intro",f:"What is a shell?",b:"The program that reads and runs your commands. Bash (Bourne Again Shell) is the default shell in most Linux systems."},
  {id:8,lid:"intro",f:"What is Bash?",b:"Bourne Again Shell — the default command interpreter. When you open a terminal, you're interacting with Bash."},
  // TERMINAL(8)
  {id:9,lid:"terminal",f:"What does $ in the prompt mean?",b:"You're a regular user (not root). # means root/admin. Never work as root by default — mistakes can destroy the system."},
  {id:10,lid:"terminal",f:"What does ~ in the prompt mean?",b:"Your home directory. alice@ubuntu:~$ means Alice is currently in /home/alice. ~ expands to your home path everywhere."},
  {id:11,lid:"terminal",f:"What does Ctrl+C do?",b:"Sends SIGINT to stop the running command. Use it when a command is stuck, running too long, or you want to cancel."},
  {id:12,lid:"terminal",f:"What does Tab do?",b:"Auto-completes commands and paths. 'cd Doc' + Tab → 'cd Documents'. Double-Tab shows all available matches."},
  {id:13,lid:"terminal",f:"What does Ctrl+L do?",b:"Clears the terminal screen. Same as typing 'clear'. History is still accessible with the ↑ arrow key."},
  {id:14,lid:"terminal",f:"How do you scroll command history?",b:"↑ goes back through previous commands. ↓ goes forward. Ctrl+R searches history interactively by keyword."},
  {id:15,lid:"terminal",f:"What is a command flag/option?",b:"A modifier starting with - that changes behavior. ls -l shows detail, ls -a shows hidden files, ls -la both."},
  {id:16,lid:"terminal",f:"What do Ctrl+A and Ctrl+E do?",b:"Ctrl+A jumps to the start of the line. Ctrl+E jumps to the end. Essential for editing long commands."},
  // FILESYSTEM(9)
  {id:17,lid:"filesystem",f:"What is / (root directory)?",b:"The top of the entire Linux filesystem tree. Every file and folder lives under /. You cannot navigate above it."},
  {id:18,lid:"filesystem",f:"What is /home?",b:"The resident floor — personal directories for each user. /home/alice belongs to Alice, /home/bob to Bob."},
  {id:19,lid:"filesystem",f:"What is /etc?",b:"The admin office — system-wide config files. nginx, SSH, hostname, system users — all configured here."},
  {id:20,lid:"filesystem",f:"What is /bin?",b:"The tool shed — essential commands (ls, cp, cat, rm) for ALL users, available even in emergency recovery mode."},
  {id:21,lid:"filesystem",f:"What is /var?",b:"The mail room — variable data that grows over time. Log files, databases. Check /var/log for system logs."},
  {id:22,lid:"filesystem",f:"What is /tmp?",b:"Lost & found — temporary files cleared every reboot. Programs use it for scratch space. Never store anything important here."},
  {id:23,lid:"filesystem",f:"What is /dev?",b:"Electrical room — device files. /dev/sda = hard drive, /dev/null = black hole, /dev/zero = infinite zeros."},
  {id:24,lid:"filesystem",f:"What is an absolute path?",b:"Starts with / and works from anywhere. /home/alice/notes.txt always points to the same file, regardless of location."},
  {id:25,lid:"filesystem",f:"What is a relative path?",b:"Relative to your current location. If you're in /home/alice, then notes.txt refers to /home/alice/notes.txt."},
  // NAVIGATION(8)
  {id:26,lid:"navigation",cmd:"pwd",f:"pwd",b:"Print Working Directory — shows your exact current location. Run it any time you're disoriented."},
  {id:27,lid:"navigation",cmd:"ls",f:"ls",b:"List — shows files in a directory. -l gives full details. -a shows hidden files. -la shows everything with details."},
  {id:28,lid:"navigation",f:"What does ls -la show?",b:"ALL files including hidden ones (starting with .) with full details: permissions, owner, file size, and modification date."},
  {id:29,lid:"navigation",cmd:"cd",f:"cd",b:"Change Directory — moves you to a folder. cd /etc absolute. cd docs relative. cd ~ home. cd .. parent. cd - back."},
  {id:30,lid:"navigation",f:"What does cd ~ do?",b:"Takes you to your home directory no matter where you are. The fastest way to get home from anywhere."},
  {id:31,lid:"navigation",f:"What does cd .. do?",b:"Goes up one directory level to the parent folder. cd ../.. goes up two levels. .. always means the parent directory."},
  {id:32,lid:"navigation",f:"What does cd - do?",b:"Goes back to your previously visited directory — like a browser back button. Great for toggling between two locations."},
  {id:33,lid:"navigation",f:"What do hidden files start with?",b:"A dot (.) — e.g. .bashrc, .gitconfig, .ssh/. Hidden from regular ls. Use ls -a or ls -la to reveal them."},
  // FILES(10)
  {id:34,lid:"files",cmd:"mkdir",f:"mkdir",b:"Make Directory — creates folders. mkdir -p projects/web/css creates all nested directories at once."},
  {id:35,lid:"files",cmd:"touch",f:"touch",b:"Touch — creates an empty file or updates its timestamp. touch a.txt b.txt creates multiple files at once."},
  {id:36,lid:"files",cmd:"cp",f:"cp",b:"Copy — duplicates files, original stays. cp -r copies entire directories. Check the destination first."},
  {id:37,lid:"files",cmd:"mv",f:"mv",b:"Move — moves OR renames files. mv old.txt new.txt renames. mv file.txt ~/Docs/ moves. No -r needed for directories."},
  {id:38,lid:"files",cmd:"rm",f:"rm",b:"Remove — permanently deletes. NO trash bin. rm -r deletes directories. rm -rf force-deletes with zero confirmation."},
  {id:39,lid:"files",f:"What does rm -rf do?",b:"Force-recursively deletes a directory and ALL contents with no confirmation. Most dangerous command. No undo."},
  {id:40,lid:"files",f:"What does mkdir -p do?",b:"Creates ALL nested parent dirs at once. mkdir -p a/b/c/d creates all four levels. Without -p it fails if parents are missing."},
  {id:41,lid:"files",f:"What does cp -r do?",b:"Copies an entire directory and all contents recursively. Without -r, cp refuses to copy any directory."},
  {id:42,lid:"files",f:"How do you create 3 files at once?",b:"List them after touch: touch a.txt b.txt c.txt — creates all three empty files in one command."},
  {id:43,lid:"files",f:"Difference between cp and mv?",b:"cp duplicates (original stays). mv relocates or renames (original disappears). cp = copy. mv = move/rename."},
  // VIEWING(10)
  {id:44,lid:"viewing",cmd:"cat",f:"cat",b:"Concatenate — prints full file to screen. Best for short files. cat a.txt b.txt > c.txt joins files."},
  {id:45,lid:"viewing",cmd:"less",f:"less",b:"Less Is More — scrollable viewer for large files. q=quit, /=search, arrows=scroll, G=bottom, g=top."},
  {id:46,lid:"viewing",cmd:"head",f:"head",b:"Head — shows first 10 lines by default. head -n 30 shows 30. Good for peeking at file structure."},
  {id:47,lid:"viewing",cmd:"tail",f:"tail",b:"Tail — shows last 10 lines. tail -f follows the file LIVE as new content is written — essential for watching logs."},
  {id:48,lid:"viewing",cmd:"grep",f:"grep",b:"Global Regular Expression Print — searches for patterns. -i case-insensitive, -r recursive, -n line numbers."},
  {id:49,lid:"viewing",f:"What does tail -f do?",b:"Follows a file in real-time, printing new lines as they appear. Run tail -f /var/log/syslog to watch the system log live."},
  {id:50,lid:"viewing",f:"What does grep -i do?",b:"Makes search case-insensitive. grep -i 'error' matches ERROR, Error, error — all treated the same."},
  {id:51,lid:"viewing",f:"What does grep -r do?",b:"Searches recursively through ALL files in a directory. grep -r 'TODO' ./src/ finds 'TODO' in every file."},
  {id:52,lid:"viewing",f:"What does the | (pipe) do?",b:"Passes output of one command as input to the next. cat file.txt | grep 'error' | tail -20 chains three commands."},
  {id:53,lid:"viewing",f:"When to use less vs cat?",b:"cat for short files (prints all). less for large files (scrollable). When in doubt, use less — never floods the terminal."},
  // PERMISSIONS(10)
  {id:54,lid:"permissions",f:"What does -rwxr-xr-- mean?",b:"File type (-), owner (rwx), group (r-x), others (r--). Three groups of 3 permission characters each."},
  {id:55,lid:"permissions",f:"What do r, w, x mean numerically?",b:"r=4, w=2, x=1. Add them: rwx=7, rw-=6, r-x=5, r--=4. This is the octal permission system used by chmod."},
  {id:56,lid:"permissions",cmd:"chmod",f:"chmod",b:"Change Mode — sets permissions. chmod 755 script.sh. chmod +x adds execute. chmod -w removes write."},
  {id:57,lid:"permissions",cmd:"chown",f:"chown",b:"Change Owner — changes who owns a file. chown alice file.txt. chown alice:devs changes BOTH owner and group."},
  {id:58,lid:"permissions",f:"What does 755 mean?",b:"Owner: rwx (7=4+2+1), Group: r-x (5), Others: r-x (5). Standard for scripts and directories."},
  {id:59,lid:"permissions",f:"What does 644 mean?",b:"Owner: rw- (6=4+2), Group: r-- (4), Others: r-- (4). Standard for regular files. Owner writes, others read-only."},
  {id:60,lid:"permissions",f:"What does 600 mean?",b:"Owner: rw- (6), Group: --- (0), Others: --- (0). Owner-only read/write. Standard for SSH keys and secrets."},
  {id:61,lid:"permissions",f:"What does chmod +x do?",b:"Adds execute permission for owner, group, AND others. Makes a script runnable: chmod +x deploy.sh → ./deploy.sh"},
  {id:62,lid:"permissions",f:"What does d mean in ls -la?",b:"d = directory. - = regular file. l = symbolic link. drwxr-xr-x is a directory with 755 permissions."},
  {id:63,lid:"permissions",f:"Why do system files need sudo for chown?",b:"Files in /etc, /bin, /usr belong to root. Only root can change their ownership. sudo temporarily grants that."},
  // PROCESSES(9)
  {id:64,lid:"processes",cmd:"ps",f:"ps",b:"Process Status — lists processes. ps shows yours. ps aux shows ALL processes from ALL users with full detail."},
  {id:65,lid:"processes",f:"What does ps aux show?",b:"ALL processes from ALL users: PID, CPU%, memory%, start time, and the full command that started each process."},
  {id:66,lid:"processes",cmd:"top",f:"top",b:"Table Of Processes — live interactive monitor. q=quit, k=kill by PID, M=sort by memory, P=sort by CPU."},
  {id:67,lid:"processes",cmd:"kill",f:"kill",b:"Kill — sends signal to process by PID. kill 1234 = graceful (SIGTERM). kill -9 1234 = force-kill (SIGKILL)."},
  {id:68,lid:"processes",f:"What is kill -9?",b:"SIGKILL — forces immediate termination. The process can't ignore this. Use when normal kill doesn't work."},
  {id:69,lid:"processes",f:"What is a PID?",b:"Process ID — a unique number for every running process. Use ps aux to find PIDs. kill 1234 stops PID 1234."},
  {id:70,lid:"processes",f:"What does & at end of command do?",b:"Runs the command in the background, freeing the terminal. sleep 60 & starts it and returns prompt immediately."},
  {id:71,lid:"processes",f:"What do jobs, fg, bg do?",b:"jobs = list background jobs. fg 1 = bring job 1 to foreground. bg 1 = push suspended job to background."},
  {id:72,lid:"processes",f:"What does Ctrl+Z do?",b:"Suspends (pauses) the current command without killing it. Use fg to resume in foreground, bg in background."},
  // PACKAGES(9)
  {id:73,lid:"packages",cmd:"sudo",f:"sudo",b:"Superuser Do — temporarily runs a command with root privileges. Root has full system control. Think before using."},
  {id:74,lid:"packages",cmd:"apt",f:"apt",b:"Advanced Package Tool — installs, removes, and manages software on Ubuntu/Debian. Subcommands: install, remove, update, upgrade."},
  {id:75,lid:"packages",f:"What does sudo apt update do?",b:"Refreshes the local package list from internet repos. Does NOT install anything — just downloads the latest catalog."},
  {id:76,lid:"packages",f:"What does sudo apt upgrade do?",b:"Installs all available updates for installed packages. Always run apt update first so it knows what's available."},
  {id:77,lid:"packages",f:"What does sudo apt install X do?",b:"Downloads and installs package X and all its dependencies. sudo apt install nginx installs nginx web server."},
  {id:78,lid:"packages",f:"What does sudo apt remove X do?",b:"Removes package X but keeps config files. Use apt purge X to also delete all config files completely."},
  {id:79,lid:"packages",f:"What does apt search X do?",b:"Searches the package catalog for packages matching X. No sudo needed. Returns matching packages with descriptions."},
  {id:80,lid:"packages",f:"What does && do between commands?",b:"Runs the second command ONLY if the first succeeded. apt update && apt upgrade upgrades only if update worked."},
  {id:81,lid:"packages",f:"How do you check if a package is installed?",b:"apt list --installed | grep packagename. Or: which packagename to see if the command is in your PATH."},
  // INTRO — new cards
  {id:82,lid:"intro",f:"What is GNU/Linux?",b:"GNU provides the tools (ls, grep, bash). Linux provides the kernel. Together they form a complete OS. Linus made the kernel; Stallman made the tools."},
  {id:83,lid:"intro",f:"What is the Linux boot sequence?",b:"BIOS/UEFI → GRUB (bootloader) → Kernel loads → systemd starts (PID 1) → Login shell. Hardware before software, always."},
  {id:84,lid:"intro",f:"What does PID 1 mean?",b:"systemd is always the first process started by the kernel and gets PID 1. Every other process on the system is a child of systemd."},
  {id:85,lid:"intro",f:"Name 3 places Linux runs right now",b:"Web servers (90%+ of the internet), Android phones, AWS/Google Cloud/Azure, the International Space Station, supercomputers."},
  // TERMINAL — new cards
  {id:86,lid:"terminal",f:"What are stdin, stdout, stderr?",b:"stdin (fd 0) = input. stdout (fd 1) = normal output. stderr (fd 2) = error output. By default all connect to your terminal."},
  {id:87,lid:"terminal",f:"What does 2>/dev/null do?",b:"Redirects stderr (file descriptor 2) to /dev/null (the void). Silences error messages so they don't pollute output."},
  {id:88,lid:"terminal",f:"What does && do vs ; between commands?",b:"; always runs both. && runs the second ONLY if the first succeeded (exit code 0). Use && for dependent operations."},
  {id:89,lid:"terminal",f:"What does Ctrl+R do?",b:"Reverse-search command history interactively. Type any keyword and it finds the most recent matching command. Press again to find older ones."},
  // FILESYSTEM — new cards
  {id:90,lid:"filesystem",f:"What is /proc?",b:"A virtual filesystem in RAM (not on disk). The kernel generates it live. cat /proc/cpuinfo shows CPU. /proc/1234/ holds data about PID 1234."},
  {id:91,lid:"filesystem",f:"What is /etc/shadow?",b:"Encrypted password hashes for all users. Root-only access (mode 640). The most sensitive file on the system. /etc/passwd is world-readable but stores only 'x'."},
  {id:92,lid:"filesystem",f:"What does the FHS define?",b:"Filesystem Hierarchy Standard — the rulebook for where everything goes on any Linux system. Why /etc, /var, /bin mean the same thing on every distro."},
  {id:93,lid:"filesystem",f:"Why is /root separate from /home?",b:"/home may live on a separate partition that could fail or be unmounted. /root is on the root partition so the administrator can always log in."},
  // NAVIGATION — new cards
  {id:94,lid:"navigation",cmd:"find",f:"find",b:"Find — searches for files recursively. find / -name 'passwd' searches everywhere. find . -type f -name '*.log' finds all log files here."},
  {id:95,lid:"navigation",f:"What does find -type f vs -type d do?",b:"-type f = files only. -type d = directories only. Without -type, find returns both files and directories matching the name pattern."},
  {id:96,lid:"navigation",f:"What do wildcards * and ? mean?",b:"* = match any number of characters. ? = match exactly one character. ls *.log matches all .log files. ls file?.txt matches file1.txt, fileA.txt, etc."},
  {id:97,lid:"navigation",cmd:"which",f:"which",b:"Which — shows the full path of a command: which ls → /bin/ls. Useful when you have multiple versions of a command installed."},
  // FILES — new cards
  {id:98,lid:"files",f:"What is a symbolic (soft) link?",b:"A pointer file containing a path to another file. Like a shortcut. If the original moves or is deleted, the symlink breaks. Created with ln -s."},
  {id:99,lid:"files",f:"What is a hard link?",b:"Another name for the exact same file data (same inode). Deleting the original doesn't remove the data until ALL hard links are gone. Created with ln."},
  {id:100,lid:"files",cmd:"stat",f:"stat",b:"Status — shows detailed file metadata: exact byte size, inode number, number of links, all three timestamps (access, modify, change)."},
  {id:101,lid:"files",cmd:"file",f:"file",b:"File — detects file type by reading header bytes, not the extension. file mystery_file tells you if it's an ELF binary, ASCII text, JPEG, etc."},
  // VIEWING — new cards
  {id:102,lid:"viewing",cmd:"wc",f:"wc",b:"Word Count — wc -l counts lines, -w counts words, -c counts bytes. cat log | grep error | wc -l counts error lines."},
  {id:103,lid:"viewing",cmd:"sort",f:"sort",b:"Sort — alphabetically sorts lines by default. -n for numeric, -r for reverse, -u to remove duplicates. sort data.txt | uniq -c ranks unique values."},
  {id:104,lid:"viewing",f:"What does > vs >> do for redirection?",b:"> creates/overwrites a file. >> appends to the end without destroying existing content. Always use >> for logs you want to preserve."},
  {id:105,lid:"viewing",cmd:"tee",f:"tee",b:"Tee (like a T-pipe fitting) — splits output to a file AND the terminal simultaneously. cmd | tee output.log shows AND saves at the same time."},
  // PERMISSIONS — new cards
  {id:106,lid:"permissions",f:"What is SUID and why does it matter?",b:"Set User ID — the file runs as its OWNER, not who executes it. /usr/bin/passwd has SUID (owned by root) so normal users can change their own passwords."},
  {id:107,lid:"permissions",f:"What is the sticky bit on a directory?",b:"Only the FILE'S OWNER can delete it, even if others have write access to the directory. /tmp uses this — everyone writes but can't delete each other's files."},
  {id:108,lid:"permissions",f:"What does chmod -R do?",b:"Applies the permission change recursively to a directory and ALL its contents. chmod -R 755 ./public sets 755 on every file and subfolder inside."},
  {id:109,lid:"permissions",f:"Why is 777 dangerous on a server?",b:"rwxrwxrwx = ANY user or process can read, modify, or execute the file. A compromised web process or another user could overwrite your code or configs."},
  // PROCESSES — new cards
  {id:110,lid:"processes",cmd:"systemctl",f:"systemctl",b:"System Control — manages systemd services. start/stop/restart act now. enable/disable controls boot auto-start. status shows state and recent logs."},
  {id:111,lid:"processes",cmd:"journalctl",f:"journalctl",b:"Journal Control — reads the systemd log. -u nginx filters by service. -f follows live. --since '1h ago' limits timeframe."},
  {id:112,lid:"processes",cmd:"lsof",f:"lsof",b:"List Open Files — shows every file and port each process has open. lsof -i :80 finds what's using port 80. lsof -p 1234 shows all files PID 1234 has open."},
  {id:113,lid:"processes",cmd:"pgrep",f:"pgrep",b:"Process Grep — finds PIDs by process name. pgrep nginx returns the PID. kill -9 $(pgrep nginx) finds then kills in one shot."},
  // PACKAGES — new cards
  {id:114,lid:"packages",f:"What does apt purge do vs apt remove?",b:"apt remove uninstalls but keeps config files. apt purge removes everything including configs. Use purge for a clean slate reinstall."},
  {id:115,lid:"packages",f:"What is a repository (repo)?",b:"A server of pre-built software packages. Ubuntu repos at archive.ubuntu.com. apt update downloads their catalog. You can add third-party repos via add-apt-repository."},
  {id:116,lid:"packages",f:"Where do installed binaries go?",b:"Package manager puts them in /usr/bin (commands), /usr/lib (libraries), /etc (configs), /var (data). dpkg tracks exactly what each package owns."},
  {id:117,lid:"packages",f:"What does sudo apt autoremove do?",b:"Removes packages that were installed as dependencies but are no longer needed by any installed package. Frees disk space safely."},
];

// 99 QUIZ QUESTIONS — 8-9 per lesson + 22 full course
const AQ=[
  // INTRO(8)
  {id:1,lid:"intro",t:"mc",q:"Who created the Linux kernel in 1991?",o:["Bill Gates","Linus Torvalds","Steve Wozniak","Dennis Ritchie"],a:1,x:"Linus Torvalds, a Finnish CS student, created Linux in 1991 as a free UNIX-like OS. He still oversees its development today."},
  {id:2,lid:"intro",t:"mc",q:"What is a Linux distribution?",o:["A type of virus","A packaged Linux OS with software, tools, and defaults","A Windows subsystem","A cloud service"],a:1,x:"A distro packages the Linux kernel with a package manager, apps, and defaults. Ubuntu, Fedora, and Debian are popular examples."},
  {id:3,lid:"intro",t:"fill",q:"Print text to the terminal: ___ 'Hello World'",a:"echo",x:"echo (Echo) prints text to the terminal. Also prints variables: echo $HOME → /home/alice, echo $PATH shows search path."},
  {id:4,lid:"intro",t:"fill",q:"Open the manual for ls: ___ ls",a:"man",x:"man (Manual) opens full documentation for any command. Press q to quit, / to search inside, and arrows to scroll."},
  {id:5,lid:"intro",t:"mc",q:"What does open-source mean?",o:["The software costs money","Only creator can modify it","Anyone can read, modify, and distribute the source code","It only runs on Linux"],a:2,x:"Open-source means code is publicly available. Anyone can study, improve, and distribute it. This is why Linux is free and community-driven."},
  {id:6,lid:"intro",t:"rev",q:"What is the core OS component that manages hardware called?",o:["shell","distro","kernel","terminal"],a:2,x:"The kernel is the core — manages CPU, RAM, and all hardware. Linux IS a kernel. Distributions package it with everything else needed."},
  {id:7,lid:"intro",t:"mc",q:"What is Bash?",o:["A Linux distribution","A text editor","The default command-line shell","A programming language"],a:2,x:"Bash (Bourne Again Shell) is the default shell on most Linux systems. It reads and executes commands. Opening a terminal means using Bash."},
  {id:8,lid:"intro",t:"mc",q:"What percentage of web servers run Linux?",o:["About 30%","About 55%","About 75%","Over 90%"],a:3,x:"Linux powers over 90% of web servers. AWS, Google Cloud, and Azure all run Linux. It's the undisputed OS of the internet."},
  // TERMINAL(8)
  {id:9,lid:"terminal",t:"mc",q:"What does $ in alice@ubuntu:~$ mean?",o:["You're in home dir","You're a regular user (not root)","A variable is defined","Shell is loading"],a:1,x:"$ means regular user. # means root (admin). Never work as root by default — one mistake can destroy the entire system."},
  {id:10,lid:"terminal",t:"mc",q:"What does ~ represent in the prompt?",o:["Root /","Whatever dir you're in","Your home directory (e.g. /home/alice)","A hidden folder"],a:2,x:"~ is a shortcut for your home directory. alice@ubuntu:~$ means Alice is in /home/alice. ~ works everywhere: cd ~, ls ~, cp ~/file ."},
  {id:11,lid:"terminal",t:"rev",q:"Which shortcut auto-completes commands and paths?",o:["Enter","Escape","Tab","Ctrl+A"],a:2,x:"Tab auto-completes. Type 'cd Doc' + Tab → 'cd Documents'. Press Tab twice to see all options when there are multiple matches."},
  {id:12,lid:"terminal",t:"mc",q:"What does Ctrl+C do?",o:["Copies text","Stops the running command","Clears the screen","Closes terminal"],a:1,x:"Ctrl+C sends SIGINT to stop the running command. Use when a command hangs, runs too long, or you want to cancel it."},
  {id:13,lid:"terminal",t:"fill",q:"Clear the terminal screen: Ctrl+___",a:"L",x:"Ctrl+L clears the screen — same as typing 'clear'. History is still intact and accessible with the ↑ arrow key."},
  {id:14,lid:"terminal",t:"mc",q:"What is a command flag/option?",o:["A file type","A modifier starting with - that changes behavior","A directory name","An error code"],a:1,x:"Flags modify behavior. ls -l = long format. ls -a = hidden files. ls -la = both. Short flags use -, long flags use --."},
  {id:15,lid:"terminal",t:"mc",q:"How do you navigate command history?",o:["Ctrl+H/L","Page Up/Down","↑ and ↓ arrow keys","Ctrl+P/N"],a:2,x:"↑ and ↓ scroll through previous commands. Ctrl+R searches history interactively — type a keyword to find matching commands."},
  {id:16,lid:"terminal",t:"rev",q:"What does Ctrl+A do when editing a command?",o:["Selects all","Jumps to start of the line","Runs as admin","Auto-completes"],a:1,x:"Ctrl+A jumps to the beginning of the command line. Ctrl+E jumps to the end. Essential for editing long commands without a mouse."},
  // FILESYSTEM(8)
  {id:17,lid:"filesystem",t:"mc",q:"What does the / at the start of a path represent?",o:["Home dir","Division","Root — top of the entire filesystem","A network drive"],a:2,x:"Leading / is root of the filesystem tree. Every absolute path starts here. Linux has one unified hierarchy from /, unlike Windows (C:\\)."},
  {id:18,lid:"filesystem",t:"mc",q:"Which directory contains system configuration files?",o:["/bin","/home","/etc","/usr"],a:2,x:"/etc is the admin office — every program stores system-wide config here. nginx.conf, SSH settings, /etc/hosts all live in /etc."},
  {id:19,lid:"filesystem",t:"fill",q:"Personal home directories live inside: ___",a:"/home",x:"/home contains a personal directory for each user. /home/alice belongs to Alice. cd ~ always takes you to your home directory."},
  {id:20,lid:"filesystem",t:"rev",q:"Which directory contains essential tools like ls, cp, and rm?",o:["/etc","/home","/var","/bin"],a:3,x:"/bin (tool shed) has essential tools available to all users — even in single-user recovery mode when most of the system isn't running."},
  {id:21,lid:"filesystem",t:"mc",q:"Where do log files and runtime data live?",o:["/tmp","/var","/etc","/dev"],a:1,x:"/var (mail room) holds variable data that grows over time — especially /var/log for system and app logs. Check here when troubleshooting."},
  {id:22,lid:"filesystem",t:"mc",q:"Which directory is wiped on every reboot?",o:["/home","/etc","/tmp","/var"],a:2,x:"/tmp holds temporary files deleted on every reboot. Programs use it for scratch space. Never store anything important here."},
  {id:23,lid:"filesystem",t:"fill",q:"An absolute path always starts with: ___",a:"/",x:"All absolute paths start with / (root). /home/alice/notes.txt always points to the same file regardless of your current location."},
  {id:24,lid:"filesystem",t:"mc",q:"What does ~ mean in ~/Documents?",o:["Root /","Current dir","Your home directory","Parent dir"],a:2,x:"~ expands to your home directory. ~/Documents = /home/alice/Documents if you're alice. Works in all commands: cd ~, ls ~."},
  // NAVIGATION(9)
  {id:25,lid:"navigation",t:"fill",q:"Show your exact current path: ___",a:"pwd",x:"pwd (Print Working Directory) shows your exact location. Use it whenever disoriented. First question to ask: 'where am I?'"},
  {id:26,lid:"navigation",t:"mc",q:"Which shows ALL files with full details?",o:["ls","ls -l","ls -a","ls -la"],a:3,x:"ls -la combines -l (long: permissions, owner, size, date) and -a (all files, including hidden ones starting with a dot)."},
  {id:27,lid:"navigation",t:"fill",q:"Move into the 'projects' folder: ___ projects",a:"cd",x:"cd (Change Directory) navigates the filesystem. cd projects moves relatively. cd /etc moves absolutely. cd ~ goes home."},
  {id:28,lid:"navigation",t:"mc",q:"What does cd .. do?",o:["Goes home","Goes to /","Goes up one level to parent dir","Goes back to previous dir"],a:2,x:"cd .. moves up one directory level. cd ../.. goes up two levels. .. always refers to the parent of wherever you currently are."},
  {id:29,lid:"navigation",t:"mc",q:"What does cd ~ do?",o:["Creates a dir","Goes to /","Goes to your home directory","Goes up one level"],a:2,x:"cd ~ takes you directly to your home directory no matter where you are. The fastest way to get home from anywhere."},
  {id:30,lid:"navigation",t:"fill",q:"Go back to the previous directory: cd ___",a:"-",x:"cd - switches back to the last visited directory — like a browser back button. Perfect for toggling between two locations."},
  {id:31,lid:"navigation",t:"rev",q:"Which command shows your exact location in the filesystem?",o:["ls","cd","pwd","mkdir"],a:2,x:"pwd (Print Working Directory) prints your exact current location as an absolute path. The most fundamental navigation command."},
  {id:32,lid:"navigation",t:"mc",q:"What do hidden files start with?",o:["underscore _","dot .","hash #","tilde ~"],a:1,x:"Hidden files start with a dot: .bashrc, .gitconfig, .ssh/. Hidden by default from ls. Use ls -a or ls -la to see them."},
  {id:33,lid:"navigation",t:"fill",q:"Auto-complete paths by pressing the ___ key",a:"Tab",x:"Tab auto-completion is one of Linux's biggest time-savers. Type partial names, press Tab. Double-Tab shows all completions."},
  // FILES(9)
  {id:34,lid:"files",t:"fill",q:"Create a folder named 'docs': ___ docs",a:"mkdir",x:"mkdir (Make Directory) creates folders. mkdir -p creates nested dirs: mkdir -p projects/web/css creates all three levels at once."},
  {id:35,lid:"files",t:"mc",q:"Which command creates an empty file?",o:["create","touch","new","make"],a:1,x:"touch creates empty files or updates timestamps. touch README.md. Or touch a.txt b.txt c.txt to create multiple at once."},
  {id:36,lid:"files",t:"fill",q:"Copy 'report.txt' to 'backup.txt': ___ report.txt backup.txt",a:"cp",x:"cp (Copy) duplicates files — original stays. cp -r copies entire directories. cp file.txt /path/ copies to a different location."},
  {id:37,lid:"files",t:"mc",q:"Which flag is needed to copy an entire directory?",o:["-f","-a","-r","-p"],a:2,x:"cp -r (recursive) is required to copy directories. Without -r, cp refuses and throws an error. -r copies the folder and all contents."},
  {id:38,lid:"files",t:"fill",q:"Rename 'old.txt' to 'new.txt': ___ old.txt new.txt",a:"mv",x:"mv (Move) both moves AND renames files. mv old.txt new.txt renames in place. mv file.txt ~/Docs/ moves to a different location."},
  {id:39,lid:"files",t:"mc",q:"What does rm -rf do?",o:["Refreshes files","Renames forcefully","Force-deletes directory+ALL contents — no confirmation","Copies remotely"],a:2,x:"rm -rf is the most dangerous command in Linux. Recursively force-deletes everything with zero confirmation and no undo. Verify the path always."},
  {id:40,lid:"files",t:"mc",q:"Which flag does mkdir need to create a/b/c all at once?",o:["-r","-f","-p","-n"],a:2,x:"mkdir -p creates all nested directories in one shot. Without -p, mkdir fails if any parent directory doesn't already exist."},
  {id:41,lid:"files",t:"rev",q:"Which command can both move files AND rename them?",o:["cp","mv","rm","touch"],a:1,x:"mv does double duty — moves files between locations and renames them. They're the same operation: changing the file's full path."},
  {id:42,lid:"files",t:"mc",q:"What happens to files deleted with rm?",o:["Go to Trash","Are hidden","Permanently deleted — no recovery","Move to /tmp"],a:2,x:"rm permanently deletes files. There is no Recycle Bin in Linux. Only recovery is from backups. This makes rm -rf extremely dangerous."},
  // VIEWING(9)
  {id:43,lid:"viewing",t:"fill",q:"Display contents of 'notes.txt': ___ notes.txt",a:"cat",x:"cat (Concatenate) prints file contents to screen. Best for short files. For large files use less — cat floods the terminal."},
  {id:44,lid:"viewing",t:"mc",q:"Best command for viewing very large files?",o:["cat","head","less","echo"],a:2,x:"less opens a scrollable viewer. q=quit, /=search, G=bottom. Unlike cat, it doesn't flood the screen. Perfect for large log files."},
  {id:45,lid:"viewing",t:"fill",q:"Show first lines of a file: ___ file.txt",a:"head",x:"head (Head) shows first 10 lines by default. head -n 30 shows 30 lines. Great for peeking at file structure or CSV headers."},
  {id:46,lid:"viewing",t:"fill",q:"Show last lines of a file: ___ file.txt",a:"tail",x:"tail (Tail) shows last 10 lines. tail -f follows the file LIVE in real-time as new content is written — essential for watching logs."},
  {id:47,lid:"viewing",t:"fill",q:"Search for 'error' in 'app.log': ___ 'error' app.log",a:"grep",x:"grep (Global Regular Expression Print) searches for patterns. -i case-insensitive, -r recursive, -n shows line numbers."},
  {id:48,lid:"viewing",t:"mc",q:"What does tail -f do?",o:["Shows first lines","Shows last 10 and exits","Follows file live — shows new lines in real-time","Filters by format"],a:2,x:"tail -f (follow) watches a file and prints new lines as they appear. Run tail -f /var/log/syslog to watch the system log live."},
  {id:49,lid:"viewing",t:"mc",q:"What does grep -i do?",o:["Searches recursively","Shows line numbers","Makes search case-insensitive","Inverts the match"],a:2,x:"grep -i ignores case. grep -i 'error' matches ERROR, Error, error. Often combined: grep -ri for recursive + case-insensitive."},
  {id:50,lid:"viewing",t:"mc",q:"What does the | (pipe) do?",o:["Creates a file","Passes output of one command as input to next","Divides numbers","Shows permissions"],a:1,x:"The pipe chains commands. cat file.txt | grep 'error' | tail -20 finds error lines and shows only the last 20."},
  {id:51,lid:"viewing",t:"rev",q:"Which command lets you scroll a large file with search?",o:["cat","grep","less","head"],a:2,x:"less opens a full-screen interactive viewer. Unlike cat (dumps all) or head/tail (fixed lines), less lets you scroll and search freely."},
  // PERMISSIONS(9)
  {id:52,lid:"permissions",t:"mc",q:"What are the numeric values of r, w, x?",o:["r=1,w=2,x=4","r=4,w=2,x=1","r=3,w=2,x=1","r=4,w=3,x=2"],a:1,x:"r=4, w=2, x=1. Add them: rwx=7, rw-=6, r-x=5, r--=4. This octal system is how chmod numeric notation works."},
  {id:53,lid:"permissions",t:"fill",q:"What single digit represents full rwx access?",a:"7",x:"7 = r(4) + w(2) + x(1). Full access. chmod 755 means owner=7(rwx), group=5(r-x), others=5(r-x). Standard for scripts."},
  {id:54,lid:"permissions",t:"fill",q:"Change permissions: ___ 755 script.sh",a:"chmod",x:"chmod (Change Mode) sets permissions. 755=rwxr-xr-x, 644=rw-r--r--. chmod +x adds execute. chmod -w removes write."},
  {id:55,lid:"permissions",t:"mc",q:"What does permission 644 mean?",o:["Full access for owner+group","Owner rw-, group+others r--","Only owner can read","Everyone can execute"],a:1,x:"644 = rw-r--r--. Owner: rw- (6=4+2). Group: r-- (4). Others: r-- (4). Standard for regular files."},
  {id:56,lid:"permissions",t:"fill",q:"Change owner of 'file.txt' to alice: ___ alice file.txt",a:"chown",x:"chown (Change Owner) changes who owns a file. chown alice:devs changes both owner and group. System files need sudo."},
  {id:57,lid:"permissions",t:"mc",q:"What does chmod +x do?",o:["Removes execute","Adds execute for everyone","Changes owner","Shows permissions"],a:1,x:"chmod +x adds execute for owner, group, AND others. Makes a script runnable: chmod +x deploy.sh → ./deploy.sh"},
  {id:58,lid:"permissions",t:"mc",q:"Which permission is standard for SSH private keys?",o:["755","644","777","600"],a:3,x:"600 = rw------- — only the owner can read and write. SSH refuses to use keys more permissive than 600 for security."},
  {id:59,lid:"permissions",t:"rev",q:"In ls -la, what does 'd' at the start indicate?",o:["Deleted file","Device file","Directory","Daemon"],a:2,x:"First character shows type: d=directory, -=regular file, l=symbolic link. drwxr-xr-x is a directory with 755 permissions."},
  {id:60,lid:"permissions",t:"mc",q:"What does chown alice:devs file.txt do?",o:["Changes to 755","Sets owner=alice AND group=devs","Creates copy","Moves file"],a:1,x:"chown user:group sets both owner and group in one command. Alice becomes the owner, devs becomes the group."},
  // PROCESSES(8)
  {id:61,lid:"processes",t:"fill",q:"List running processes: ___",a:"ps",x:"ps (Process Status) lists processes. ps alone shows yours. ps aux shows ALL processes from all users with full detail."},
  {id:62,lid:"processes",t:"mc",q:"What does ps aux show?",o:["Only your processes","All from all users with PID, CPU, memory, command","Memory only","Services only"],a:1,x:"ps aux: a=all users, u=user format, x=include background. Gets you PID, CPU%, MEM%, and the full launch command."},
  {id:63,lid:"processes",t:"fill",q:"View a live process monitor: ___",a:"top",x:"top (Table Of Processes) shows live updating info. q=quit, k=kill by PID, M=sort by memory, P=sort by CPU."},
  {id:64,lid:"processes",t:"fill",q:"Stop process with PID 1234: ___ 1234",a:"kill",x:"kill sends a signal to a process by PID. Default=SIGTERM (graceful). kill -9 sends SIGKILL (immediate, no cleanup)."},
  {id:65,lid:"processes",t:"mc",q:"What does kill -9 do?",o:["Graceful stop","Kills 9 processes","Forces immediate termination — cannot be ignored","Lists 9 processes"],a:2,x:"kill -9 sends SIGKILL — the process is terminated by the kernel immediately with no chance to clean up or save state."},
  {id:66,lid:"processes",t:"mc",q:"What does & at the end of a command do?",o:["Runs as admin","Runs it twice","Runs in background — frees the terminal","Chains commands"],a:2,x:"& sends the command to the background. sleep 60 & starts and immediately returns the prompt. Use jobs to list, fg to bring forward."},
  {id:67,lid:"processes",t:"fill",q:"List all background jobs: ___",a:"jobs",x:"jobs lists all background jobs in the current terminal session with job numbers and status. Use fg 1 or bg 1 to manage."},
  {id:68,lid:"processes",t:"rev",q:"What command brings a background job to the foreground?",o:["bg","jobs","fg","run"],a:2,x:"fg (foreground) brings a job forward. fg 1 brings job 1. bg pushes a suspended job back to the background."},
  // PACKAGES(9)
  {id:69,lid:"packages",t:"fill",q:"Install vim with admin rights: sudo ___ install vim",a:"apt",x:"apt (Advanced Package Tool) manages software on Ubuntu/Debian. Always use sudo with install, remove, upgrade."},
  {id:70,lid:"packages",t:"fill",q:"Run a command as administrator: ___ apt install vim",a:"sudo",x:"sudo (Superuser Do) temporarily grants root privileges. You'll be prompted for your password. Root has complete system control."},
  {id:71,lid:"packages",t:"mc",q:"What does sudo apt update do?",o:["Installs all updates","Refreshes package list from internet — no installs","Upgrades packages","Removes old packages"],a:1,x:"apt update refreshes your local catalog. Does NOT install anything — just downloads the latest list. Always run before apt upgrade."},
  {id:72,lid:"packages",t:"mc",q:"What does sudo apt upgrade do?",o:["Refreshes list only","Installs all available updates","Searches packages","Removes unused"],a:1,x:"apt upgrade installs all available updates for installed packages. Always run apt update first so it knows what's available."},
  {id:73,lid:"packages",t:"fill",q:"Remove vim: sudo apt ___ vim",a:"remove",x:"apt remove uninstalls a package but keeps config files. Use apt purge to also delete configs. apt autoremove removes unused deps."},
  {id:74,lid:"packages",t:"mc",q:"What does apt search do?",o:["Installs packages","Removes packages","Searches catalog by keyword — no sudo","Updates system"],a:2,x:"apt search finds packages matching a keyword. No sudo needed since it's read-only. apt show packagename gives detailed info."},
  {id:75,lid:"packages",t:"mc",q:"What does && do between two commands?",o:["Always runs both","Runs second only if first succeeded","Runs both at once","Shows both outputs"],a:1,x:"&& = logical AND. apt update && apt upgrade upgrades ONLY if update succeeded. Prevents running when prerequisite fails."},
  {id:76,lid:"packages",t:"rev",q:"Which package manager is used on Ubuntu and Debian?",o:["pacman","dnf","yum","apt"],a:3,x:"apt for Ubuntu/Debian. dnf for Fedora/RHEL. pacman for Arch. yum is the older Fedora manager. Same concept, different names."},
  {id:77,lid:"packages",t:"mc",q:"Why do you need sudo for apt install?",o:["Faster downloads","Installing writes to system dirs — needs root","apt won't run without it","License issues"],a:1,x:"Installing writes to /usr/bin, /usr/lib, and other system directories. These require root permission. sudo temporarily grants that."},
  // PACKAGES — continued
  {id:132,lid:"packages",t:"mc",q:"What does && do between two commands?",o:["Always runs both","Runs second only if first succeeded","Runs both at once","Shows both outputs"],a:1,x:"&& = logical AND. apt update && apt upgrade upgrades ONLY if update succeeded. Prevents running when prerequisite fails."},
  {id:133,lid:"packages",t:"rev",q:"Which package manager is used on Ubuntu and Debian?",o:["pacman","dnf","yum","apt"],a:3,x:"apt for Ubuntu/Debian. dnf for Fedora/RHEL. pacman for Arch. yum is the older Fedora manager. Same concept, different names."},
  {id:134,lid:"packages",t:"mc",q:"Why do you need sudo for apt install?",o:["Faster downloads","Installing writes to system dirs — needs root","apt won't run without it","License issues"],a:1,x:"Installing writes to /usr/bin, /usr/lib, and other system directories. These require root permission. sudo temporarily grants that."}, 
  // NEW INTRO questions
  {id:100,lid:"intro",t:"mc",q:"What is the correct Linux boot sequence?",o:["Kernel → GRUB → BIOS → systemd","BIOS/UEFI → GRUB → Kernel → systemd","systemd → Kernel → GRUB → BIOS","GRUB → BIOS → systemd → Kernel"],a:1,x:"BIOS checks hardware → GRUB loads the kernel from disk → Kernel initialises hardware → systemd (PID 1) starts all services. Hardware always before software."},
  {id:101,lid:"intro",t:"fill",q:"The ancestor of all processes on a Linux system is ___",a:"systemd",x:"systemd is started by the kernel and given PID 1. Every other process is a child or grandchild of systemd. On older systems, /sbin/init filled this role."},
  {id:102,lid:"intro",t:"mc",q:"What does GNU provide in GNU/Linux?",o:["The kernel","The hardware drivers","The userland tools: ls, grep, bash, cat","The bootloader"],a:2,x:"Linux is the kernel (written by Torvalds). GNU (Stallman) provides the tools you use daily: ls, grep, cp, awk, bash, etc. Together they form a complete OS."},
  {id:103,lid:"intro",t:"mc",q:"Which distro family uses dnf as its package manager?",o:["Debian/Ubuntu","Arch","Red Hat/Fedora/Rocky","Alpine"],a:2,x:"Red Hat family (RHEL, Fedora, Rocky, AlmaLinux) uses dnf. Debian family uses apt. Arch uses pacman. All do the same job — install, update, remove packages."},
  // NEW TERMINAL questions
  {id:104,lid:"terminal",t:"mc",q:"What is stderr and how do you redirect it?",o:["Normal output — redirect with >","Input stream — redirect with <","Error output — redirect with 2>","Background output — redirect with &"],a:2,x:"stderr is file descriptor 2. ls /fake 2>/dev/null silences the error. 2>&1 merges stderr into stdout. This is essential for scripts that should run silently."},
  {id:105,lid:"terminal",t:"fill",q:"Search command history interactively: Ctrl+___",a:"R",x:"Ctrl+R enters reverse-search mode. Type any keyword from a past command and it finds the most recent match. Press Ctrl+R again to cycle through older matches."},
  {id:106,lid:"terminal",t:"mc",q:"What does cmd1 || cmd2 mean?",o:["Run both always","Run cmd2 only if cmd1 succeeded","Run cmd2 only if cmd1 FAILED","Run both in parallel"],a:2,x:"|| = OR. cmd2 runs only if cmd1 failed (non-zero exit code). Useful for fallbacks: mkdir logs || echo 'already exists'. Compare with && which requires success."},
  {id:107,lid:"terminal",t:"rev",q:"Which shortcut deletes from the cursor to the end of line?",o:["Ctrl+W","Ctrl+A","Ctrl+K","Ctrl+E"],a:2,x:"Ctrl+K cuts from cursor to end of line. Ctrl+W deletes the word before cursor. Ctrl+A goes to start. Ctrl+E goes to end. These save huge time editing long commands."},
  // NEW FILESYSTEM questions
  {id:108,lid:"filesystem",t:"mc",q:"Which file contains encrypted user password hashes?",o:["/etc/passwd","/etc/shadow","/etc/users","/var/passwords"],a:1,x:"/etc/shadow stores hashed passwords and is root-readable only (mode 640). /etc/passwd is world-readable but only contains 'x' as a placeholder."},
  {id:109,lid:"filesystem",t:"fill",q:"/proc is not on disk — it's a ___ filesystem generated by the kernel in RAM",a:"virtual",x:"/proc is a virtual filesystem. The kernel generates its contents dynamically. Reading /proc/cpuinfo reads live CPU data. Nothing in /proc is stored on your hard drive."},
  {id:110,lid:"filesystem",t:"mc",q:"What is the FHS?",o:["Fast Hash System","Filesystem Hierarchy Standard — defines where things go","Federal Hardware Specification","File Handling System"],a:1,x:"FHS = Filesystem Hierarchy Standard. It defines /etc for configs, /var for variable data, /bin for binaries, etc. Why paths work the same on Ubuntu, Fedora, and Arch."},
  {id:111,lid:"filesystem",t:"mc",q:"Why is /root NOT inside /home?",o:["Tradition only","Security — root needs no home","If /home is on a separate failed partition, root can still log in","Root has no home directory"],a:2,x:"/home is often on a separate disk partition. If that partition fails or is unavailable, /root on the root partition stays accessible. This lets admins log in during recovery."},
  // NEW NAVIGATION questions
  {id:112,lid:"navigation",t:"fill",q:"Find all .txt files from the current directory down: find . -name ___ ",a:"'*.txt'",x:"find uses -name with a quoted glob. Single quotes prevent shell expansion. find . -type f -name '*.txt' adds -type f to exclude directories named something.txt."},
  {id:113,lid:"navigation",t:"mc",q:"What does find / -perm /4000 -type f show?",o:["World-writable files","Empty files","SUID files — run as their owner","Files modified today"],a:2,x:"SUID files run as their owner (often root) regardless of who executes them. Finding them all is a key security audit step — any writable SUID file is exploitable."},
  {id:114,lid:"navigation",t:"mc",q:"What does which ls return?",o:["ls documentation","/bin/ls — the full path of the ls binary","ls source code","ls version number"],a:1,x:"which shows the full path of the binary that would run when you type a command. Useful when you have multiple versions or when a command behaves unexpectedly."},
  {id:115,lid:"navigation",t:"rev",q:"Which command searches history interactively by keyword?",o:["history | grep","find -cmd","Ctrl+R","ls -h"],a:2,x:"Ctrl+R enters reverse-search mode in bash. Start typing and it finds the most recent matching command. Essential shortcut — every Linux user uses this daily."},
  // NEW FILES questions
  {id:116,lid:"files",t:"fill",q:"Create a symlink named 'python' pointing to /usr/bin/python3: ln ___ /usr/bin/python3 python",a:"-s",x:"ln -s creates a symbolic (soft) link. Without -s you get a hard link. The order is ln -s TARGET LINKNAME. ls -la will show python -> /usr/bin/python3."},
  {id:117,lid:"files",t:"mc",q:"What does stat show that ls -l does NOT?",o:["Owner and group","File permissions","Three separate timestamps (access, modify, change) and inode number","File size"],a:2,x:"stat shows the inode number, number of hard links, and three separate timestamps: Access (last read), Modify (last content change), Change (last metadata change). ls -l only shows Modify time."},
  {id:118,lid:"files",t:"mc",q:"How does Linux determine a file's type?",o:["By the file extension","By where it's stored","By reading the file's header bytes (magic bytes)","By the file size"],a:2,x:"The file command reads the first bytes of the file to determine type. A .txt file renamed to .exe is still identified as text. Extensions are just conventions — not enforced."},
  {id:119,lid:"files",t:"rev",q:"Which command shows detailed metadata including inode number and all three timestamps?",o:["ls -la","file","stat","find"],a:2,x:"stat shows everything ls -l omits: exact byte size, inode number, hard link count, and three separate timestamps. Invaluable for forensics and debugging file behaviour."},
  // NEW VIEWING questions
  {id:120,lid:"viewing",t:"fill",q:"Count the lines in a file: wc ___ filename",a:"-l",x:"wc = Word Count. -l counts lines, -w counts words, -c counts bytes. Combine with pipes: grep 'ERROR' log.txt | wc -l counts matching lines."},
  {id:121,lid:"viewing",t:"mc",q:"What does sort data.txt | uniq -c | sort -rn produce?",o:["Unique lines only","Each unique line with a count, sorted most-frequent first","Lines in alphabetical order","Reversed file contents"],a:1,x:"sort first groups identical lines together. uniq -c counts consecutive duplicates. sort -rn sorts by count descending (r=reverse, n=numeric). Classic pattern for frequency analysis."},
  {id:122,lid:"viewing",t:"mc",q:"What does the tee command do?",o:["Splits a file in two","Writes output to a file AND displays it simultaneously","Reads two files and merges them","Shows the top of a file"],a:1,x:"tee (like a T-pipe fitting) splits the stream: cmd | tee output.log shows output AND saves it. Without tee you have to choose between seeing it or saving it."},
  {id:123,lid:"viewing",t:"fill",q:"Append command output to a file without overwriting: cmd ___ file.txt",a:">>",x:">> appends to the end. > overwrites (destroys existing content). Always use >> for log files you want to accumulate. > is fine for files you're creating fresh."},
  // NEW PERMISSIONS questions
  {id:124,lid:"permissions",t:"mc",q:"What does the SUID bit do on /usr/bin/passwd?",o:["Makes it read-only","Makes it run as root regardless of who executes it — allows normal users to change their own password","Prevents deletion","Encrypts the file"],a:1,x:"/usr/bin/passwd is owned by root and has SUID set. When alice runs it, it executes AS ROOT so it can write to /etc/shadow. Without SUID, normal users couldn't change passwords."},
  {id:125,lid:"permissions",t:"fill",q:"Set permissions to owner-only read+write (no access for group/others): chmod ___ file",a:"600",x:"600 = rw------- (6=rw- for owner, 0=--- for group, 0=--- for others). SSH requires private keys to be 600 or it refuses to use them with a 'permissions too open' error."},
  {id:126,lid:"permissions",t:"mc",q:"What does the sticky bit on /tmp mean?",o:["Files can't be executed","Only root can write to /tmp","Users can write files but only delete their OWN files","The directory is read-only"],a:2,x:"Sticky bit on a directory: you can create files but only delete the ones you own. /tmp is world-writable (everyone writes) + sticky (can't delete others' files). chmod +t /tmp."},
  {id:127,lid:"permissions",t:"rev",q:"Which command safely edits /etc/sudoers with syntax validation?",o:["sudo nano /etc/sudoers","sudo vim /etc/sudoers","visudo","chmod +w /etc/sudoers && nano"],a:2,x:"visudo validates syntax before saving. A typo in /etc/sudoers can lock out ALL sudo access (even yours). visudo prevents you from making the system unreachable."},
  // NEW PROCESSES questions
  {id:128,lid:"processes",t:"mc",q:"What is the difference between 'active' and 'enabled' in systemctl?",o:["They mean the same thing","Active = running right now; Enabled = will auto-start on next boot","Active = correctly configured; Enabled = installed","Active = root service; Enabled = user service"],a:1,x:"Independent states. A service can be active+disabled (running now, won't restart after reboot) or inactive+enabled (not running now, will start on next boot). Use both start AND enable for persistent services."},
  {id:129,lid:"processes",t:"fill",q:"Find which process is using port 80: lsof ___ :80",a:"-i",x:"lsof -i filters to network connections. -i :80 shows only connections involving port 80. Shows PID, process name, user, and connection state. Essential when 'port already in use' errors appear."},
  {id:130,lid:"processes",t:"mc",q:"What does nohup command & do?",o:["Runs command as root","Runs command in background immune to terminal close","Runs command on next reboot","Runs command in a new terminal"],a:1,x:"nohup (no hang-up) makes the process ignore SIGHUP — the signal sent when your terminal closes. & runs it in the background. Together: starts a background job that survives logout."},
  {id:131,lid:"processes",t:"mc",q:"You need to reload nginx config without restarting it. Which command?",o:["systemctl restart nginx","systemctl stop nginx","systemctl reload nginx","kill -9 $(pgrep nginx)"],a:2,x:"systemctl reload sends SIGHUP to nginx, which reloads config files without dropping existing connections. restart stops then starts (brief downtime). Always prefer reload for production servers."},
  // FULL COURSE(22) — existing, keeping intact
  {id:78,lid:"full",t:"fill",q:"Show your current directory: ___",a:"pwd",x:"pwd (Print Working Directory) — run it whenever you need to know exactly where you are."},
  {id:79,lid:"full",t:"mc",q:"What does /etc contain?",o:["User home dirs","Essential command tools","System-wide configuration files","Temporary files"],a:2,x:"/etc is the admin office — every program stores system-wide settings here. nginx.conf, SSH config, /etc/hosts all live here."},
  {id:80,lid:"full",t:"fill",q:"Create nested folders at once: mkdir ___ projects/web/css",a:"-p",x:"mkdir -p creates all parent directories that don't exist yet. Without -p, mkdir fails if any parent is missing."},
  {id:81,lid:"full",t:"mc",q:"Which shows ALL files with full details?",o:["ls","ls -l","ls -a","ls -la"],a:3,x:"ls -la = long format (-l) + all files including hidden (-a). Shows permissions, owner, size, and date for every file."},
  {id:82,lid:"full",t:"rev",q:"Which permanently deletes a file — no trash bin?",o:["del","erase","rm","remove"],a:2,x:"rm (Remove) permanently deletes. No Recycle Bin. rm -rf deletes directories forcefully. Always verify the path before running."},
  {id:83,lid:"full",t:"mc",q:"What does sudo stand for?",o:["Switch User Domain","Superuser Do","System User Dir","Super Unix Default"],a:1,x:"sudo = Superuser Do. Temporarily runs one command as root (administrator). Root has unrestricted access to the entire system."},
  {id:84,lid:"full",t:"fill",q:"Search for a pattern in a file: ___ 'error' app.log",a:"grep",x:"grep (Global Regular Expression Print) searches file contents. -i case-insensitive, -r recursive, -n shows line numbers."},
  {id:85,lid:"full",t:"mc",q:"What does chmod 755 set?",o:["Read-only for all","rwxr-xr-x (owner full, others r-x)","Full access for all","Write-only for owner"],a:1,x:"755 = owner:rwx (7), group:r-x (5), others:r-x (5). The standard permission for scripts and directories."},
  {id:86,lid:"full",t:"fill",q:"Follow a log file live: tail ___ /var/log/syslog",a:"-f",x:"tail -f follows the file live, printing new lines as they appear. Essential for monitoring server logs or debugging."},
  {id:87,lid:"full",t:"mc",q:"What is a PID?",o:["Package Install Dir","Personal Index Data","Process ID — unique number for each running process","Permission Index Data"],a:2,x:"PID = Process ID. Every running process gets a unique number. You need the PID to kill or interact with specific processes."},
  {id:88,lid:"full",t:"fill",q:"Install software: sudo apt ___ nginx",a:"install",x:"apt install downloads and installs a package with all dependencies. Always run sudo apt update first to refresh the catalog."},
  {id:89,lid:"full",t:"mc",q:"Who created the Linux kernel?",o:["Bill Gates","Linus Torvalds","Steve Jobs","Richard Stallman"],a:1,x:"Linus Torvalds created Linux in 1991. He still oversees kernel development through the Linux Foundation today."},
  {id:90,lid:"full",t:"rev",q:"Which shows ALL running processes from all users?",o:["ps","ps aux","top","jobs"],a:1,x:"ps aux: a=all users, u=user format, x=include background. Shows PID, CPU%, MEM%, and full command for every process."},
  {id:91,lid:"full",t:"mc",q:"What does cd - do?",o:["Goes home","Goes to /","Goes back to previously visited directory","Goes up one level"],a:2,x:"cd - is the filesystem back button — switches to the most recently visited directory."},
  {id:92,lid:"full",t:"fill",q:"Copy entire directory: cp ___ source/ dest/",a:"-r",x:"cp -r (recursive) is required to copy directories. Without -r, cp throws an error and refuses to copy any directory."},
  {id:93,lid:"full",t:"mc",q:"What lives in /tmp?",o:["System tools","Config files","Temporary files cleared on reboot","User home dirs"],a:2,x:"/tmp holds temporary files wiped every reboot. Use it for short-term scratch space, never for anything you want to keep."},
  {id:94,lid:"full",t:"mc",q:"What does Ctrl+C do?",o:["Copies text","Stops the running command","Clears screen","Creates file"],a:1,x:"Ctrl+C sends SIGINT — stops the running command. Essential for interrupting commands that are stuck or running too long."},
  {id:95,lid:"full",t:"fill",q:"Change file owner to alice: ___ alice file.txt",a:"chown",x:"chown (Change Owner) changes file ownership. chown alice:devs sets both owner and group simultaneously."},
  {id:96,lid:"full",t:"mc",q:"Difference between apt update and apt upgrade?",o:["Identical","update refreshes catalog, upgrade installs updates","update installs, upgrade refreshes","Neither downloads anything"],a:1,x:"apt update refreshes your local catalog (no installs). apt upgrade applies available updates. Always run update before upgrade."},
  {id:97,lid:"full",t:"rev",q:"Which grep flag makes search case-insensitive?",o:["-r","-n","-i","-v"],a:2,x:"grep -i ignores case. Combine with -r: grep -ri 'todo' ./src/ searches recursively ignoring case."},
  {id:98,lid:"full",t:"mc",q:"What does kill -9 PID do?",o:["Politely asks to stop","Force-terminates immediately — cannot be refused","Kills 9 processes","Lists info"],a:1,x:"kill -9 sends SIGKILL — terminated immediately by the kernel. Cannot be caught or ignored. Use when normal kill fails."},
  {id:99,lid:"full",t:"fill",q:"Open documentation for any command: ___ ls",a:"man",x:"man (Manual) opens full documentation. Press q to quit, / to search within, and arrows to scroll through it."},
];
