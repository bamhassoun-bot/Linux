const LESSONS=[
  {id:"intro",title:"What is Linux?",icon:"🐧",blocks:[
    {t:"p",c:"Linux is a free, open-source OS kernel created by Linus Torvalds in 1991. It powers over 90% of web servers, Android, and all major cloud platforms worldwide."},
    {t:"h",c:"Why Learn Linux?"},
    {t:"ul",items:["Every major cloud platform — AWS, Azure, Google Cloud — runs Linux","DevOps, backend engineering, and systems work all require Linux fluency","You'll understand how computers actually work under the hood","It's fast, secure, free, and doesn't expire or send telemetry"]},
    {t:"h",c:"What Exactly Is a Kernel?"},
    {t:"p",c:"The kernel is the core of the operating system. It sits between your software and hardware — managing CPU time, RAM, disk I/O, and network packets. Linux IS the kernel. When people say 'Linux' they usually mean a full distribution that includes the kernel plus tools."},
    {t:"h",c:"The Linux Boot Sequence"},
    {t:"ul",items:["1. BIOS/UEFI — hardware checks, finds the bootloader on disk","2. GRUB — bootloader loads the kernel into RAM and starts it","3. Kernel — initialises hardware, mounts root filesystem","4. systemd (PID 1) — starts all system services","5. Login shell — you get a prompt and control"]},
    {t:"tip",c:"systemd is always PID 1 — the ancestor of every process. Try: ps aux | head -5 to see it at the top of the process list."},
    {t:"h",c:"The Three Layers You'll Work With"},
    {t:"ul",items:["Kernel — written in C, manages hardware. You rarely touch it directly","Shell (Bash) — translates your typed commands into system calls the kernel understands","GNU Utilities — ls, grep, cp, awk, sed. These are the tools. GNU/Linux together = a complete OS"]},
    {t:"h",c:"Linux Distributions — the Main Families"},
    {t:"ul",items:["🟠 Debian/Ubuntu — most beginner-friendly. Package manager: apt. Best for learning","🔴 Red Hat/Fedora/Rocky — enterprise standard. Package manager: dnf. Used in corporations","🔵 Arch Linux — minimal, rolling release. Build it yourself. Forces deep understanding","🟢 Kali Linux — penetration testing. 600+ security tools. Based on Debian"]},
    {t:"tip",c:"All distros share the same kernel and filesystem structure. Everything you learn here works on Ubuntu, Fedora, Debian, and Arch."},
    {t:"h",c:"Your First Commands"},
    {t:"cmd",cmd:"echo"},
    {t:"code",code:"echo 'Hello, Linux!'\necho $HOME\necho $USER",out:"Hello, Linux!\n/home/alice\nalice"},
    {t:"cmd",cmd:"man"},
    {t:"code",code:"man ls\nman grep\nman man",out:"(opens full docs — q=quit, /=search, arrows=scroll)\n(press q to exit, / to search within)\n(the manual for the manual itself)"},
  ]},
  {id:"terminal",title:"The Terminal",icon:"💻",blocks:[
    {t:"p",c:"The terminal is a text-based interface to your computer. Instead of clicking icons, you type commands. It's faster, more powerful, scriptable, and works over SSH on remote servers."},
    {t:"h",c:"Reading the Prompt"},
    {t:"code",code:"alice@ubuntu:~$",out:"alice   = who you are (your username)\nubuntu  = hostname (this computer's name)\n~       = current location (~ means home directory)\n$       = regular user  (# would mean root/admin)"},
    {t:"h",c:"Command Anatomy — Every Command Has 3 Parts"},
    {t:"code",code:"ls        -la        /home/alice\n│         │          └── argument: what to operate on\n│         └──────────── options/flags: modify behaviour\n└──────────────────────── command: the program to run",out:""},
    {t:"tip",c:"Commands are case-sensitive. 'ls' works. 'LS' does not. Always lowercase unless told otherwise."},
    {t:"h",c:"Essential Keyboard Shortcuts — Memorise These"},
    {t:"ul",items:["Ctrl+C — stop the running command immediately (sends SIGINT)","Ctrl+L — clear the screen (history still accessible with ↑)","Tab — auto-complete commands and paths — use this constantly","↑ / ↓ — scroll through previous commands","Ctrl+R — search command history interactively by typing a keyword","Ctrl+A / Ctrl+E — jump to start/end of the current line","Ctrl+W — delete the word before the cursor","Ctrl+K — delete from cursor to end of line"]},
    {t:"h",c:"stdin, stdout, stderr — The Three Data Streams"},
    {t:"p",c:"Every command has three streams: stdin (input, file descriptor 0), stdout (normal output, fd 1), and stderr (error output, fd 2). By default, all connect to your terminal."},
    {t:"code",code:"ls /real_path              # stdout goes to terminal\nls /fake 2>/dev/null       # stderr silenced\nls /fake 2>&1 | less       # stderr merged into stdout, piped\necho 'text' > file.txt     # stdout redirected to a file",out:"(normal output displayed)\n(error discarded — /dev/null is the void)\n(both streams together, scrollable)\n(file.txt is created/overwritten)"},
    {t:"h",c:"Command Chaining — Four Operators"},
    {t:"ul",items:["cmd1 ; cmd2 — run both, regardless of outcome","cmd1 && cmd2 — run cmd2 ONLY if cmd1 succeeded (exit code 0)","cmd1 || cmd2 — run cmd2 ONLY if cmd1 failed","cmd1 | cmd2 — pipe: stdout of cmd1 becomes stdin of cmd2"]},
    {t:"code",code:"cd /tmp && ls               # list only if cd succeeded\nmkdir logs || echo 'exists' # echo only if mkdir failed\nls /etc | grep ssh          # pipe ls output into grep",out:""},
    {t:"h",c:"Environment Variables"},
    {t:"code",code:"echo $HOME      # your home directory path\necho $PATH      # directories searched for commands\necho $USER      # your username\necho $SHELL     # which shell you're using\nenv             # print ALL environment variables",out:"/home/alice\n/usr/local/bin:/usr/bin:/bin\nalice\n/bin/bash\n(long list of all variables)"},
    {t:"tip",c:"Ctrl+R is your most powerful shortcut. Press it, type any keyword from a past command, and it finds the most recent match. Press Ctrl+R again to cycle through older matches."},
  ]},
  {id:"filesystem",title:"The Filesystem",icon:"🏛️",blocks:[
    {t:"p",c:"Linux organizes every file in a single tree starting from / (root). Unlike Windows with C:\\ and D:\\, there is one unified hierarchy — everything branches from that single root point."},
    {t:"p",c:"Think of it as a building — one foundation, many floors and rooms, each with a specific purpose. Click any room to explore what lives there:"},
    {t:"building-map"},
    {t:"h",c:"The FHS — Filesystem Hierarchy Standard"},
    {t:"p",c:"The FHS defines where everything goes. Every major distro follows it. This means paths are the same on Ubuntu, Fedora, Debian, and Arch. Memorise the key directories — you'll use this knowledge every day."},
    {t:"ul",items:[
      "/ — root, the top. Everything lives under here",
      "/bin — essential tools for all users: ls, cat, cp, rm, echo, bash",
      "/etc — ALL system configuration files. No binaries, only settings",
      "/home — user personal directories: /home/alice, /home/bob",
      "/var — variable data that grows: logs (/var/log), mail, web files",
      "/tmp — temporary scratch space. Cleared on every reboot",
      "/usr — installed programs (/usr/bin) and their libraries",
      "/dev — devices as files: /dev/sda (disk), /dev/null (void)",
      "/proc — virtual FS in RAM. Live kernel data: CPU, memory, processes",
      "/root — root user's home. NOT inside /home — intentionally separate"
    ]},
    {t:"h",c:"Paths: The Address of Every File"},
    {t:"ul",items:[
      "Absolute path: starts with / — works from anywhere. /home/alice/notes.txt is always the same file",
      "Relative path: relative to your current location. If you're in /home/alice, then notes.txt means /home/alice/notes.txt",
    ]},
    {t:"tip",c:"Special shortcuts: ~ = your home directory, . = current directory, .. = parent directory (one level up). So cd ../.. goes up two levels from wherever you are."},
    {t:"h",c:"Critical /etc Files Every Admin Knows"},
    {t:"ul",items:[
      "/etc/passwd — user account database. Readable by all. Username:x:UID:GID:info:home:shell",
      "/etc/shadow — encrypted password hashes. Root-only. The most sensitive file on the system",
      "/etc/hosts — local hostname-to-IP mapping. Overrides DNS. Checked before any DNS query",
      "/etc/fstab — which filesystems mount automatically at boot, and how",
      "/etc/sudoers — who can use sudo and for what. Edit ONLY with visudo — never directly",
      "/etc/ssh/sshd_config — SSH server security settings. PermitRootLogin, PasswordAuthentication",
      "/etc/crontab — system-wide scheduled tasks",
    ]},
    {t:"h",c:"/proc — The Kernel's Live Dashboard"},
    {t:"p",c:"/proc is not on disk at all — the kernel generates it in RAM in real time. Reading files here reads live kernel data."},
    {t:"code",code:"cat /proc/cpuinfo     # every CPU core's details\ncat /proc/meminfo     # live memory breakdown\ncat /proc/uptime      # seconds since last boot\nls /proc/1/           # all data about PID 1 (systemd)",out:"(model name, MHz, cores, cache...)\n(MemTotal, MemFree, Buffers, Cached...)\n(e.g. 3600.45 = 1 hour since boot)\n(cmdline, environ, fd, maps, status...)"},
    {t:"tip",c:"/dev/null is the famous 'void'. Anything written there disappears. command > /dev/null 2>&1 completely silences a command's output and errors — useful in scripts."},
  ]},
  {id:"navigation",title:"Navigation",icon:"🧭",blocks:[
    {t:"p",c:"Three commands form the backbone of navigation. Master these before anything else — you'll type them hundreds of times per day."},
    {t:"cmd",cmd:"pwd"},
    {t:"code",code:"pwd",out:"/home/alice\n(your exact current location — always ask 'where am I?' first)"},
    {t:"cmd",cmd:"ls"},
    {t:"code",code:"ls\nls -l\nls -la\nls -lh\nls /etc",out:"Documents  Downloads  Desktop  notes.txt\n(long format: permissions, owner, size, date)\n(+ hidden files starting with a dot)\n(+ human-readable sizes like 4.2K, 1.3M)\n(list a specific directory, not current)"},
    {t:"p",c:"ls is like turning the lights on in a room. -l gives full details, -a reveals hidden files. Combine them: ls -la shows everything."},
    {t:"cmd",cmd:"cd"},
    {t:"code",code:"cd Documents\ncd /etc\ncd ~\ncd ..\ncd -\ncd ../../var/log",out:"(relative — enter Documents from current dir)\n(absolute — works from anywhere)\n(home — fastest way back no matter where you are)\n(parent — go up one level)\n(back — toggle to previous location)\n(relative: up two levels, then into var/log)"},
    {t:"tip",c:"Tab auto-complete is your most powerful time-saver. Type 'cd Doc' then press Tab → 'cd Documents'. Tab twice shows all available completions. Use it on every command."},
    {t:"h",c:"A Full Navigation Session — Read This Carefully"},
    {t:"code",code:"pwd                    # where am I?\nls                     # what's here?\ncd /var/log            # jump to logs\npwd                    # confirm location\nls -la                 # see all log files with details\ncd -                   # jump back to where I was\npwd                    # confirm I'm back",out:"/home/alice\nDocuments  Downloads  notes.txt\n(moved)\n/var/log\ndrwxr-xr-x  ... syslog  auth.log  nginx/\n(jumped back)\n/home/alice"},
    {t:"h",c:"Finding Files with find"},
    {t:"code",code:"find / -name 'passwd'          # find by exact name\nfind /home -name '*.txt'       # wildcard: all .txt files\nfind . -type f -name '*.log'   # files only (not dirs)\nfind /tmp -mtime +7            # older than 7 days\nfind / -perm /4000 -type f     # SUID files — security check!",out:"(search from / — whole filesystem)\n(search from /home only)\n(. = current directory)\n(good for cleanup)\n(files that run as their owner — security relevant)"},
    {t:"h",c:"Wildcard Patterns — Use with ls, cp, rm"},
    {t:"code",code:"ls *.log           # all files ending in .log\nls report_?.txt    # ? = exactly one character\nls data_{1..5}.csv # brace expansion: data_1.csv to data_5.csv\nrm *.tmp           # delete all .tmp files (careful!)",out:""},
    {t:"tip",c:"Before rm with a wildcard, always test with ls first: ls *.tmp confirms what matches before you delete it. One wrong rm command can destroy important files."},
    {t:"h",c:"Know Where a Command Lives"},
    {t:"code",code:"which ls           # /bin/ls — shows the binary path\ntype cd            # cd is a shell builtin\nwhich python3      # /usr/bin/python3",out:"(confirms which 'ls' you're running)\n(cd is built into bash, not a separate file)\n(useful when you have multiple python versions)"},
  ]},
  {id:"files",title:"Files & Directories",icon:"📁",blocks:[
    {t:"p",c:"Now that you can navigate, learn to create, copy, move, and delete. These five commands handle 95% of file operations you'll ever need."},
    {t:"cmd",cmd:"mkdir"},
    {t:"code",code:"mkdir projects\nmkdir -p projects/web/css\nmkdir -p project/{src,tests,docs,build}",out:"(creates 'projects' folder)\n(-p creates all nested levels at once)\n(brace expansion: creates 4 subdirectories at once)"},
    {t:"cmd",cmd:"touch"},
    {t:"code",code:"touch README.md\ntouch a.txt b.txt c.txt\ntouch log_{01..05}.txt",out:"(creates empty README.md or updates its timestamp)\n(creates 3 files at once)\n(creates log_01.txt through log_05.txt)"},
    {t:"cmd",cmd:"cp"},
    {t:"code",code:"cp notes.txt backup.txt\ncp -r projects/ projects_backup/\ncp -p config.json config.json.bak",out:"(copy file — original stays intact)\n(-r copies entire directory and all contents)\n(-p preserves permissions and timestamps)"},
    {t:"cmd",cmd:"mv"},
    {t:"code",code:"mv old.txt new.txt\nmv file.txt ~/Documents/\nmv *.log /var/log/archive/",out:"(rename — same as moving to a new name)\n(move to Documents)\n(move all .log files to archive)"},
    {t:"p",c:"mv does double duty: it moves AND renames. They're the same operation — changing the file's path. No copy is made; the file is simply relocated."},
    {t:"cmd",cmd:"rm"},
    {t:"code",code:"rm file.txt\nrm -f file.txt\nrm -r folder/\nrm -rf temp_build/",out:"(permanent delete — NO trash bin)\n(-f force: no error if file doesn't exist)\n(-r recursive: delete folder and all contents)\n(-rf: force-recursive — no confirmation asked at all)"},
    {t:"tip",c:"⚠️ rm is permanent and irreversible. There is no Recycle Bin. rm -rf / would delete the entire system — Linux won't stop you. Always verify your path before running rm -rf."},
    {t:"h",c:"Symbolic Links — Filesystem Shortcuts"},
    {t:"code",code:"ln -s /usr/bin/python3 ./python    # create a symlink\nln source.txt hardlink.txt         # hard link (same inode)\nls -la                             # see -> in symlink listing\nreadlink ./python                  # show what symlink points to",out:"./python -> /usr/bin/python3\n(both names point to same file data)\n-rwxr-xr-x  python -> /usr/bin/python3\n/usr/bin/python3"},
    {t:"p",c:"A symbolic link is like a shortcut file. If the original moves, the link breaks. A hard link is another name for the exact same data — deleting the original doesn't remove the data until ALL hard links are gone."},
    {t:"h",c:"Inspect Files with stat and file"},
    {t:"code",code:"stat notes.txt        # detailed metadata\nfile notes.txt        # what type of file is this?\nfile mystery_file     # works without extension",out:"File: notes.txt | Size: 248 | Inode: 393218 | Access: 2026-05-01\nOwner: alice | Permissions: 644 | Blocks: 8\nnotes.txt: ASCII text\nmystery_file: ELF 64-bit LSB executable, x86-64"},
    {t:"tip",c:"Linux doesn't rely on file extensions to determine type. file command actually reads the file header (magic bytes) to tell you what it really is — useful for suspicious or renamed files."},
    {t:"h",c:"File Naming Rules"},
    {t:"ul",items:[
      "Avoid spaces — use hyphens or underscores: my-project.sh or my_project.sh",
      "Linux is case-sensitive: report.txt ≠ Report.txt ≠ REPORT.TXT",
      "Use descriptive extensions: .sh (scripts), .conf (config), .bak (backups), .log (logs)",
      "Hidden files start with a dot: .bashrc, .gitconfig, .env — invisible to plain ls"
    ]},
  ]},
  {id:"viewing",title:"Viewing Files",icon:"👁️",blocks:[
    {t:"p",c:"Linux gives you several tools to read file contents — each designed for different file sizes and situations. Choosing the right one saves time and avoids flooding your terminal."},
    {t:"cmd",cmd:"cat"},
    {t:"code",code:"cat notes.txt\ncat a.txt b.txt > combined.txt\ncat -n file.txt",out:"(print full file to screen — best for short files)\n(concatenate two files into one — cat's original purpose)\n(-n adds line numbers)"},
    {t:"p",c:"cat is perfect for short files. For anything longer than a screen, use less — cat will flood your terminal and force you to scroll."},
    {t:"cmd",cmd:"less"},
    {t:"code",code:"less big_file.log\nless /var/log/syslog",out:"(scrollable viewer — q=quit, /=search, G=bottom, g=top)\n(controls: arrows=scroll, n=next match, N=prev match)"},
    {t:"cmd",cmd:"head"},
    {t:"cmd",cmd:"tail"},
    {t:"code",code:"head -n 20 file.txt\ntail -n 50 file.txt\ntail -f /var/log/syslog",out:"(first 20 lines — preview file structure)\n(last 50 lines)\n(-f FOLLOWS the file live — new lines appear as written!)"},
    {t:"tip",c:"tail -f is one of the most used sysadmin commands. It streams log files live — you see new entries the instant they're written. Essential for debugging running servers."},
    {t:"cmd",cmd:"grep"},
    {t:"code",code:"grep 'error' app.log\ngrep -i 'WARNING' app.log\ngrep -r 'TODO' ./src/\ngrep -n 'def ' script.py\ngrep -v 'debug' app.log",out:"(lines containing 'error')\n(-i makes search case-insensitive)\n(-r searches ALL files in ./src/ recursively)\n(-n shows line numbers)\n(-v inverts: shows lines NOT matching 'debug')"},
    {t:"h",c:"Pipes — Chain Commands Together"},
    {t:"p",c:"The | (pipe) character sends the output of one command as the input to the next. This is one of Linux's most powerful features — you chain simple tools into complex operations."},
    {t:"code",code:"cat app.log | grep 'error' | tail -20\nps aux | grep python\nls -la | grep '^d'",out:"(find errors, show only last 20)\n(find all python processes)\n(list only directories — lines starting with d)"},
    {t:"h",c:"Counting, Sorting, and Processing"},
    {t:"code",code:"wc -l file.txt                         # count lines\nwc -w file.txt                         # count words\ncat log | grep '404' | wc -l           # count 404 errors\nsort names.txt                         # alphabetical sort\nsort -n numbers.txt                    # numeric sort\nsort -rn scores.txt                    # reverse numeric\nsort data.txt | uniq                   # remove duplicates\nsort data.txt | uniq -c | sort -rn     # count+rank unique lines",out:""},
    {t:"h",c:"Output Redirection"},
    {t:"code",code:"ls -la > filelist.txt       # write to file (overwrites!)\nls -la >> filelist.txt      # append to file\ngrep error log > errors.txt # save filtered output\ncmd 2>/dev/null             # silence error messages\ncmd 2>&1 | tee output.log   # log to file AND show on screen",out:"(creates/replaces filelist.txt)\n(adds to end without destroying existing content)\n(errors.txt contains only error lines)\n(2 = stderr, /dev/null = void)\n(tee splits output to both places simultaneously)"},
    {t:"tip",c:"grep -E lets you use extended regular expressions: grep -E '(ERROR|WARN)' log.txt finds lines with either ERROR or WARN. grep -c counts matching lines instead of showing them."},
  ]},
  {id:"permissions",title:"Permissions",icon:"🔐",blocks:[
    {t:"p",c:"Every file in Linux has permissions controlling who can read, write, or execute it. This is a core security mechanism — understanding it is non-negotiable for any Linux user."},
    {t:"code",code:"ls -la",out:"-rwxr-xr-- 1 alice devs 4096 Jan 1 script.sh\n│└──┘└──┘└──┘\n│  │    │    └── others permissions (everyone else)\n│  │    └─────── group permissions  (group: devs)\n│  └──────────── owner permissions  (user: alice)\n└─────────────── file type: - file, d dir, l symlink"},
    {t:"h",c:"Reading Permissions — Numeric (Octal) System"},
    {t:"p",c:"Each permission is a number: r=4, w=2, x=1. Add them together for the total. This is the octal (base-8) notation."},
    {t:"ul",items:["7 = 4+2+1 = rwx — full access: read, write, execute","6 = 4+2   = rw- — read and write only","5 = 4+1   = r-x — read and execute (no write)","4 = 4+0   = r-- — read only","0 = 0     = --- — no access at all"]},
    {t:"code",code:"chmod 755 script.sh    # rwxr-xr-x: owner full, others r+x\nchmod 644 doc.txt      # rw-r--r--: owner rw, others r only\nchmod 600 secret.key   # rw-------: owner only, no one else\nchmod 777 shared.txt   # rwxrwxrwx: NEVER do this on servers!",out:"(standard for scripts and directories)\n(standard for regular files)\n(SSH keys must be 600 or SSH refuses them)\n(everyone can modify — security risk)"},
    {t:"cmd",cmd:"chmod"},
    {t:"code",code:"chmod +x run.sh          # add execute for everyone\nchmod -w config.cfg      # remove write from everyone\nchmod u+x script.sh      # add execute for owner (u) only\nchmod go-w file.txt      # remove write from group and others",out:"(now runnable: ./run.sh)\n(read-only to protect config)\n(u=user/owner, g=group, o=others)\n(use + to add, - to remove specific bits)"},
    {t:"cmd",cmd:"chown"},
    {t:"code",code:"chown alice file.txt          # change owner to alice\nchown alice:devs file.txt     # change owner AND group\nsudo chown root /etc/config   # system files need sudo\nchown -R alice:alice ./app/   # recursive: all files in app/",out:"(alice now owns the file)\n(alice=owner, devs=group)\n(only root can own system files)\n(-R applies recursively to all contents)"},
    {t:"h",c:"Special Permissions — SUID, SGID, Sticky Bit"},
    {t:"ul",items:[
      "SUID (chmod +s on file): executes as the file's OWNER, not the person running it. /usr/bin/passwd has SUID — lets you change your password even though /etc/shadow is root-only",
      "SGID (chmod +s on dir): new files created inside inherit the directory's GROUP — useful for shared project directories",
      "Sticky bit (chmod +t on dir): only the file's owner can delete it, even if others have write access. /tmp uses this — everyone can write there but can't delete each other's files"
    ]},
    {t:"h",c:"Real-World Permission Patterns"},
    {t:"ul",items:[
      "Web server files: 644 for files, 755 for directories, owner=www-data",
      "SSH private key: 600 — SSH literally refuses to use keys with looser permissions",
      "Shell scripts: 755 if shared, 700 if private to you",
      "Config files with passwords: 600 — never 644 (that exposes credentials to all users)"
    ]},
    {t:"tip",c:"Check file permissions with ls -la. The first character is type (d=dir, -=file, l=link). The next 9 are three groups of rwx: owner, group, others. chmod -R 777 is a security disaster — never use it on a server."},
  ]},
  {id:"processes",title:"Processes",icon:"⚡",blocks:[
    {t:"p",c:"Every running program is a process with a unique PID (Process ID). Linux gives you complete visibility and control — you can see, inspect, prioritise, and kill any process."},
    {t:"cmd",cmd:"ps"},
    {t:"code",code:"ps\nps aux\nps aux | grep nginx\nps aux | grep -v grep | grep python",out:"(your current shell's processes)\n(ALL processes from ALL users — a=all, u=user format, x=no-tty)\n(find nginx's PID)\n(exclude the grep process itself from results)"},
    {t:"cmd",cmd:"top"},
    {t:"code",code:"top",out:"(live monitor — updates every 3 seconds)\n(controls: q=quit, k=kill by PID, M=sort by memory, P=sort by CPU)\n(htop is a modern colourful alternative — sudo apt install htop)"},
    {t:"p",c:"top is like Task Manager for Linux — real-time CPU, memory, and process table. The %CPU column shows how hard each process is working right now."},
    {t:"cmd",cmd:"kill"},
    {t:"code",code:"kill 1234\nkill -9 1234\nkill -15 1234\nkillall nginx",out:"(send SIGTERM — graceful: process can clean up)\n(send SIGKILL — force-terminate immediately, no cleanup)\n(-15 is the default, same as plain kill)\n(kill ALL processes named nginx)"},
    {t:"h",c:"Signal Reference — What These Numbers Mean"},
    {t:"ul",items:[
      "SIGTERM (15) — default. Politely asks process to stop. It can catch this and clean up gracefully",
      "SIGKILL (9) — cannot be caught or ignored. The kernel terminates the process immediately",
      "SIGINT (2) — what Ctrl+C sends. Like SIGTERM but from the keyboard",
      "SIGHUP (1) — 'hang up'. Many daemons reload their config file when they receive this"
    ]},
    {t:"h",c:"Background Jobs — Run Without Blocking Terminal"},
    {t:"code",code:"sleep 60 &          # run in background, PID shown\njobs                # list all background jobs\nfg 1                # bring job 1 to foreground\nbg 1                # push suspended job to background\nnohup server.py &   # survives after terminal closes",out:"[1] 5678\n[1]  Running  sleep 60\n(job 1 is now in foreground)\n(continues in background)\n(nohup = no hang-up — immune to terminal close)"},
    {t:"tip",c:"Ctrl+C stops a command. Ctrl+Z suspends it (pauses without killing). Then use fg to resume in foreground, or bg to continue in background. Use nohup for long-running jobs you want to survive logout."},
    {t:"h",c:"systemd — Managing System Services"},
    {t:"code",code:"systemctl status nginx         # is it running? last logs?\nsystemctl start nginx          # start right now\nsystemctl stop nginx           # stop right now\nsystemctl restart nginx        # stop then start\nsystemctl enable nginx         # auto-start on every boot\nsystemctl disable nginx        # remove auto-start\njournalctl -u nginx -f         # follow nginx logs live",out:"(shows active/inactive + recent log lines)\n(starts the service)\n(stops it)\n(restart in one command)\n(adds boot symlink)\n(removes boot symlink)\n(streams real-time log entries)"},
    {t:"h",c:"Find and Manage Specific Processes"},
    {t:"code",code:"pgrep nginx              # find PID of nginx\npkill nginx              # kill by name (not PID)\nlsof -i :80              # what process owns port 80?\nkill -9 $(pgrep nginx)   # find PID then kill it",out:"1234\n(all nginx processes stopped)\nPID 1234 nginx /usr/sbin/nginx\n(command substitution: pgrep runs first)"},
  ]},
  {id:"packages",title:"Package Management",icon:"📦",blocks:[
    {t:"p",c:"Installing software on Linux uses a package manager — no downloading .exe files, no Next→Next→Finish wizards. One command installs everything, handles all dependencies, and keeps everything updated."},
    {t:"cmd",cmd:"sudo"},
    {t:"p",c:"Many system operations need root (administrator) privileges. sudo lets you run them as superuser for just that one command, without staying logged in as root permanently."},
    {t:"code",code:"sudo apt install vim\nwhoami\nsudo whoami\nsudo -i",out:"(installs vim with root privileges)\nalice\nroot   (sudo makes you root for that command)\n(opens a full root shell — be careful, exit when done)"},
    {t:"cmd",cmd:"apt"},
    {t:"code",code:"sudo apt update\nsudo apt upgrade\nsudo apt install nginx\nsudo apt remove nginx\nsudo apt purge nginx\napt search editor\napt show vim\napt list --installed",out:"(refresh package catalog from internet — no installs)\n(install all available updates)\n(install nginx + all its dependencies)\n(remove nginx, keep config files)\n(remove nginx + delete ALL config files)\n(search catalog for 'editor' — no sudo needed)\n(detailed info: version, size, dependencies)\n(everything currently installed on your system)"},
    {t:"h",c:"The Golden Maintenance Command"},
    {t:"code",code:"sudo apt update && sudo apt upgrade -y",out:"(update catalog, then upgrade everything — -y auto-confirms)"},
    {t:"p",c:"Run this regularly to keep your system secure and up-to-date. The && means: upgrade ONLY if update succeeded. -y automatically answers 'yes' to all prompts."},
    {t:"h",c:"What Happens When You Install a Package?"},
    {t:"ul",items:[
      "apt download the .deb package file from the repository",
      "It resolves dependencies — automatically installs other packages this one needs",
      "Binaries go to /usr/bin, libraries to /usr/lib, configs to /etc",
      "A record is kept in /var/lib/dpkg so apt knows what's installed"
    ]},
    {t:"h",c:"Other Package Managers You'll Encounter"},
    {t:"ul",items:[
      "dnf — Fedora, RHEL, Rocky Linux. Same concept: sudo dnf install nginx",
      "pacman — Arch Linux. sudo pacman -S nginx",
      "pip — Python packages: pip install requests  (--user to install locally)",
      "npm — Node.js packages: npm install express",
      "snap — universal packages: sudo snap install code",
      "cargo — Rust packages: cargo install ripgrep"
    ]},
    {t:"h",c:"Package Housekeeping"},
    {t:"code",code:"sudo apt autoremove         # remove unused dependencies\nsudo apt clean              # delete cached .deb files\napt list --upgradeable      # see what has pending updates\ndpkg -l | grep nginx        # check if nginx is installed\nwhich nginx                 # confirm nginx is in your PATH",out:"(frees disk space)\n(more disk space freed — safe to run)\n(names + current/available versions)\n(shows installed nginx packages)\n(/usr/sbin/nginx)"},
    {t:"tip",c:"apt for Ubuntu/Debian. dnf for Fedora. pacman for Arch. The commands differ but the concept is identical — always prefer your distro's package manager over manual downloads for system software."},
  ]},
];

// ── Mini Flashcards (flip + type, no spaced rep, local state) ─────────────────
function MiniCards({lessonId}){
  const cards=AC.filter(c=>c.lid===lessonId);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [mode,setMode]=useState("flip");
  const [typed,setTyped]=useState("");
  const [revealed,setRevealed]=useState(false);
  if(!cards.length)return <div style={{padding:16,color:C.dim,fontSize:"0.85em",textAlign:"center"}}>No cards for this unit yet.</div>;
  const card=cards[idx%cards.length];
  const goNext=()=>{setIdx(i=>(i+1)%cards.length);setFlipped(false);setTyped("");setRevealed(false);};
  const goPrev=()=>{setIdx(i=>(i-1+cards.length)%cards.length);setFlipped(false);setTyped("");setRevealed(false);};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:"0.74em",color:C.dim}}>{idx+1} / {cards.length}</div>
      <div style={{display:"flex",gap:5}}>
        {["flip","type"].map(m=><button key={m} onClick={()=>{setMode(m);setFlipped(false);setTyped("");setRevealed(false);}} style={{padding:"3px 10px",borderRadius:20,cursor:"pointer",border:`1px solid ${mode===m?C.grn:C.bd}`,fontFamily:C.sans,fontWeight:700,fontSize:"0.69em",background:mode===m?C.grn:"transparent",color:mode===m?C.bg:C.dim,transition:"all .2s"}}>{m==="flip"?"Flip":"Type"}</button>)}
      </div>
    </div>
    {mode==="flip"&&(<div>
      <div className="card-scene" style={{height:170,cursor:"pointer",marginBottom:10}} onClick={()=>setFlipped(f=>!f)}>
        <div className={`card-inner${flipped?" flipped":""}`}>
          <div className="card-face" style={{background:C.s3,border:`1px solid ${C.bdh}`,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center",padding:18}}>
            {card.cmd?<code style={{fontFamily:C.mono,fontSize:"1.7em",fontWeight:700,color:C.cyn}}>{card.cmd}</code>:<p style={{fontSize:"0.9em",color:C.txt,fontWeight:700,lineHeight:1.5,maxWidth:280}}>{card.f}</p>}
            <div style={{marginTop:10,fontSize:"0.67em",color:C.mut}}>tap to flip ↩</div>
          </div>
          <div className="card-face cbk" style={{background:C.s2,border:`2px solid ${C.grn}30`,display:"flex",flexDirection:"column",justifyContent:"center",padding:18}}>
            <div style={{fontSize:"0.65em",color:C.grn,fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Answer</div>
            <div style={{fontSize:"0.85em",color:C.txt,lineHeight:1.65}}>{card.b}</div>
            {card.cmd&&<div style={{marginTop:8,fontSize:"0.74em",color:C.yel}}>stands for: {CMD[card.cmd]?.f}</div>}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={goPrev} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.bd}`,background:"transparent",color:C.dim,fontFamily:C.sans,fontWeight:700,fontSize:"0.8em",cursor:"pointer"}}>← Prev</button>
        <button onClick={goNext} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.grn}40`,background:C.ga,color:C.grn,fontFamily:C.sans,fontWeight:700,fontSize:"0.8em",cursor:"pointer"}}>Next →</button>
      </div>
    </div>)}
    {mode==="type"&&(<div>
      <div style={{background:C.s3,border:`1px solid ${C.bdh}`,borderRadius:10,padding:16,marginBottom:10}}>
        {card.cmd?<><code style={{fontFamily:C.mono,fontSize:"1.4em",fontWeight:700,color:C.cyn}}>{card.cmd}</code><code style={{display:"block",fontFamily:C.mono,fontSize:"0.76em",color:C.mut,marginTop:4}}>{card.f}</code></>:<p style={{fontSize:"0.9em",color:C.txt,fontWeight:700,lineHeight:1.5}}>{card.f}</p>}
      </div>
      <textarea value={typed} onChange={e=>!revealed&&setTyped(e.target.value)} disabled={revealed} placeholder="Type your answer..."
        style={{width:"100%",minHeight:68,borderRadius:8,background:C.s1,border:`1px solid ${C.bd}`,color:C.txt,fontFamily:C.sans,fontSize:"0.84em",padding:"9px 12px",resize:"vertical",outline:"none",marginBottom:8,lineHeight:1.5}}/>
      {!revealed
        ?<button onClick={()=>setRevealed(true)} disabled={!typed.trim()} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:typed.trim()?C.cyn:C.s2,color:typed.trim()?C.bg:C.dim,fontFamily:C.sans,fontWeight:800,fontSize:"0.84em",cursor:typed.trim()?"pointer":"not-allowed",transition:"all .2s"}}>Reveal</button>
        :(<div className="af">
            <div style={{background:C.ga,border:`1px solid ${C.grn}30`,borderRadius:8,padding:12,marginBottom:8,fontSize:"0.83em",color:C.txt,lineHeight:1.65}}>

// ── Mini Quiz (inline, no intro screen) ───────────────────────────────────────
function MiniQuiz({lessonId}){
  const questions=AQ.filter(q=>q.lid===lessonId);
  const [qi,setQi]=useState(0);
  const [ans,setAns]=useState({});
  const [sel,setSel]=useState(null);
  const [typed,setTyped]=useState("");
  const [sub,setSub]=useState(false);
  const [done,setDone]=useState(false);
  if(!questions.length)return <div style={{padding:16,color:C.dim,fontSize:"0.85em",textAlign:"center"}}>No quiz for this unit yet.</div>;
  const q=questions[qi];
  const correct=(a)=>q.t==="fill"?a?.trim().toLowerCase()===q.a.toLowerCase():parseInt(a)===q.a;
  const submit=()=>{const a=q.t==="fill"?typed:sel?.toString();if(a===undefined||a===null)return;setAns(p=>({...p,[q.id]:a}));setSub(true);};
  const next=()=>{if(qi<questions.length-1){setQi(i=>i+1);setSel(null);setTyped("");setSub(false);}else setDone(true);};
  const reset=()=>{setQi(0);setAns({});setSel(null);setTyped("");setSub(false);setDone(false);};
  const isOk=sub?correct(q.t==="fill"?typed:sel?.toString()):null;
  const canSub=q.t==="fill"?typed.trim():sel!==null;
  if(done){
    const score=questions.filter(q=>{const a=ans[q.id];if(!a&&a!==0)return false;return q.t==="fill"?a.trim().toLowerCase()===q.a.toLowerCase():parseInt(a)===q.a;}).length;
    const pct=Math.round(score/questions.length*100);
    const passed=pct>=75;
    return(<div className="af" style={{textAlign:"center",padding:"16px 8px"}}>
      <div style={{fontSize:"2em",marginBottom:6}}>{passed?"🎉":"💪"}</div>
      <div style={{fontSize:"1.6em",fontWeight:900,color:passed?C.grn:C.ora,marginBottom:2}}>{pct}%</div>
      <div style={{color:C.dim,fontSize:"0.82em",marginBottom:12}}>{score}/{questions.length} correct · {passed?"Passed ✓":"Need 75% to pass"}</div>
      <button onClick={reset} style={{padding:"8px 24px",borderRadius:20,border:`2px solid ${passed?C.grn:C.ora}`,background:passed?C.ga:C.oa,color:passed?C.grn:C.ora,fontFamily:C.sans,fontWeight:800,fontSize:"0.82em",cursor:"pointer"}}>
        {passed?"Try Again":"Retry"}
      </button>
    </div>);
  }
  return(<div>
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:"0.72em",color:C.dim}}>Q {qi+1}/{questions.length}</span>
        <span style={{fontSize:"0.67em",fontWeight:700,textTransform:"uppercase",color:q.t==="fill"?C.yel:q.t==="rev"?C.pur:C.cyn}}>{q.t==="mc"?"MC":q.t==="fill"?"Fill":"Reverse"}</span>
      </div>
      <div style={{height:3,background:C.s3,borderRadius:2}}><div style={{height:"100%",background:C.grn,borderRadius:2,width:`${(qi+1)/questions.length*100}%`,transition:"width .3s"}}/></div>
    </div>
    <div style={{background:C.s3,border:`1px solid ${C.bdh}`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
      <p style={{fontWeight:700,color:C.txt,fontSize:"0.88em",lineHeight:1.6,margin:0}}>{q.q}</p>
    </div>
    {q.t==="fill"&&(<div style={{marginBottom:9}}>
      <input type="text" value={typed} onChange={e=>!sub&&setTyped(e.target.value)} onKeyDown={e=>e.key==="Enter"&&typed.trim()&&!sub&&submit()} disabled={sub} placeholder="Type the command..."
        style={{width:"100%",padding:"10px 13px",borderRadius:8,background:sub?(isOk?C.ga:C.ra):C.s1,border:`2px solid ${sub?(isOk?C.grn:C.red):C.bd}`,color:C.txt,fontFamily:C.mono,fontSize:"0.92em",outline:"none",transition:"all .2s"}}/>
      {sub&&<div style={{marginTop:3,fontSize:"0.76em",fontWeight:700,color:isOk?C.grn:C.red}}>{isOk?"✓ Correct!":"✗ Expected: "+q.a}</div>}
    </div>)}
    {(q.t==="mc"||q.t==="rev")&&(<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:9}}>
      {q.o.map((opt,i)=>{
        let bg=C.s1,bd=C.bd,col=C.dim;
        if(sub){if(i===q.a){bg=C.ga;bd=C.grn;col=C.grn;}else if(i===sel&&i!==q.a){bg=C.ra;bd=C.red;col=C.red;}}
        else if(sel===i){bg=C.ca;bd=C.cyn;col=C.txt;}
        return(<button key={i} onClick={()=>!sub&&setSel(i)} style={{textAlign:"left",padding:"9px 12px",borderRadius:8,cursor:sub?"default":"pointer",background:bg,border:`2px solid ${bd}`,color:col,fontFamily:C.sans,fontWeight:600,fontSize:"0.82em",display:"flex",gap:8,alignItems:"center",transition:"all .15s"}}>
          <span style={{width:18,height:18,borderRadius:"50%",flexShrink:0,background:sub&&i===q.a?C.grn:sub&&i===sel&&i!==q.a?C.red:C.s3,color:sub&&(i===q.a||i===sel)?C.bg:C.dim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.65em",fontWeight:900}}>
            {sub&&i===q.a?"✓":sub&&i===sel&&i!==q.a?"✗":String.fromCharCode(65+i)}
          </span>{opt}
        </button>);
      })}
    </div>)}
    {sub&&(<div style={{background:isOk?C.ga:C.ra,border:`1px solid ${isOk?C.grn:C.red}40`,borderRadius:8,padding:"10px 12px",marginBottom:9,fontSize:"0.8em",color:C.txt,lineHeight:1.6}}>
      <div style={{fontWeight:700,color:isOk?C.grn:C.red,fontSize:"0.69em",textTransform:"uppercase",marginBottom:2}}>{isOk?"✓ Correct":"✗ Explanation"}</div>{q.x}
    </div>)}
    {!sub
      ?<button onClick={submit} disabled={!canSub} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:canSub?C.cyn:C.s2,color:canSub?C.bg:C.dim,fontFamily:C.sans,fontWeight:800,fontSize:"0.83em",cursor:canSub?"pointer":"not-allowed",transition:"all .2s"}}>Submit</button>
      :<button onClick={next} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.grn},#00cc7d)`,color:C.bg,fontFamily:C.sans,fontWeight:800,fontSize:"0.83em",cursor:"pointer"}}>{qi<questions.length-1?"Next →":"See Score →"}</button>
    }
  </div>);
}

// ── Mini Practice (Say it in English, unit-specific) ──────────────────────────
function MiniPractice({lessonId}){
  const exercises=UE[lessonId]||[];
  const [idx,setIdx]=useState(0);
  const [typed,setTyped]=useState("");
  const [revealed,setRevealed]=useState(false);
  const [score,setScore]=useState(null);
  if(!exercises.length)return <div style={{padding:16,color:C.dim,fontSize:"0.85em",textAlign:"center"}}>No exercises for this unit yet.</div>;
  const ex=exercises[idx];
  const reveal=()=>{
    if(!typed.trim())return;setRevealed(true);
    const low=typed.toLowerCase();
    const hit=ex.k.filter(k=>low.includes(k.toLowerCase())).length;
    setScore(hit/ex.k.length>=0.6?"great":hit/ex.k.length>=0.3?"good":"miss");
  };
  const next=()=>{setIdx(i=>(i+1)%exercises.length);setTyped("");setRevealed(false);setScore(null);};
  const SC={great:{c:C.grn,l:"Great match! 🎯"},good:{c:C.yel,l:"Mostly there! 👍"},miss:{c:C.red,l:"Check the expected answer"}};
  return(<div>
    <div style={{display:"flex",gap:3,marginBottom:12}}>
      {exercises.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i===idx?C.cyn:i<idx?C.grn:C.s3,transition:"background .3s"}}/>)}
    </div>
    <div style={{background:"#04060e",border:`1px solid ${C.bd}`,borderRadius:10,padding:"12px 16px",marginBottom:12,fontFamily:C.mono}}>
      <div style={{fontSize:"0.66em",color:C.mut,marginBottom:4,letterSpacing:"0.05em"}}>COMMAND</div>
      <div style={{fontSize:"0.97em",fontWeight:500}}><span style={{color:C.mut}}>$ </span><span style={{color:C.grn}}>{ex.p}</span></div>
    </div>
    <div style={{fontSize:"0.77em",color:C.dim,marginBottom:7,display:"flex",gap:5,alignItems:"center"}}><span>✍️</span>Explain in plain English:</div>
    <textarea value={typed} onChange={e=>!revealed&&setTyped(e.target.value)} disabled={revealed} placeholder={`e.g. "This command..."`}
      style={{width:"100%",minHeight:70,borderRadius:8,background:C.s1,border:`1px solid ${C.bd}`,color:C.txt,fontFamily:C.sans,fontSize:"0.84em",padding:"9px 12px",resize:"vertical",outline:"none",marginBottom:8,lineHeight:1.5}}/>
    {!revealed
      ?<button onClick={reveal} disabled={!typed.trim()} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:typed.trim()?C.cyn:C.s2,color:typed.trim()?C.bg:C.dim,fontFamily:C.sans,fontWeight:800,fontSize:"0.83em",cursor:typed.trim()?"pointer":"not-allowed",transition:"all .2s"}}>Reveal Answer →</button>
      :(<div className="af">
          {score&&<div style={{background:SC[score].c+"20",border:`1px solid ${SC[score].c}40`,borderRadius:8,padding:"7px 12px",marginBottom:8,fontSize:"0.79em",fontWeight:700,color:SC[score].c}}>{SC[score].l}</div>}
          <div style={{background:C.s3,border:`1px solid ${C.bdh}`,borderRadius:8,padding:"10px 13px",marginBottom:8}}>
            <div style={{fontSize:"0.65em",fontWeight:700,color:C.grn,textTransform:"uppercase",marginBottom:4}}>✓ Expected</div>
            <p style={{color:C.txt,fontSize:"0.83em",lineHeight:1.6,margin:0}}>{ex.a}</p>
          </div>
          <button onClick={next} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.grn},#00cc7d)`,color:C.bg,fontFamily:C.sans,fontWeight:800,fontSize:"0.83em",cursor:"pointer"}}>
            {idx<exercises.length-1?"Next →":"Restart →"}
          </button>
        </div>)
    }
  </div>);
}

  {t:"h",c:"Script Arguments and Exit Codes"},
  {t:"code",code:"#!/bin/bash\n# Usage: ./greet.sh Alice 30\n\nif [ $# -lt 1 ]; then\n  echo \"Usage: $0 <name>\"\n  exit 1   # exit with error code\nfi\n\nNAME=$1\necho \"Hello, $NAME!\"\nexit 0   # exit with success",out:"Hello, Alice!\n(exit code 0 = success, 1 = error, checked by $?)"},
  {t:"h",c:"A Real-World Script"},
  {t:"code",code:"#!/bin/bash\n# disk_alert.sh — warn if disk is over 80% full\n\nUSAGE=$(df / | tail -1 | awk '{print $5}' | tr -d '%')\n\nif [ \"$USAGE\" -gt 80 ]; then\n  echo \"WARNING: Disk is ${USAGE}% full!\"\nelse\n  echo \"Disk OK — ${USAGE}% used\"\nfi",out:"Disk OK — 45% used"},
  {t:"tip",c:"Debug scripts with bash -x script.sh — it prints each command before executing it so you can see exactly what's happening. bash -n script.sh checks syntax without running anything."},
]},

{id:"ssh",title:"SSH & Remote Access",icon:"🔑",blocks:[
  {t:"p",c:"SSH (Secure Shell) lets you securely connect to remote Linux machines over a network. All communication is encrypted end-to-end. If you work with servers, SSH is how you get in — every developer, sysadmin, and DevOps engineer uses it daily."},
  {t:"h",c:"Connecting to a Remote Machine"},
  {t:"code",code:"ssh alice@192.168.1.100          # by IP address\nssh alice@server.example.com    # by hostname\nssh -p 2222 alice@server.com    # custom port (-p 22 is default)",out:"(prompts for password, then opens a remote shell session)"},
  {t:"p",c:"Once connected, you're in a full Linux shell on the remote machine. Everything you type runs there, not on your local machine. Type exit to disconnect."},
  {t:"h",c:"SSH Key Authentication (Passwordless & More Secure)"},
  {t:"p",c:"Keys are more secure than passwords and far more convenient. You generate a key pair: the private key stays secret on your machine, the public key goes on the server."},
  {t:"code",code:"# 1. Generate a key pair\nssh-keygen -t ed25519 -C 'alice@laptop'\n# Creates: ~/.ssh/id_ed25519      (private — NEVER share)\n#          ~/.ssh/id_ed25519.pub  (public — copy to servers)\n\n# 2. Copy public key to server\nssh-copy-id alice@server.com\n\n# 3. Connect — no password needed!\nssh alice@server.com",out:"Generating public/private ed25519 key pair...\nPublic key installed on server\nLogged in instantly — no password"},
  {t:"tip",c:"Never share your private key file (~/.ssh/id_ed25519). It's like giving someone your house key. Your public key (.pub) is safe to share — that's its purpose."},
  {t:"h",c:"The SSH Config File — Save Your Sanity"},
  {t:"code",code:"# File: ~/.ssh/config\n\nHost prod\n  HostName 203.0.113.42\n  User alice\n  Port 2222\n  IdentityFile ~/.ssh/id_ed25519\n\nHost staging\n  HostName staging.company.com\n  User deploy",out:""},
  {t:"code",code:"# Now connect with simple aliases:\nssh prod        # instead of: ssh -p 2222 alice@203.0.113.42\nssh staging     # instead of: ssh deploy@staging.company.com",out:"(config makes complex SSH connections one-word commands)"},
  {t:"h",c:"Copying Files Securely"},
  {t:"cmd",cmd:"scp"},
  {t:"code",code:"scp report.pdf alice@server:~/          # local → remote\nscp alice@server:/var/log/app.log ./    # remote → local\nscp -r ./project alice@server:~/        # entire directory",out:"(encrypts and transfers files over SSH)"},
  {t:"cmd",cmd:"rsync"},
  {t:"code",code:"rsync -avz ./src alice@server:~/src     # sync directory\nrsync -avzn ./src alice@server:~/src   # dry run first!\nrsync -avz alice@server:~/backups/ .   # pull from server",out:"(-a archive, -v verbose, -z compress, -n dry-run)\n(only transfers changed files — far faster than scp)"},
  {t:"h",c:"SSH Tunnel (Port Forwarding)"},
  {t:"code",code:"ssh -L 5432:localhost:5432 alice@server\n# Now: psql -h localhost -p 5432\n# Connects to server's PostgreSQL through encrypted tunnel",out:"(access remote services as if they were local)"},
  {t:"h",c:"Security Best Practices"},
  {t:"ul",items:["Use keys, not passwords — disable password auth on servers you control","Use ed25519 keys — smaller and more secure than RSA","Never commit private keys to Git — use .gitignore","Change the default SSH port (22) to reduce automated attack noise","Use fail2ban to auto-block IPs after repeated failed logins"]},
  {t:"tip",c:"Before disabling password auth on a server, open a second SSH session to verify your key works. Locking yourself out of a remote server with no console access is a painful lesson."},
]},

{id:"editors",title:"Text Editors",icon:"✏️",blocks:[
  {t:"p",c:"On a remote Linux server, you often need to edit configuration files directly in the terminal — there's no GUI. You need to know at least one terminal text editor. nano is the easiest. vim is everywhere and much more powerful once learned."},
  {t:"h",c:"nano — Start Here"},
  {t:"cmd",cmd:"nano"},
  {t:"code",code:"nano filename.txt\nnano /etc/nginx/nginx.conf\nnano +42 file.txt       # open at line 42\nnano -l file.txt        # show line numbers",out:"(opens the file in nano editor)"},
  {t:"p",c:"nano shows all its shortcuts at the bottom of the screen. The ^ symbol means Ctrl. You can just use it — no learning curve."},
  {t:"ul",items:["Ctrl+O → Save the file (write Out)","Ctrl+X → Exit nano","Ctrl+W → Search for text (Where is)","Ctrl+K → Cut the current line","Ctrl+U → Paste the cut line (Un-cut)","Ctrl+G → Open help","Ctrl+_ → Go to specific line number","Arrow keys → Navigate normally"]},
  {t:"h",c:"vim — The Terminal Power Tool"},
  {t:"cmd",cmd:"vim"},
  {t:"p",c:"vim is installed on virtually every Unix/Linux system ever made. Once you know it, you're never stuck. It uses modes — the same keys do different things in different modes."},
  {t:"ul",items:["Normal mode — the default. Press Esc to get here. Navigate with h/j/k/l or arrow keys","Insert mode — press i to type text. Press Esc to leave","Command mode — press : (colon) to run commands like save and quit","Visual mode — press v to select text for copy/delete"]},
  {t:"code",code:"vim filename.txt     # open file (starts in Normal mode)\ni                    # enter Insert mode → type text\nEsc                  # return to Normal mode\n\n# Command mode commands (press : first):\n:w                   # save (write)\n:q                   # quit\n:wq                  # save and quit\n:q!                  # FORCE quit — discard all changes\n:wq!                 # force save and quit",out:""},
  {t:"h",c:"vim Navigation (Normal Mode)"},
  {t:"code",code:"gg     → top of file          G    → bottom of file\n0      → start of line        $    → end of line\nw      → next word            b    → previous word\n/text  → search forward       n    → next match\ndd     → delete current line  5dd  → delete 5 lines\nyy     → copy (yank) line     p    → paste after cursor\nu      → undo                 Ctrl+R → redo",out:""},
  {t:"h",c:"The Essential vim Survival Guide"},
  {t:"code",code:"# Scenario: you're stuck in vim on a server\n\nEsc           # make sure you're in Normal mode\n:q!           # quit without saving (emergency exit)\n\n# Or if you want to save your changes:\nEsc\n:wq           # write (save) then quit",out:"(Every Linux admin has been stuck in vim at least once)"},
  {t:"h",c:"vim Efficiency Tricks"},
  {t:"code",code:":set number         # show line numbers\n:set syntax=on      # syntax highlighting\n:42                 # jump to line 42\n:%s/old/new/g       # replace ALL 'old' with 'new'\n:split file.txt     # open second file in split view",out:""},
  {t:"tip",c:"Type vimtutor in any terminal where vim is installed — it's a built-in 30-minute interactive tutorial. It teaches you vim by having you edit an actual file with exercises. Do it once and you'll know vim for life."},
  {t:"h",c:"Which Editor to Use When?"},
  {t:"ul",items:["Use nano for: quick config edits, unfamiliar servers, when you just need to change one line","Use vim for: daily coding, working in the terminal constantly, wanting lasting speed gains","Both are always worth knowing — you'll encounter vim even if you prefer nano"]},
]}
);

// ─── Additional Flashcards ────────────────────────────────────
AC.push(
  // Scripting
  {id:82,lid:"scripting",f:"What is a shebang line?",b:"#!/bin/bash at the top of a script. Tells Linux which interpreter to use. Without it, the OS doesn't know how to execute the file."},
  {id:83,lid:"scripting",f:"How do you make a script executable and run it?",b:"chmod +x script.sh makes it executable. ./script.sh runs it (the ./ means 'here in current dir')."},
  {id:84,lid:"scripting",f:"How do you define a variable in bash?",b:"NAME='Alice' (no spaces around =). Reference it with $NAME or ${NAME}. Always double-quote: \"$NAME\" to handle spaces safely."},
  {id:85,lid:"scripting",f:"What does [ -f file ] check?",b:"Tests if 'file' exists AND is a regular file. -d = directory, -e = anything exists, -z = string is empty, -n = string is not empty."},
  {id:86,lid:"scripting",f:"What are $1, $2, $#, $@ in a script?",b:"$1/$2 = first/second arguments. $# = total argument count. $@ = all arguments. $0 = script name. $? = exit code of last command."},
  {id:87,lid:"scripting",cmd:"nohup",f:"nohup",b:"No Hang Up — process ignores SIGHUP, so it keeps running after you close the terminal. nohup script.sh & runs it permanently in background."},
  {id:88,lid:"scripting",f:"What does bash -x script.sh do?",b:"Trace mode — prints every command before executing it. Essential for debugging. bash -n checks syntax without running anything."},
  {id:89,lid:"scripting",f:"What does exit 0 vs exit 1 mean in a script?",b:"exit 0 = success. exit 1 (or any non-zero) = failure. The exit code is stored in $? and checked by && and || operators."},
  // SSH
  {id:90,lid:"ssh",cmd:"ssh",f:"ssh",b:"Secure Shell — encrypts your terminal session to a remote machine. ssh alice@server.com opens a remote shell. All traffic is encrypted."},
  {id:91,lid:"ssh",cmd:"scp",f:"scp",b:"Secure Copy — transfers files over SSH. scp file.txt user@host:~/dir/ copies to server. scp user@host:~/file . copies from server."},
  {id:92,lid:"ssh",cmd:"rsync",f:"rsync",b:"Remote Sync — syncs files, only transferring what changed. rsync -avz ./src user@host:~/ syncs efficiently. Much faster than scp for large directories."},
  {id:93,lid:"ssh",f:"What is an SSH key pair?",b:"Private key (stays on your machine, never share) + public key (.pub, goes on servers). You prove identity by having the private key without revealing it."},
  {id:94,lid:"ssh",f:"What does ssh-copy-id do?",b:"Copies your public key to a remote server's authorized_keys file. After this, you can SSH in without a password — key authentication only."},
  {id:95,lid:"ssh",f:"What is ~/.ssh/config used for?",b:"Stores SSH aliases. Define Host blocks with HostName, User, Port, and IdentityFile. Then connect with just: ssh myalias instead of the full command."},
  {id:96,lid:"ssh",f:"What does ssh-keygen -t ed25519 create?",b:"An ed25519 key pair — modern, fast, and more secure than RSA. Creates ~/.ssh/id_ed25519 (private) and ~/.ssh/id_ed25519.pub (public)."},
  // Editors
  {id:97,lid:"editors",cmd:"nano",f:"nano",b:"Nano — beginner-friendly terminal editor. Shortcuts shown at bottom. Ctrl+O saves, Ctrl+X exits, Ctrl+W searches. ^ means Ctrl."},
  {id:98,lid:"editors",cmd:"vim",f:"vim",b:"Vi Improved — powerful modal editor installed everywhere. Normal mode for navigation, Insert (i) to type, Command (:) for save/quit. Esc returns to Normal."},
  {id:99,lid:"editors",f:"How do you save and quit in vim?",b:"Esc first (ensure Normal mode), then :wq (write + quit). :q! force-quits without saving. :w saves without quitting. :q quits if no unsaved changes."},
  {id:100,lid:"editors",f:"How do you enter and exit Insert mode in vim?",b:"Press i to enter Insert mode (can now type). Press Esc to return to Normal mode. In Normal mode, keyboard shortcuts navigate and command the file."},

function useMobile(){
  const [m,setM]=useState(typeof window!=='undefined'&&window.innerWidth<768);
  useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return m;
}

function sm2Rate(d,good){
  let {interval=0,reps=0,ef=2.5,seen=0}=d||{};
  if(good){
    if(reps===0)interval=1;
    else if(reps===1)interval=6;
    else interval=Math.round(interval*ef);
    reps++;
    ef=Math.min(2.5,Math.max(1.3,ef+0.08));
  } else {
    interval=1;
    reps=Math.max(0,reps-1);
    ef=Math.max(1.3,ef-0.15);
  }
  const nextReview=Date.now()+(interval===0?0:interval*24*60*60*1000);
  return {interval,reps,ef,nextReview,seen:seen+1};
}

function renderBlock(b,i){
  if(b.t==="p")return <p key={i} style={{color:C.dim,marginBottom:11,lineHeight:1.7,fontSize:"0.92em"}}>{b.c}</p>;
  if(b.t==="h")return <h2 key={i} style={{color:C.txt,fontWeight:800,fontSize:"1.03em",marginTop:20,marginBottom:7,borderBottom:`1px solid ${C.bd}`,paddingBottom:5}}>{b.c}</h2>;
  if(b.t==="cmd")return <CmdBadge key={i} cmd={b.cmd}/>;
  if(b.t==="code")return <CodeBlock key={i} code={b.code} out={b.out}/>;
  if(b.t==="tip")return <Tip key={i} c={b.c}/>;
  if(b.t==="building-map")return <BuildingMap key={i}/>;
  if(b.t==="ul")return(<ul key={i} style={{margin:"7px 0 13px",paddingLeft:0,listStyle:"none"}}>{b.items.map((it,j)=><li key={j} style={{display:"flex",gap:8,alignItems:"flex-start",color:C.dim,fontSize:"0.87em",lineHeight:1.65,marginBottom:5}}><span style={{color:C.grn,flexShrink:0,marginTop:3}}>›</span>{it}</li>)}</ul>);
  if(b.t==="objectives")return(<div key={i} style={{background:C.ca,border:`1px solid ${C.cyn}35`,borderLeft:`4px solid ${C.cyn}`,borderRadius:10,padding:"13px 16px",marginBottom:18}}>
    <div style={{fontSize:"0.72em",fontWeight:900,color:C.cyn,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:9}}>🎯 What You'll Learn</div>
    {b.items.map((it,j)=><div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",color:C.txt,fontSize:"0.87em",lineHeight:1.6,marginBottom:5}}><span style={{color:C.cyn,flexShrink:0,marginTop:2}}>✓</span>{it}</div>)}
  </div>);
  if(b.t==="summary")return(<div key={i} style={{background:C.ga,border:`1px solid ${C.grn}35`,borderLeft:`4px solid ${C.grn}`,borderRadius:10,padding:"13px 16px",margin:"18px 0 12px"}}>
    <div style={{fontSize:"0.72em",fontWeight:900,color:C.grn,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:9}}>📌 Key Takeaways</div>
    {b.items.map((it,j)=><div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",color:C.txt,fontSize:"0.87em",lineHeight:1.6,marginBottom:5}}><span style={{color:C.grn,flexShrink:0,marginTop:2}}>›</span>{it}</div>)}
  </div>);
  if(b.t==="errors")return(<div key={i} style={{margin:"18px 0"}}>
    <div style={{fontSize:"0.72em",fontWeight:900,color:C.red,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:9}}>⚠️ Common Errors & Fixes</div>

      <button key={l.id} onClick={()=>setLid(l.id)} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 13px",borderRadius:20,border:`1px solid ${lid===l.id?C.grn:C.bd}`,background:lid===l.id?C.grn:"transparent",color:lid===l.id?C.bg:C.dim,fontFamily:C.sans,fontWeight:700,fontSize:"0.73em",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,minHeight:40,transition:"all .15s"}}>
        <span>{l.icon}</span>{l.title.split(" ").slice(0,2).join(" ")}{read?<span> ✓</span>:null}
      </button>
    ):(
      <button key={l.id} onClick={()=>setLid(l.id)} style={{width:"100%",textAlign:"left",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"9px 10px",borderRadius:7,marginBottom:2,background:lid===l.id?C.s3:"transparent",borderLeft:lid===l.id?`3px solid ${C.grn}`:"3px solid transparent",color:lid===l.id?C.txt:C.dim,fontFamily:C.sans,fontSize:"0.79em",fontWeight:lid===l.id?800:600,transition:"all .15s",minHeight:40}}>
        <span style={{display:"flex",alignItems:"center",gap:7}}><span>{l.icon}</span>{l.title}</span>
        {read&&<span style={{color:C.grn,fontSize:"0.85em",flexShrink:0}}>✓</span>}
      </button>
    );
  });
  if(mobile)return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{flexShrink:0,borderBottom:`1px solid ${C.bd}`,background:C.s1,overflowX:"auto",whiteSpace:"nowrap",padding:"7px 10px",display:"flex",gap:5}}>{lessonBtns}</div>
      <div ref={ref} style={{flex:1,overflowY:"auto",padding:"18px 16px"}}><LessonView lesson={lesson} onMarkRead={onMarkRead} isRead={isRead}/></div>
    </div>
  );
  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      <div style={{width:192,flexShrink:0,borderRight:`1px solid ${C.bd}`,overflowY:"auto",padding:"10px 7px",background:C.s1}}>{lessonBtns}</div>
      <div ref={ref} style={{flex:1,overflowY:"auto",padding:"22px 26px"}}><LessonView lesson={lesson} onMarkRead={onMarkRead} isRead={isRead}/></div>
    </div>
  );
}

function QuizEngine({questions,title,onBack,onComplete}){
  const [phase,setPhase]=useState("intro");
  const [qi,setQi]=useState(0);
  const [ans,setAns]=useState({});
  const [sel,setSel]=useState(null);
  const [typed,setTyped]=useState("");
  const [sub,setSub]=useState(false);
  const q=questions[qi];
  const correct=(a)=>q?.t==="fill"?a?.trim().toLowerCase()===q.a.toLowerCase():parseInt(a)===q.a;
  const submit=()=>{const a=q.t==="fill"?typed:sel?.toString();if(a===undefined||a===null)return;setAns(prev=>({...prev,[q.id]:a}));setSub(true);};
  const next=()=>{if(qi<questions.length-1){setQi(i=>i+1);setSel(null);setTyped("");setSub(false);}else setPhase("result");};
  const reset=()=>{setPhase("intro");setQi(0);setAns({});setSel(null);setTyped("");setSub(false);};
  const score=questions.filter(q=>{const a=ans[q.id];if(a===undefined||a===null)return false;return q.t==="fill"?a.trim().toLowerCase()===q.a.toLowerCase():parseInt(a)===q.a;}).length;
  const pct=Math.round(score/questions.length*100);
  const passed=pct>=75;
  const curAns=q?.t==="fill"?typed:sel?.toString();
  const isOk=sub?correct(curAns):null;
  const canSub=q?.t==="fill"?typed.trim():sel!==null;
  useEffect(()=>{if(phase==="result"&&onComplete)onComplete(pct);},[phase]);
  if(phase==="intro")return(<div style={{padding:"22px 20px",maxWidth:460,margin:"0 auto",overflowY:"auto",height:"100%"}}>
    <button onClick={onBack} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:"0.81em",fontFamily:C.sans,marginBottom:18,display:"flex",alignItems:"center",gap:5,minHeight:44}}>← Back</button>
    <div className="ab" style={{textAlign:"center",paddingTop:10}}>
      <div style={{fontSize:"2.5em",marginBottom:12}}>🧠</div>
      <h2 style={{color:C.txt,fontWeight:900,fontSize:"1.4em",marginBottom:6}}>{title}</h2>
      <p style={{color:C.dim,fontSize:"0.87em",marginBottom:24,lineHeight:1.6}}>{questions.length} questions · 75% to pass · Explanation on every wrong answer</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:24}}>
        {[["🔤","Multiple Choice","4 options"],["✍️","Fill in Blank","Type the answer"],["🔄","Reverse","Name the command"]].map(([ic,t,d])=>(
          <div key={t} style={{background:C.s2,border:`1px solid ${C.bd}`,borderRadius:9,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:"1.3em",marginBottom:5}}>{ic}</div>
            <div style={{fontWeight:700,color:C.txt,fontSize:"0.77em"}}>{t}</div>
            <div style={{color:C.dim,fontSize:"0.7em",marginTop:2}}>{d}</div>
          </div>
        ))}
      </div>
      <button onClick={()=>setPhase("quiz")} style={{padding:"12px 40px",borderRadius:30,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${C.grn},#00cc7d)`,color:C.bg,fontFamily:C.sans,fontWeight:900,fontSize:"0.95em",minHeight:44}}>Start →</button>
    </div>
  </div>);
  if(phase==="result")return(<div style={{padding:"22px 20px",maxWidth:440,margin:"0 auto",overflowY:"auto",height:"100%"}}>
    <button onClick={onBack} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:"0.81em",fontFamily:C.sans,marginBottom:16,display:"flex",alignItems:"center",gap:5,minHeight:44}}>← Back</button>
    <div className="ab" style={{textAlign:"center"}}>
      <div style={{fontSize:"2.8em",marginBottom:8}}>{passed?"🎉":"💪"}</div>
      <h2 style={{color:passed?C.grn:C.ora,fontWeight:900,fontSize:"1.6em",marginBottom:4}}>{passed?"Passed!":"Not quite"}</h2>
      <div style={{fontSize:"3em",fontWeight:900,color:pct>=75?C.grn:pct>=50?C.yel:C.red,marginBottom:4}}>{pct}%</div>
      <div style={{color:C.dim,marginBottom:4}}>{score}/{questions.length} correct</div>
      <div style={{color:passed?C.grn:C.red,fontSize:"0.8em",fontWeight:700,marginBottom:20}}>{passed?"✓ 75% threshold met":"✗ Need 75% — review the lesson and retry"}</div>
      <div style={{background:C.s2,border:`1px solid ${C.bd}`,borderRadius:10,padding:"10px 14px",marginBottom:20,textAlign:"left"}}>
        {questions.map((q,i)=>{const a=ans[q.id];const ok=q.t==="fill"?a?.trim().toLowerCase()===q.a.toLowerCase():parseInt(a)===q.a;return(<div key={q.id} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<questions.length-1?`1px solid ${C.bd}`:"none"}}><span style={{color:ok?C.grn:C.red,fontWeight:700,flexShrink:0}}>{ok?"✓":"✗"}</span><span style={{fontSize:"0.8em",color:ok?C.dim:C.txt,lineHeight:1.4}}>{q.q}</span></div>);})}
      </div>
      <button onClick={reset} style={{padding:"11px 32px",borderRadius:30,cursor:"pointer",fontFamily:C.sans,fontWeight:800,fontSize:"0.9em",background:passed?C.ga:C.oa,color:passed?C.grn:C.ora,border:`2px solid ${passed?C.grn:C.ora}`,minHeight:44}}>{passed?"Take Again":"🔄 Retry"}</button>
    </div>
  </div>);
  return(<div style={{padding:"16px 20px",maxWidth:510,margin:"0 auto",overflowY:"auto",height:"100%"}}>
    <button onClick={onBack} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:"0.81em",fontFamily:C.sans,marginBottom:13,display:"flex",alignItems:"center",gap:5,minHeight:44}}>← Back</button>
    <div style={{marginBottom:15}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:"0.75em",color:C.dim}}>Q {qi+1}/{questions.length}</span>
        <span style={{fontSize:"0.69em",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",color:q.t==="fill"?C.yel:q.t==="rev"?C.pur:C.cyn}}>{q.t==="mc"?"Multiple Choice":q.t==="fill"?"Fill in Blank":"Reverse Quiz"}</span>
      </div>
      <div style={{height:4,background:C.s2,borderRadius:2}}><div style={{height:"100%",background:C.grn,borderRadius:2,width:`${(qi+1)/questions.length*100}%`,transition:"width .3s"}}/></div>
    </div>
    <div className="au" style={{background:C.s2,border:`1px solid ${C.bdh}`,borderRadius:11,padding:"15px 18px",marginBottom:14}}>
      <p style={{fontWeight:700,color:C.txt,fontSize:"0.95em",lineHeight:1.65,margin:0}}>{q.q}</p>
    </div>
    {q.t==="fill"&&(<div style={{marginBottom:12}}>
      <input type="text" value={typed} onChange={e=>!sub&&setTyped(e.target.value)} onKeyDown={e=>e.key==="Enter"&&typed.trim()&&!sub&&submit()} disabled={sub} placeholder="Type the command..."
        style={{width:"100%",padding:"12px 15px",borderRadius:9,background:sub?(isOk?C.ga:C.ra):C.s1,border:`2px solid ${sub?(isOk?C.grn:C.red):C.bd}`,color:C.txt,fontFamily:C.mono,fontSize:"0.97em",outline:"none",transition:"all .2s",minHeight:44}}/>
      {sub&&<div className="af" style={{marginTop:4,fontSize:"0.79em",fontWeight:700,color:isOk?C.grn:C.red}}>{isOk?"✓ Correct!":"✗ Expected: "+q.a}</div>}
    </div>)}
    {(q.t==="mc"||q.t==="rev")&&(<div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
      {q.o.map((opt,i)=>{let bg=C.s1,bd=C.bd,col=C.dim;if(sub){if(i===q.a){bg=C.ga;bd=C.grn;col=C.grn;}else if(i===sel&&i!==q.a){bg=C.ra;bd=C.red;col=C.red;}}else if(sel===i){bg=C.ca;bd=C.cyn;col=C.txt;}return(<button key={i} onClick={()=>!sub&&setSel(i)} style={{textAlign:"left",padding:"10px 14px",borderRadius:9,cursor:sub?"default":"pointer",background:bg,border:`2px solid ${bd}`,color:col,fontFamily:C.sans,fontWeight:600,fontSize:"0.86em",display:"flex",gap:8,alignItems:"center",transition:"all .15s",minHeight:44}}><span style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:sub&&i===q.a?C.grn:sub&&i===sel&&i!==q.a?C.red:C.s3,color:sub&&(i===q.a||i===sel)?C.bg:C.dim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.69em",fontWeight:900}}>{sub&&i===q.a?"✓":sub&&i===sel&&i!==q.a?"✗":String.fromCharCode(65+i)}</span>{opt}</button>);})}</div>)}
    {sub&&(<div className="af" style={{background:isOk?C.ga:C.ra,border:`1px solid ${isOk?C.grn:C.red}40`,borderRadius:9,padding:"11px 14px",marginBottom:12,fontSize:"0.84em",color:C.txt,lineHeight:1.65}}><div style={{fontWeight:700,color:isOk?C.grn:C.red,fontSize:"0.71em",textTransform:"uppercase",marginBottom:3}}>{isOk?"✓ Correct":"✗ Explanation"}</div>{q.x}</div>)}
    {!sub?<button onClick={submit} disabled={!canSub} style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:canSub?C.cyn:C.s2,color:canSub?C.bg:C.dim,fontFamily:C.sans,fontWeight:800,fontSize:"0.87em",cursor:canSub?"pointer":"not-allowed",transition:"all .2s",minHeight:44}}>Submit Answer</button>
    :<button onClick={next} style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.grn},#00cc7d)`,color:C.bg,fontFamily:C.sans,fontWeight:800,fontSize:"0.87em",cursor:"pointer",minHeight:44}}>{qi<questions.length-1?"Next Question →":"See Results →"}</button>}
  </div>);
}

function QuizTab({quizScores,onScoreUpdate}){
  const [active,setActive]=useState(null);
  const handleComplete=(score)=>{if(active&&onScoreUpdate)onScoreUpdate(active.lid,score);};
  if(active){const qs=AQ.filter(q=>q.lid===active.lid);return <QuizEngine key={active.lid} questions={qs} title={active.title} onBack={()=>setActive(null)} onComplete={handleComplete}/>;}
  const cnt=(lid)=>AQ.filter(q=>q.lid===lid).length;
  return(<div style={{padding:"18px 20px",maxWidth:580,margin:"0 auto",overflowY:"auto",height:"100%"}}>
    <div style={{marginBottom:20}}><h2 style={{color:C.txt,fontWeight:900,fontSize:"1.15em",marginBottom:4}}>Linux Quiz</h2><p style={{color:C.dim,fontSize:"0.82em"}}>Drill a specific topic, or take the full course exam.</p></div>
    <button onClick={()=>setActive({lid:"full",title:"🏆 Full Course Exam"})} style={{width:"100%",textAlign:"left",cursor:"pointer",marginBottom:16,background:`linear-gradient(135deg,${C.s2},${C.s3})`,border:`2px solid ${C.grn}50`,borderRadius:14,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,minHeight:60}}>
      <span style={{fontSize:"2.4em"}}>🏆</span>
      <div style={{flex:1}}><div style={{fontWeight:900,color:C.grn,fontSize:"1.03em",marginBottom:3}}>Full Course Exam</div><div style={{color:C.dim,fontSize:"0.81em"}}>{cnt("full")} questions across all {LESSONS.length} lessons · 75% to pass</div></div>
      <span style={{color:C.grn,fontSize:"1.2em"}}>→</span>
    </button>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{flex:1,height:1,background:C.bd}}/><span style={{fontSize:"0.72em",color:C.dim,fontWeight:700}}>OR DRILL BY LESSON</span><div style={{flex:1,height:1,background:C.bd}}/></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
      {LESSONS.map(l=>{const score=quizScores&&quizScores[l.id];const passed=score>=75;return(<button key={l.id} onClick={()=>setActive({lid:l.id,title:`${l.icon} ${l.title}`})} style={{textAlign:"center",cursor:"pointer",background:C.s2,border:`1px solid ${score!==undefined?(passed?C.grn:C.red):C.bd}`,borderRadius:11,padding:"13px 9px",display:"flex",flexDirection:"column",alignItems:"center",gap:5,minHeight:80}}>
        <span style={{fontSize:"1.6em"}}>{l.icon}</span>
        <div style={{fontWeight:700,color:C.txt,fontSize:"0.76em",lineHeight:1.3}}>{l.title}</div>
        <div style={{fontSize:"0.67em",color:C.dim}}>{cnt(l.id)} q</div>
        {score!==undefined&&<div style={{fontSize:"0.67em",fontWeight:700,color:passed?C.grn:C.red}}>{score}% {passed?"✓":"✗"}</div>}
      </button>);})}
    </div>
  </div>);
}

function App(){
  const [tab,setTab]=useState("home");
  const [readLessons,setReadLessons]=useState(new Set());
  const [quizScores,setQuizScores]=useState({});
  const [cardStats,setCardStats]=useState({mastered:0,due:0,total:AC.length});
  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage?.get("lx-read");if(r?.value)setReadLessons(new Set(JSON.parse(r.value)));}catch{}
      try{const r=await window.storage?.get("lx-scores");if(r?.value)setQuizScores(JSON.parse(r.value));}catch{}
      try{const r=await window.storage?.get("lx-v3");if(r?.value){const p=JSON.parse(r.value);const now=Date.now();const mastered=AC.filter(c=>(p[c.id]?.reps||0)>=3).length;const due=AC.filter(c=>{const d=p[c.id];return !d||!d.nextReview||d.nextReview<=now;}).length;setCardStats({mastered,due,total:AC.length});}}catch{}
    })();
  },[]);
  const markRead=(lid)=>{const next=new Set([...readLessons,lid]);setReadLessons(next);window.storage?.set("lx-read",JSON.stringify([...next])).catch(()=>{});};
  const saveScore=(lid,score)=>{const next={...quizScores,[lid]:score};setQuizScores(next);window.storage?.set("lx-scores",JSON.stringify(next)).catch(()=>{});};
  const TABS=[{id:"home",label:"Home",icon:"🏠"},{id:"learn",label:"Learn",icon:"📖"},{id:"cards",label:"Flashcards",icon:"🃏"},{id:"quiz",label:"Quiz",icon:"🧠"},{id:"practice",label:"Practice",icon:"✍️"}];
  return(<>
    <style>{CSS}</style>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg,fontFamily:C.sans,overflow:"hidden"}}>
      <div style={{borderBottom:`1px solid ${C.bd}`,background:C.s1,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,height:48}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}><div style={{background:C.grn,color:C.bg,fontFamily:C.mono,fontWeight:700,fontSize:"0.8em",padding:"3px 9px",borderRadius:6}}>~/linux</div><span style={{color:C.dim,fontSize:"0.76em"}}>Learn Linux from Zero</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:"0.66em",color:C.mut,fontFamily:C.mono}}>{readLessons.size}/{LESSONS.length} done</span><div style={{width:7,height:7,borderRadius:"50%",background:C.grn,animation:"bl 1.2s step-end infinite"}}/></div>
      </div>
      <div style={{display:"flex",borderBottom:`1px solid ${C.bd}`,background:C.s1,flexShrink:0}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"7px 3px",border:"none",cursor:"pointer",background:"transparent",borderBottom:`2px solid ${tab===t.id?C.grn:"transparent"}`,color:tab===t.id?C.grn:C.dim,fontFamily:C.sans,fontWeight:700,fontSize:"0.71em",display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all .15s",minHeight:46,justifyContent:"center"}}><span style={{fontSize:"1.05em"}}>{t.icon}</span>{t.label}</button>)}
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="home"     &&<HomeTab readLessons={readLessons} quizScores={quizScores} cardStats={cardStats}/>}
        {tab==="learn"    &&<LearnTab readLessons={readLessons} onMarkRead={markRead}/>}
        {tab==="cards"    &&<FlashcardsTab onStatsUpdate={setCardStats}/>}
        {tab==="quiz"     &&<QuizTab quizScores={quizScores} onScoreUpdate={saveScore}/>}
        {tab==="practice" &&<PracticeTab/>}
      </div>
    </div>
  </>);
}


const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App />);

</script>
</body>
</html>
