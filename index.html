{ t:'BGP',       s:'Border Gateway Protocol',            cat:'Network',  d:'The routing protocol of the internet. How ISPs and large networks exchange routing info. AS (Autonomous Systems) communicate via BGP. BGP hijacking is a real-world attack.' },
{ t:'CDN',       s:'Content Delivery Network',           cat:'Network',  d:'Distributed server network that caches content geographically closer to users. Reduces latency, absorbs DDoS. Examples: Cloudflare, Akamai, AWS CloudFront.' },
{ t:'CIDR',      s:'Classless Inter-Domain Routing',     cat:'Network',  d:'IP addressing method. 192.168.1.0/24 = 254 usable hosts. /24 = 256 IPs, /16 = 65,536, /8 = 16M. Calculate: 2^(32-prefix) total IPs.' },
{ t:'DHCP',      s:'Dynamic Host Config Protocol',       cat:'Network',  d:'Automatically assigns IP, subnet, gateway, DNS to devices. Uses UDP ports 67/68. Rogue DHCP server attack redirects traffic. Config: /etc/dhcpd.conf.' },
{ t:'DNS',       s:'Domain Name System',                 cat:'Network',  d:'The "phonebook" of the internet — converts names to IPs. Records: A (IPv4), AAAA (IPv6), MX (mail), CNAME (alias), TXT (verification), NS (nameserver), PTR (reverse). Config: /etc/resolv.conf.' },
{ t:'FTP',       s:'File Transfer Protocol',             cat:'Network',  d:'Transfers files (ports 20/21). Sends credentials in PLAINTEXT — never use over untrusted networks. Replace with SFTP or FTPS. Active vs Passive modes matter for firewalls.' },
{ t:'HTTP',      s:'HyperText Transfer Protocol',        cat:'Network',  d:'Web protocol (port 80). Stateless. Methods: GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Status codes: 200 OK, 301 redirect, 403 forbidden, 404 not found, 500 server error.' },
{ t:'HTTPS',     s:'HTTP Secure',                        cat:'Network',  d:'HTTP encrypted with TLS (port 443). Uses X.509 certificates. Check cert: echo | openssl s_client -connect host:443. HSTS forces HTTPS for a domain.' },
{ t:'ICMP',      s:'Internet Control Message Protocol',  cat:'Network',  d:'Used by ping and traceroute. Type 8 = Echo Request, Type 0 = Echo Reply. Often blocked by firewalls. Smurf attacks amplify ICMP floods.' },
{ t:'IP',        s:'Internet Protocol',                  cat:'Network',  d:'Layer 3 protocol. IPv4: 32-bit (e.g., 192.168.1.1). IPv6: 128-bit (e.g., 2001:db8::1). Routable worldwide. Private ranges: 10.x.x.x, 172.16-31.x.x, 192.168.x.x.' },
{ t:'IPTables',  s:'IP Packet Filter Rules',             cat:'Network',  d:'Linux kernel firewall tool. Rules in chains (INPUT, OUTPUT, FORWARD) in tables (filter, nat, mangle). Replaced by nftables in newer kernels. View: iptables -L -n -v.' },
{ t:'LDAP',      s:'Lightweight Directory Access Proto', cat:'Network',  d:'Protocol for accessing directory services (user databases). Used by Active Directory, OpenLDAP. Default port 389 (636 for LDAPS). Common in enterprise environments.' },
{ t:'MAC',       s:'Media Access Control Address',       cat:'Network',  d:'Hardware address burned into every NIC — 6 bytes (e.g., AA:BB:CC:DD:EE:FF). Layer 2 addressing. Only relevant within a local network segment. Can be spoofed: ip link set eth0 address XX:XX:XX:XX:XX:XX.' },
{ t:'MTU',       s:'Maximum Transmission Unit',          cat:'Network',  d:'Maximum packet size a network interface can transmit. Default Ethernet: 1500 bytes. Jumbo frames: 9000 bytes. Misconfigured MTU causes slow connections and packet fragmentation.' },
{ t:'NAT',       s:'Network Address Translation',        cat:'Network',  d:'Translates private IPs to a public IP at the router. Allows many devices to share one public IP. Masquerade (SNAT) and DNAT for port forwarding. Linux: iptables -t nat.' },
{ t:'NFS',       s:'Network File System',                cat:'Network',  d:'Protocol for mounting remote filesystems over a network. Config in /etc/exports. Version 4 adds security. NFSv3 with no_root_squash is a common misconfiguration and privilege escalation path.' },
{ t:'NTP',       s:'Network Time Protocol',              cat:'Network',  d:'Synchronizes system clocks over a network (port 123/UDP). Critical for logs, TLS, Kerberos, 2FA. Check sync: timedatectl status. Server: chrony or ntpd.' },
{ t:'OSI',       s:'Open Systems Interconnection Model', cat:'Network',  d:'7-layer network model: 1=Physical, 2=Data Link(MAC), 3=Network(IP), 4=Transport(TCP/UDP), 5=Session, 6=Presentation(TLS), 7=Application(HTTP). "Please Do Not Throw Sausage Pizza Away."' },
{ t:'PACKET',    s:'Network Data Unit',                  cat:'Network',  d:'A unit of data transmitted over a network. Contains headers (source/dest IP, port, protocol) and payload. Capture with: tcpdump or Wireshark.' },
{ t:'PORT',      s:'Network Service Endpoint',           cat:'Network',  d:'16-bit number (0-65535) identifying a service. Well-known: 0-1023 (need root). Registered: 1024-49151. Dynamic: 49152-65535. Common: 22=SSH, 80=HTTP, 443=HTTPS, 3306=MySQL.' },
{ t:'PROXY',     s:'Intermediary Server',                cat:'Network',  d:'Sits between client and server. Forward proxy: client uses it to reach internet (hide IP). Reverse proxy: receives client requests and forwards to backend servers (nginx, HAProxy). Transparent proxy intercepts without config.' },
{ t:'ROUTE',     s:'Network Routing Table',              cat:'Network',  d:'Determines where packets go. ip route show or route -n. Add: ip route add 10.0.0.0/8 via 192.168.1.1. Default route (0.0.0.0/0) is where unknown packets go.' },
{ t:'SMTP',      s:'Simple Mail Transfer Protocol',      cat:'Network',  d:'Email sending protocol (port 25, 587 for submission, 465 for SSL). Only for sending, not reading. Often blocked by ISPs to prevent spam. Test: telnet mailserver 25.' },
{ t:'SNMP',      s:'Simple Network Mgmt Protocol',       cat:'Network',  d:'Monitor and manage network devices (routers, switches) on port 161/UDP. Community string acts as password. Default "public" string is a common misconfiguration — major security risk.' },
{ t:'SSH',       s:'Secure Shell',                       cat:'Network',  d:'Encrypted remote access protocol (port 22). Key-based auth is stronger than passwords. Config: /etc/ssh/sshd_config. Supports tunneling, SFTP, port forwarding. Algorithm: ed25519 (best) or RSA 4096.' },
{ t:'SSL',       s:'Secure Sockets Layer',               cat:'Network',  d:'Predecessor to TLS — now deprecated and considered insecure (SSLv2, SSLv3 have known vulnerabilities). Modern systems use TLS 1.2 or 1.3. People still say "SSL" but mean TLS.' },
{ t:'TCP',       s:'Transmission Control Protocol',      cat:'Network',  d:'Connection-oriented, reliable protocol. 3-way handshake: SYN → SYN-ACK → ACK. Guarantees delivery and order. Slower than UDP. Port scanned by default with nmap. Layer 4.' },
{ t:'TLS',       s:'Transport Layer Security',           cat:'Network',  d:'Encrypts data in transit. TLS 1.3 is current standard. Uses asymmetric crypto for handshake, symmetric for data. Check: openssl s_client -connect host:443. Vulnerabilities: BEAST, POODLE, Heartbleed (older versions).' },
{ t:'UDP',       s:'User Datagram Protocol',             cat:'Network',  d:'Connectionless, fast protocol. No delivery guarantee, no ordering. Used for DNS, DHCP, VoIP, video streaming, gaming. UDP flood is a common DDoS attack. Layer 4.' },
{ t:'VLAN',      s:'Virtual Local Area Network',         cat:'Network',  d:'Logically segments a network at Layer 2 regardless of physical location. VLAN tags added to frames (802.1Q). VLAN hopping attacks bypass segmentation via switch misconfiguration.' },
{ t:'VPN',       s:'Virtual Private Network',            cat:'Network',  d:'Encrypts all traffic and routes through a remote server. Protocols: OpenVPN, WireGuard (modern, fast), IPSec, L2TP. On Linux: wg-quick up wg0 or openvpn --config file.ovpn.' },

/* ── SECURITY ───────────────────────────────────────── */
{ t:'2FA',       s:'Two-Factor Authentication',          cat:'Security', d:'Requires two verification factors: something you know (password) + something you have (TOTP app) or are (biometric). TOTP (Time-based OTP) uses 30-second rotating codes via apps like Authy.' },
{ t:'AES',       s:'Advanced Encryption Standard',       cat:'Security', d:'Symmetric block cipher — the global encryption standard. AES-128, AES-192, AES-256. Used in TLS, disk encryption (LUKS), file encryption. No known practical attacks against AES-256.' },
{ t:'AUDIT',     s:'Linux Audit System',                 cat:'Security', d:'Kernel subsystem that logs security-relevant events. auditd daemon writes to /var/log/audit/audit.log. Configure rules: auditctl -w /etc/passwd -p wa (watch passwd for write/attr changes).' },
{ t:'BRUTE',     s:'Brute Force Attack',                 cat:'Security', d:'Trying all possible password combinations until one works. Mitigate with: fail2ban, account lockout, strong passwords, key-based auth. Tools attackers use: hydra, john, hashcat.' },
{ t:'CIA',       s:'Confidentiality Integrity Avail.',   cat:'Security', d:'The three pillars of information security. Confidentiality (only authorized access), Integrity (data not tampered with), Availability (system accessible when needed). Also called CIA Triad.' },
{ t:'CVE',       s:'Common Vulnerabilities & Exposures', cat:'Security', d:'Standardized identifiers for known security vulnerabilities. Format: CVE-YEAR-NUMBER. Example: CVE-2021-44228 (Log4Shell). Check if you\'re vulnerable: search CVE databases at nvd.nist.gov.' },
{ t:'CVSS',      s:'Common Vulnerability Scoring System',cat:'Security', d:'Rates severity of vulnerabilities 0-10. Critical=9+, High=7-8.9, Medium=4-6.9, Low=0.1-3.9. Score considers: attack vector, complexity, privileges needed, user interaction, impact.' },
{ t:'DDOS',      s:'Distributed Denial of Service',      cat:'Security', d:'Floods a target with traffic from thousands of compromised machines (botnet) until it goes offline. Types: SYN flood, UDP flood, HTTP flood, DNS amplification. Mitigated by CDNs and rate limiting.' },
{ t:'EXPLOIT',   s:'Vulnerability Exploitation Code',    cat:'Security', d:'Code that takes advantage of a software vulnerability. Categories: local (need existing access), remote (over network). Staged vs stageless payloads. CVE tracks known vulnerabilities.' },
{ t:'FAIL2BAN',  s:'Automatic IP Banner',                cat:'Security', d:'Scans logs and automatically bans IPs with too many failures. Configures iptables rules. Jails defined per service. Config: /etc/fail2ban/jail.local. Status: fail2ban-client status sshd.' },
{ t:'FIREWALL',  s:'Network Traffic Filter',             cat:'Security', d:'Controls inbound/outbound network traffic by rules. Linux tools: ufw (simple), iptables/nftables (advanced). Stateful firewalls track connections. Application firewalls (WAF) work at Layer 7.' },
{ t:'GnuPG',     s:'GNU Privacy Guard',                  cat:'Security', d:'OpenPGP implementation. gpg --gen-key (create keypair), gpg --encrypt -r user@email file (encrypt), gpg --decrypt file.gpg (decrypt), gpg --sign file (sign). Used for email, package verification, git commits.' },
{ t:'HASH',      s:'Cryptographic Hash Function',        cat:'Security', d:'One-way function converting data to fixed-size digest. MD5 (broken), SHA-1 (weak), SHA-256 (good), SHA-512 (best). Linux passwords use SHA-512 + salt in /etc/shadow. Use sha256sum to verify files.' },
{ t:'IDS',       s:'Intrusion Detection System',         cat:'Security', d:'Monitors network/system for suspicious activity and alerts (but does not block). Signature-based detects known attacks; anomaly-based flags deviations. Examples: Snort, Suricata, AIDE (file changes).' },
{ t:'IPS',       s:'Intrusion Prevention System',        cat:'Security', d:'Like IDS but actively blocks detected threats. Sits inline in the network. False positives can block legitimate traffic — tune carefully. Suricata can run as both IDS and IPS.' },
{ t:'LUKS',      s:'Linux Unified Key Setup',            cat:'Security', d:'Full-disk encryption standard for Linux. cryptsetup manages LUKS volumes. 5 key slots allow up to 5 passphrases. Encrypts at the block device level — OS can\'t see data without the key.' },
{ t:'MITM',      s:'Man-in-the-Middle Attack',           cat:'Security', d:'Attacker secretly intercepts and possibly alters communication between two parties. Techniques: ARP spoofing, DNS poisoning, evil twin WiFi, SSL stripping. Defeated by proper TLS with certificate validation.' },
{ t:'OSINT',     s:'Open Source Intelligence',           cat:'Security', d:'Gathering information from publicly available sources. Tools: theHarvester, Shodan, Maltego, WHOIS, DNS records, social media, GitHub. First step in penetration testing reconnaissance.' },
{ t:'PAM',       s:'Pluggable Authentication Modules',   cat:'Security', d:'Linux authentication framework. Controls how users authenticate: passwords, TOTP, biometrics, LDAP, smart cards. Config files in /etc/pam.d/. pam_google_authenticator adds TOTP to SSH.' },
{ t:'PENTEST',   s:'Penetration Testing',                cat:'Security', d:'Authorized simulated attack on a system to find vulnerabilities before real attackers do. Phases: Reconnaissance, Scanning, Exploitation, Post-exploitation, Reporting. Requires written authorization.' },
{ t:'PHISHING',  s:'Social Engineering Attack',          cat:'Security', d:'Deceptive emails/messages that trick users into revealing credentials or installing malware. Spear phishing targets specific individuals. Whaling targets executives. Vishing is voice-based.' },
{ t:'PKI',       s:'Public Key Infrastructure',          cat:'Security', d:'System for creating, managing, and distributing digital certificates. Certificate Authorities (CAs) sign certs. Chain of trust: Root CA → Intermediate CA → Leaf cert. Let\'s Encrypt provides free certs.' },
{ t:'PRIVESC',   s:'Privilege Escalation',               cat:'Security', d:'Gaining higher privileges than you\'re authorized for. Vectors: SUID binaries, sudo misconfig, cron jobs, writable scripts, kernel exploits. Check: sudo -l, find / -perm /4000, GTFOBins.github.io.' },
{ t:'RSA',       s:'Rivest-Shamir-Adleman',              cat:'Security', d:'Asymmetric encryption algorithm. Key pair: public (encrypt/verify) + private (decrypt/sign). RSA-2048 minimum, RSA-4096 for high security. Used in TLS, SSH. Being replaced by elliptic curve (ed25519).' },
{ t:'SALT',      s:'Password Salt',                      cat:'Security', d:'Random data added to passwords before hashing. Prevents rainbow table attacks — same password with different salts produces completely different hashes. Linux /etc/shadow stores the salt with the hash.' },
{ t:'SELINUX',   s:'Security-Enhanced Linux',            cat:'Security', d:'Mandatory Access Control (MAC) system by NSA. Labels on every file and process. Policies restrict what processes can do beyond normal permissions. Modes: enforcing, permissive, disabled. Never disable in production.' },
{ t:'SIEM',      s:'Security Info & Event Management',   cat:'Security', d:'Centralized platform for collecting, correlating, and analyzing security logs. Detects patterns across many systems. Examples: Splunk, ELK Stack (Elastic/Logstash/Kibana), Graylog, IBM QRadar.' },
{ t:'SOC',       s:'Security Operations Center',         cat:'Security', d:'Team (or service) responsible for monitoring, detecting, and responding to security incidents 24/7. Tier 1 (alerts), Tier 2 (investigation), Tier 3 (threat hunting). Uses SIEM as primary tool.' },
{ t:'SQLi',      s:'SQL Injection',                      cat:'Security', d:'Attack where malicious SQL is inserted into input fields. "OR 1=1 --" bypasses login. Prevented by parameterized queries/prepared statements. Never build SQL strings by concatenation.' },
{ t:'SUDO',      s:'Superuser Do (Security Context)',     cat:'Security', d:'From security perspective: sudo logs every command to /var/log/auth.log. Sudo misconfigurations are top privilege escalation vectors. Check with: sudo -l. GTFOBins lists how common binaries can be abused.' },
{ t:'UFW',       s:'Uncomplicated Firewall',             cat:'Security', d:'Frontend for iptables on Ubuntu/Debian. ufw enable/disable, ufw allow 22, ufw deny 23, ufw status verbose. Default-deny policy is most secure. Always allow SSH before enabling.' },
{ t:'VULN',      s:'Vulnerability',                      cat:'Security', d:'A weakness in software, configuration, or process that can be exploited. Classified by CVE. CVSS scores severity. Remediation: patch, compensating control, or accept risk. Tracked in vulnerability management programs.' },
{ t:'WAF',       s:'Web Application Firewall',           cat:'Security', d:'Filters HTTP traffic to protect web apps. Blocks SQLi, XSS, LFI, path traversal. ModSecurity is popular open-source WAF. Cloud WAFs: Cloudflare, AWS WAF, Akamai.' },
{ t:'XSS',       s:'Cross-Site Scripting',               cat:'Security', d:'Injects malicious scripts into web pages viewed by other users. Stored XSS persists in database. Reflected XSS is in URL. DOM-based XSS manipulates client-side JS. Prevented by output encoding and CSP headers.' },
{ t:'ZERO-DAY',  s:'Zero-Day Vulnerability',             cat:'Security', d:'Unknown vulnerability with no available patch — zero days for vendors to respond. Extremely valuable in black markets ($$$). After disclosure, becomes a "one-day" — patch immediately when CVE is published.' },

/* ── SYSTEM ─────────────────────────────────────────── */
{ t:'BIOS',      s:'Basic Input/Output System',          cat:'System',   d:'Firmware stored in ROM on the motherboard. First code to run at boot. Does POST, finds bootable device. Largely replaced by UEFI on modern systems. Config accessible at startup (Del/F2/F10).' },
{ t:'BUFFER',    s:'Temporary Data Storage',             cat:'System',   d:'Memory area that temporarily holds data during transfers. Buffer overflow: writing beyond allocated size overwrites adjacent memory — classic exploit technique used since the Morris Worm (1988).' },
{ t:'CGROUP',    s:'Control Groups',                     cat:'System',   d:'Linux kernel feature to limit, prioritize, and account for resource usage (CPU, memory, I/O, network) by groups of processes. Foundation of Docker containers and Kubernetes pods.' },
{ t:'DMESG',     s:'Display Message (kernel ring buffer)',cat:'System',  d:'Show kernel messages from boot and hardware events. dmesg | tail (recent), dmesg | grep -i error (errors), dmesg -T (human-readable timestamps). Critical for hardware troubleshooting.' },
{ t:'EXT4',      s:'Fourth Extended Filesystem',         cat:'System',   d:'Most common Linux filesystem. Supports files up to 16TB, volumes up to 1EB. Journaling prevents corruption after crashes. Other options: XFS (high performance), Btrfs (snapshots, RAID), ZFS.' },
{ t:'INITRD',    s:'Initial RAM Disk',                   cat:'System',   d:'Temporary root filesystem loaded into RAM by bootloader before the real filesystem. Contains modules and scripts needed to mount the actual root. Located at /boot/initrd.img-*.' },
{ t:'IOMMU',     s:'Input/Output Memory Mgmt Unit',      cat:'System',   d:'Hardware component that maps device virtual addresses to physical memory. Enables secure device virtualization and DMA protection. Intel VT-d and AMD-Vi are implementations. Basis for PCIe passthrough.' },
{ t:'IRQ',       s:'Interrupt Request',                  cat:'System',   d:'Signal from hardware to the CPU requesting immediate attention (keyboard press, network packet, disk I/O). View assignments: cat /proc/interrupts. IRQ conflicts caused many issues in older hardware.' },
{ t:'JOURNALD',  s:'systemd Journal Daemon',             cat:'System',   d:'systemd\'s logging system. Stores logs in binary format in /run/log/journal/ (temporary) or /var/log/journal/ (persistent). Query with journalctl. Fast, structured, filterable.' },
{ t:'KERNEL',    s:'OS Core',                            cat:'System',   d:'Core of the OS — manages CPU, memory, I/O, processes, and hardware. Linux kernel written in C. Version: uname -r. Located at /boot/vmlinuz-*. Monolithic with loadable modules (lsmod, modprobe).' },
{ t:'KVM',       s:'Kernel-based Virtual Machine',       cat:'System',   d:'Linux\'s built-in hypervisor (type 1 when running on bare metal). Turns Linux into a hypervisor. Managed with virsh or virt-manager. Foundation of most cloud providers\' virtual machines.' },
{ t:'LSMOD',     s:'List Kernel Modules',                cat:'System',   d:'Shows currently loaded kernel modules (drivers). lsmod (list), modprobe module (load), modprobe -r module (unload), modinfo module (details). Modules extend kernel without recompiling.' },
{ t:'LVM',       s:'Logical Volume Manager',             cat:'System',   d:'Abstraction layer over physical disks. Physical Volumes → Volume Groups → Logical Volumes. Enables resizing, snapshots, spanning disks. Commands: pvcreate, vgcreate, lvcreate, lvextend, pvs, vgs, lvs.' },
{ t:'MBR',       s:'Master Boot Record',                 cat:'System',   d:'First 512 bytes of a disk. Contains bootloader code and partition table. Supports max 4 primary partitions and disks up to 2TB. Replaced by GPT+UEFI on modern systems.' },
{ t:'NAMESPACE', s:'Linux Namespace Isolation',          cat:'System',   d:'Kernel feature that creates isolated environments for processes. Types: PID, Network, Mount, UTS, IPC, User, Cgroup. Docker uses namespaces to isolate containers. ip netns manages network namespaces.' },
{ t:'OOM',       s:'Out of Memory Killer',               cat:'System',   d:'Kernel mechanism that kills processes when RAM + swap are exhausted. OOM killer chooses process with worst oom_score. Check: dmesg | grep -i "killed process". Tune with /proc/PID/oom_score_adj.' },
{ t:'PAGEFILE',  s:'Swap Space (Linux)',                 cat:'System',   d:'Disk space used as overflow when RAM is full. swapon/swapoff to manage. mkswap to create swap file. Check: swapon --show or free -h. Swap on SSD = acceptable. Swap on HDD = very slow.' },
{ t:'PID',       s:'Process ID',                         cat:'System',   d:'Unique number assigned to every running process. PID 1 = init/systemd (the ancestor of all). Check: echo $$  (current shell PID), ps aux, /proc/PID/ directory contains all process info.' },
{ t:'POSIX',     s:'Portable Operating System Interface', cat:'System',  d:'IEEE standard defining OS interfaces. POSIX-compliant programs run on any POSIX OS (Linux, macOS, BSD, Solaris). Defines system calls, shell, utilities. Most Linux commands are POSIX-compliant.' },
{ t:'RAID',      s:'Redundant Array of Independent Disks',cat:'System',  d:'Combines multiple disks for performance/redundancy. RAID 0 (striping, no redundancy), RAID 1 (mirroring), RAID 5 (parity, 1 disk fault tolerance), RAID 6 (2 disks). Software RAID: mdadm.' },
{ t:'RUNLEVEL',  s:'System Run State',                   cat:'System',   d:'Traditional SysV init system states: 0=halt, 1=single-user, 3=multi-user CLI, 5=GUI, 6=reboot. Replaced by systemd targets: graphical.target, multi-user.target, rescue.target. Check: systemctl get-default.' },
{ t:'SECCOMP',   s:'Secure Computing Mode',             cat:'System',   d:'Linux kernel feature to restrict which system calls a process can make. Reduces attack surface if a process is compromised. Used extensively by Docker, Chrome, Firefox, OpenSSH to sandbox processes.' },
{ t:'SIGNAL',    s:'Process Signal',                     cat:'System',   d:'Asynchronous notification sent to a process. SIGTERM(15)=graceful quit, SIGKILL(9)=force kill, SIGHUP(1)=reload, SIGSTOP(19)=pause, SIGCONT(18)=resume. kill -l lists all 64 signals.' },
{ t:'SWAP',      s:'Virtual Memory Overflow Space',      cat:'System',   d:'Disk partition/file used when RAM is full. Slow but prevents OOM crashes. Recommended: 2x RAM for systems <8GB, equal to RAM for larger. Check: swapon --show, free -h.' },
{ t:'SYSCTL',    s:'Kernel Parameter Control',           cat:'System',   d:'View/set kernel parameters at runtime. sysctl -a (list all), sysctl net.ipv4.ip_forward=1 (enable routing). Make persistent in /etc/sysctl.conf. Used to tune networking, security, performance.' },
{ t:'SYSTEMD',   s:'System and Service Manager',         cat:'System',   d:'PID 1 — modern init system and service manager. Manages services (units), parallel startup, logging (journald), timers, sockets, mounts. systemctl manages services. journalctl reads logs.' },
{ t:'UEFI',      s:'Unified Extensible Firmware Interface',cat:'System', d:'Modern replacement for BIOS. Supports GPT disks (>2TB), Secure Boot (blocks unsigned bootloaders), faster boot, 64-bit mode. EFI partition (ESP) stores bootloaders at /boot/efi.' },
{ t:'ULIMIT',    s:'User Resource Limits',               cat:'System',   d:'Sets resource limits per process/user. ulimit -a (show all), ulimit -n 65536 (max open files), ulimit -u 1000 (max processes). Permanent config: /etc/security/limits.conf.' },
{ t:'VMSTAT',    s:'Virtual Memory Statistics',          cat:'System',   d:'Report system performance: memory, swap, I/O, CPU. vmstat 1 (update every second), vmstat 1 10 (10 updates). Fields: r=run queue, b=blocked, si/so=swap in/out, us/sy=user/system CPU.' },

/* ── SCRIPTING ──────────────────────────────────────── */
{ t:'ARRAY',     s:'Indexed Variable Collection',        cat:'Scripting', d:'Bash array: arr=("a" "b" "c"). Access: ${arr[0]}, all elements: ${arr[@]}, length: ${#arr[@]}. Associative arrays (bash 4+): declare -A dict; dict[key]="value".' },
{ t:'CRONTAB',   s:'Cron Table',                         cat:'Scripting', d:'User\'s scheduled job file. crontab -e (edit), crontab -l (list), crontab -r (remove all). Format: min hour day month weekday cmd. /etc/cron.d/ for system-wide jobs.' },
{ t:'EOF',       s:'End of File / Here Document',        cat:'Scripting', d:'Here document: cat << EOF ... EOF sends multiline text to a command. Used to write config files in scripts. << "EOF" (quoted) prevents variable expansion inside. <<- strips leading tabs.' },
{ t:'EXIT',      s:'Script Exit Code',                   cat:'Scripting', d:'0 = success, non-zero = failure. $? holds last exit code. exit 1 in a script exits with error. Checked by && and || operators and if statements. Use exit codes for proper error handling.' },
{ t:'FUNCTION',  s:'Reusable Code Block',                cat:'Scripting', d:'Define: myfunc() { commands; } or function myfunc { ... }. Call: myfunc arg1 arg2. Use local for variables. Return values via exit code (return N) or echo. Functions are visible in current shell.' },
{ t:'GETOPTS',   s:'Parse Command Options',              cat:'Scripting', d:'Parse short options in scripts. while getopts "hv:f:" opt; do case $opt in v) verbose=true;; f) file=$OPTARG;; esac; done. Standard way to handle flags like -v, -f filename.' },
{ t:'HEREDOC',   s:'Here Document',                      cat:'Scripting', d:'Multiline string redirection. cat > file.conf << EOF [content] EOF. Common in scripts to write config files. Avoid quoting EOF delimiter to allow variable expansion inside.' },
{ t:'IFS',       s:'Internal Field Separator',           cat:'Scripting', d:'Characters bash uses to split words. Default: space, tab, newline. IFS=":" read -ra PARTS <<< "a:b:c" splits on colon. while IFS= read -r line preserves whitespace in line-by-line reading.' },
{ t:'PIPEFAIL',  s:'Pipeline Failure Detection',         cat:'Scripting', d:'set -o pipefail — makes a pipeline fail if ANY command in it fails, not just the last. Without it, "false | true" reports success. Part of the safe script header: set -euo pipefail.' },
{ t:'PROCESS',   s:'Process Substitution',               cat:'Scripting', d:'<(command) treats command output as a file. diff <(ls dir1) <(ls dir2) compares directory listings without temp files. >(command) feeds output to a command. Bash-specific feature.' },
{ t:'READLINE',  s:'Command Line Editing Library',        cat:'Scripting', d:'Library providing command-line editing. Key bindings: Ctrl+A (start), Ctrl+E (end), Ctrl+R (history search), Ctrl+W (delete word), Ctrl+U (clear line), Ctrl+L (clear screen), Alt+. (last argument).' },
{ t:'REGEX',     s:'Regular Expression',                 cat:'Scripting', d:'Pattern matching syntax. . (any char), * (0+), + (1+), ? (0 or 1), ^ (start), $ (end), [] (character class), | (OR), () (group), \\ (escape). BRE vs ERE: grep uses BRE, grep -E or egrep uses ERE.' },
{ t:'SUBSHELL',  s:'Child Shell Process',                cat:'Scripting', d:'Commands in () run in a subshell — changes don\'t affect the parent. (cd /tmp; ls) — parent stays in original dir. Variables set in subshells are not visible to parent. Pipelines run in subshells.' },
{ t:'TRAP',      s:'Signal Trap Handler',                cat:'Scripting', d:'Catch signals and run cleanup code. trap "rm -f $tmpfile; exit" EXIT INT TERM. Always set trap for cleanup in scripts that create temp files. trap "" SIGINT ignores Ctrl+C.' },
{ t:'VARIABLE',  s:'Shell Variable',                     cat:'Scripting', d:'NAME=value (no spaces!). Reference: $NAME or \${NAME}. \${NAME:-default} (use default if unset). \${NAME:?error} (error if unset). \${#NAME} (length). \${NAME%suffix} (strip suffix). \${NAME/old/new} (replace).' },

/* ── GENERAL ────────────────────────────────────────── */

/* ====================================================================
   UTILS
==================================================================== */
save() {
    localStorage.setItem('lh_done', JSON.stringify(this.s.completed));
    localStorage.setItem('lh_xp',   this.s.xp.toString());
},

getRank() {
    let r = this.ranks[0];
    for (const rk of this.ranks) { if (this.s.xp >= rk.min) r = rk; }
    return r;
},

getNextRank() {
    const i = this.ranks.findIndex(r => r === this.getRank());
    return this.ranks[i + 1] || null;
},

getXPPct() {
    const cur = this.getRank(), nxt = this.getNextRank();
    if (!nxt) return 100;
    return Math.min(100, Math.round(((this.s.xp - cur.min) / (nxt.min - cur.min)) * 100));
},

badgeClass(cat) {
    return `badge badge-${cat.replace(/\s+/g,'') }`;
},

todayTip() {
    return this.tips[new Date().getDate() % this.tips.length];
},

/* ====================================================================
   NAVIGATION
==================================================================== */
init() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    this.render();
},

nav(v) {
    this.s.view = v;
    this.s.lessonId = null;
    this.s.quizActive = false;
    this._mmPZReady = false;
    this.render();
    window.scrollTo({ top: 0 });
},

openLesson(id) {
    this.s.lessonId = id;
    this.s.view = 'learn';
    this.s.quizActive = false;
    this.render();
    window.scrollTo({ top: 0 });
},

back() {
    if (this.s.quizActive) {
        this.s.quizActive = false;
        this.render();
        return;
    }
    this.s.lessonId = null;
    this.render();
    window.scrollTo({ top: 0 });
},

/* ====================================================================
   HOME VIEW
==================================================================== */
renderHome() {
    const rank = this.getRank();
    const nxt  = this.getNextRank();
    const pct  = this.getXPPct();
    const done = this.s.completed.length;
    const tot  = this.levels.length;
    document.getElementById('rank-badge').textContent = rank.name;

    // Find next incomplete lesson
    const nextLesson = this.levels.find(l => !this.s.completed.includes(l.id));

    return `<div class="fade-up">
    <div class="pg-title">
        <h1>🐧 Dashboard</h1>
        <p>${done}/${tot} lessons complete · ${this.s.xp} XP earned</p>
    </div>

    <!-- Rank & XP -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text-bright);">${rank.name}</div>
                <div style="font-size:0.75rem;color:var(--text-dim);">${this.s.xp} XP ${nxt ? '→ ' + nxt.name + ' at ' + nxt.min : '· MAX RANK 🏆'}</div>
            </div>
            <div style="text-align:right;font-size:0.8rem;color:var(--text-dim);">${pct}%</div>

        <div class="xp-bar-track"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div>

    <!-- Daily Tip -->
    <div class="daily-tip">

    <!-- Next lesson or continue -->
    ${nextLesson ? `

        <div class="lc-body">
            <div class="lc-meta">Level ${l.id + 1} · ${l.time} · +${l.xpReward} XP</div>
            <div class="lc-title">${l.title}</div>
            <div class="lc-sub">${l.subtitle}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
            <span class="${this.badgeClass(l.category)}">${l.category}</span>
            <div class="lc-check ${this.s.completed.includes(l.id) ? 'done' : ''}">${this.s.completed.includes(l.id) ? '✓' : ''}</div>
        </div>
    </div>`).join('')}
    </div>`;
},

/* ====================================================================
   LESSON VIEW
==================================================================== */
renderLesson() {
    const l = this.levels.find(x => x.id === this.s.lessonId);
    if (!l) return this.renderLearn();
    if (this.s.quizActive) return this.renderQuiz(l);

    const prev = this.levels.find(x => x.id === l.id - 1);
    const next = this.levels.find(x => x.id === l.id + 1);
    const done = this.s.completed.includes(l.id);

    return `<div class="fade-up">
    <div class="lesson-topbar">
        <button class="btn btn-sm" onclick="app.back()">← Back</button>
        <span class="${this.badgeClass(l.category)}">${l.category}</span>
    </div>

    <!-- Level header -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;">
        <div class="lc-icon" style="width:54px;height:54px;font-size:1.75rem;flex-shrink:0;">${l.icon}</div>
        <div>
            <div style="font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;font-family:'Rajdhani',sans-serif;">Level ${l.id + 1} · ${l.time}</div>
            <h2 style="margin:0 0 2px;">${l.title}</h2>
            <div style="font-size:0.82rem;color:var(--text-dim);">${l.subtitle}</div>
        </div>
    </div>

    <!-- Content -->
    <div class="card lesson-body">${l.content}</div>

    <!-- Key Commands -->
    ${l.keyCommands && l.keyCommands.length ? `
    <div class="card">
        <h3 style="margin-top:0;margin-bottom:0.75rem;">⚡ Key Commands</h3>
        <div class="cmd-grid">
            ${l.keyCommands.map(c => `
            <div class="cmd-item">
                <div class="ci-cmd">${c.cmd}</div>
                <div class="ci-desc">${c.desc}</div>
            </div>`).join('')}
        </div>
    </div>` : ''}

    <!-- Nav footer -->
    <div class="lesson-footer">
        <button class="btn btn-sm" onclick="app.openLesson(${l.id - 1})" ${!prev ? 'disabled' : ''}>← Prev</button>
        <button class="btn btn-primary" onclick="app.startQuiz(${l.id})">
            ${done ? '✓ Retake Quiz' : '🎯 Take Quiz →'}
        </button>
        <button class="btn btn-sm" onclick="app.openLesson(${l.id + 1})" ${!next ? 'disabled' : ''}>Next →</button>
    </div>
    </div>`;
},

/* ====================================================================
   QUIZ ENGINE
   ===== INJECT:QUIZ_ENGINE — Enhanced in SET 5 if needed =====
==================================================================== */
startQuiz(lessonId) {
    this.s.quizActive = true;
    this.s.quizIdx    = 0;
    this.s.quizScore  = 0;
    this.s.quizAnswered = false;
    window._qPick = -1;
    this.render();
    window.scrollTo({ top: 0 });
},

renderQuiz(l) {
    const qs = this.quizData[l.id];
    if (!qs || !qs.length) {
        return `<div class="fade-up"><div class="card" style="text-align:center;padding:2rem;">
            <div style="font-size:3rem;margin-bottom:1rem;">🚧</div>
            <h3>Quiz coming soon for this level!</h3>
            <button class="btn btn-primary" style="margin-top:1rem;" onclick="app.back()">← Back to Lesson</button>
        </div></div>`;
    }

    const qi = this.s.quizIdx;
    const total = qs.length;

    // Results screen
    if (qi >= total) {
        const sc = this.s.quizScore;
        const pass = sc >= Math.ceil(total * 0.6);
        if (pass && !this.s.completed.includes(l.id)) {
            this.s.completed.push(l.id);
            this.s.xp += l.xpReward;
            this.save();
            document.getElementById('rank-badge').textContent = this.getRank().name;
        }
        return `<div class="fade-up"><div class="card" style="text-align:center;padding:2rem 1.5rem;">
            <div style="font-size:4rem;margin-bottom:0.75rem;">${pass ? '🎉' : '💪'}</div>
            <h2>${pass ? 'Level Complete!' : 'Keep Practicing!'}</h2>
            <p style="color:var(--text-dim);margin:0.5rem 0 1.5rem;font-size:0.875rem;">
                Score: ${sc}/${total} (${Math.round(sc/total*100)}%)
                ${pass ? ` · <span style="color:var(--success);">+${l.xpReward} XP earned!</span>` : ' · Need 60% to pass'}
            </p>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="app.startQuiz(${l.id})">🔄 Retry</button>
                <button class="btn" onclick="app.back()">📖 Review Lesson</button>
                ${this.levels.find(x => x.id === l.id+1) ? `<button class="btn" onclick="app.openLesson(${l.id+1})">Next →</button>` : ''}
            </div>
        </div></div>`;
    }

    const q = qs[qi];
    const answered = this.s.quizAnswered;

    return `<div class="fade-up">
    <div class="lesson-topbar">
        <button class="btn btn-sm" onclick="app.back()">← Lesson</button>
        <span style="font-size:0.78rem;color:var(--text-dim);">Q ${qi+1} of ${total}</span>
    </div>
    <div class="quiz-progress">
        <div class="quiz-progress-fill" style="width:${Math.round((qi/total)*100)}%"></div>
    </div>
    <div class="card">
        <div style="font-size:0.68rem;color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Level ${l.id+1} Quiz</div>
        <div class="quiz-q">${q.q}</div>
        ${q.opts.map((opt,i) => {
            let cls = answered ? (i===q.correct ? 'correct' : (window._qPick===i ? 'wrong' : 'used')) : '';
            return `<div class="q-opt ${cls}" onclick="${answered ? '' : 'app.answerQ('+l.id+','+i+')'}">
                <span class="q-letter">${String.fromCharCode(65+i)}</span>${opt}
            </div>`;
        }).join('')}
        ${answered ? `<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1rem;" onclick="app.nextQ(${l.id})">
            ${qi+1 < total ? 'Next Question →' : 'See Results →'}
        </button>` : ''}
    </div></div>`;
},

answerQ(lid, picked) {
    const q = this.quizData[lid][this.s.quizIdx];
    window._qPick = picked;
    this.s.quizAnswered = true;
    if (picked === q.correct) this.s.quizScore++;
    this.render();
},

nextQ(lid) {
    this.s.quizIdx++;
    this.s.quizAnswered = false;
    window._qPick = -1;
    this.render();
    window.scrollTo({ top: 0 });
},


/* ====================================================================
   GLOSSARY VIEW
==================================================================== */
renderGlossary() {
    const cats = ['All', ...new Set(this.glossary.map(g => g.cat))];
    return `<div class="fade-up">
    <div class="pg-title">
        <h1>📖 Glossary</h1>
        <p>${this.glossary.length} terms · Linux, Networking, Security & more</p>
    </div>
    <input type="search" class="gl-search" placeholder="🔍  Search acronyms, terms, descriptions..."
        value="${this.s.glQuery}"
        oninput="app.s.glQuery=this.value.toLowerCase();app._renderGlList()">
    <div class="cat-strip">
        ${cats.map(c => `<button class="cat-btn ${this.s.glCat===c?'active':''}" onclick="app.s.glCat='${c}';app._renderGlCats();app._renderGlList()">${c}</button>`).join('')}
    </div>
    <div class="gl-list" id="gl-list">${this._glItems()}</div>
    </div>`;
},

_catColor(cat) {
    const m = { Linux:'var(--accent)', Network:'var(--cyan)', Security:'var(--danger)', Scripting:'var(--amber)', System:'var(--purple)', General:'var(--text-dim)' };
    return m[cat] || 'var(--text-dim)';
},

_glItems() {
    const q = this.s.glQuery, cat = this.s.glCat;
    const list = this.glossary.filter(g => {
        const mq = !q || g.t.toLowerCase().includes(q) || g.s.toLowerCase().includes(q) || g.d.toLowerCase().includes(q);
        const mc = cat === 'All' || g.cat === cat;
        return mq && mc;
    }).sort((a,b) => a.t.localeCompare(b.t));

    if (!list.length) return `<div style="padding:2rem;text-align:center;color:var(--text-dim);">No terms found. Try a different search.</div>`;
    return list.map(g => {
        const cc = this._catColor(g.cat);
        return `<div class="gl-item">
        <div class="gl-row">
            <span class="gl-term">${g.t}</span>
            <span class="gl-full">${g.s}</span>
            <span class="gl-cat" style="background:${cc}18;color:${cc};">${g.cat}</span>
        </div>
        <div class="gl-desc">${g.d}</div>
        </div>`;
    }).join('');
},

_renderGlList() {
    const el = document.getElementById('gl-list');
    if (el) el.innerHTML = this._glItems();
},

_renderGlCats() {
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === this.s.glCat);
    });
},

/* ====================================================================
   MIND MAP VIEW
   ===== INJECT:MINDMAP_ENGINE — Enhanced in SET 4 =====
==================================================================== */
renderMindMap() {
    const { nodes, colors } = this.mindmapData;
    const W = 1000, H = 620;

    const edges = nodes.filter(n => n.pid).map(n => {
        const p = nodes.find(x => x.id === n.pid);
        if (!p) return '';
        const col = colors[n.type] || '#64ffda';
        return `<line x1="${p.x}" y1="${p.y}" x2="${n.x}" y2="${n.y}" stroke="${col}" stroke-width="1.4" opacity="0.22" stroke-dasharray="5 4"/>`;
    }).join('');

    const nodeEls = nodes.map(n => {
        const col    = colors[n.type] || '#64ffda';
        const isRoot = n.type === 'root';
        const fs     = n.r >= 26 ? 9 : n.r >= 20 ? 7.5 : 6.5;
        const words  = n.label.split(' ');
        const mid    = Math.ceil(words.length / 2);
        const line1  = words.slice(0, mid).join(' ');
        const line2  = words.slice(mid).join(' ');
        const textEl = words.length > 1
            ? `<text x="${n.x}" y="${n.y - 4}" text-anchor="middle" fill="${col}"
                font-family="JetBrains Mono,monospace" font-size="${fs}" font-weight="700">
                <tspan x="${n.x}" dy="0">${line1}</tspan>
                <tspan x="${n.x}" dy="${Math.round(fs*1.35)}">${line2}</tspan></text>`
            : `<text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle"
                fill="${col}" font-family="JetBrains Mono,monospace" font-size="${fs}" font-weight="700">${n.label}</text>`;
        return `<g class="mm-node" data-id="${n.id}" onclick="app._mmClick('${n.id}')">
            <circle cx="${n.x}" cy="${n.y}" r="${n.r}"
                fill="${col}14" stroke="${col}" stroke-width="${isRoot ? 2.8 : 1.8}"
                style="transition:stroke-width 0.2s,filter 0.2s;"/>
            ${textEl}
        </g>`;
    }).join('');

    const shown = {};
    const legend = nodes.map(n => {
        if (shown[n.type]) return '';
        shown[n.type] = 1;
        const col = colors[n.type] || '#64ffda';
        const lbl = { root:'Core', kernel:'Kernel', fs:'Filesystem', users:'Users',
            network:'Network', proc:'Processes', security:'Security', shell:'Shell',
            sysadmin:'SysAdmin', config:'Config', user:'User Files', data:'Data',
            virtual:'Virtual FS', device:'Devices', temp:'Temp', sys:'System' }[n.type] || n.type;
        return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:${col};">
            <span style="width:7px;height:7px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0;"></span>${lbl}</span>`;
    }).join('');

    return `<div class="fade-up">
    <div class="pg-title">
        <h1>🗺️ Mind Map</h1>
        <p>Linux architecture — tap any node for details · drag to pan · scroll/pinch to zoom</p>
    </div>
    <div class="mm-wrap">
        <div class="mm-controls">${legend}<span style="margin-left:auto;font-size:0.7rem;">scroll=zoom · drag=pan</span></div>
        <div id="mm-area" style="height:420px;overflow:hidden;position:relative;cursor:grab;background:radial-gradient(ellipse at center,var(--surface-2) 0%,var(--surface) 70%);">
            <svg id="mm-svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;display:block;touch-action:none;">
                <g id="mm-g">${edges}${nodeEls}</g>
            </svg>
        </div>
        <div class="mm-info" id="mm-info">👆 Tap any node to explore its role in the Linux ecosystem</div>
    </div>
    <div class="card" style="margin-top:0.875rem;">
        <h3 style="margin-top:0;margin-bottom:0.75rem;">🗂️ Key Directory Quick Reference</h3>
        <div class="cmd-grid">
            ${[
                {l:'/etc',   c:'var(--amber)',   d:'All system configuration files'},
                {l:'/var',   c:'var(--danger)',   d:'Logs, web files, variable data'},
                {l:'/proc',  c:'var(--success)',  d:'Live kernel data (virtual, not on disk)'},
                {l:'/dev',   c:'#fd79a8',         d:'Hardware devices as files'},
                {l:'/home',  c:'var(--purple)',   d:'User personal directories'},
                {l:'/tmp',   c:'#e17055',         d:'Temp files — cleared on reboot'},
                {l:'/usr',   c:'var(--cyan)',     d:'Installed applications and libraries'},
                {l:'/boot',  c:'var(--accent)',   d:'Kernel, GRUB bootloader, initrd'},
                {l:'/opt',   c:'var(--text-dim)', d:'Optional third-party software'},
                {l:'/run',   c:'var(--success)',  d:'Runtime data since last boot (RAM)'},
                {l:'/sys',   c:'var(--cyan)',     d:'Hardware info exposed by kernel'},
                {l:'/root',  c:'var(--purple)',   d:'Root superuser home directory'},
            ].map(x => `<div class="cmd-item"><div class="ci-cmd" style="color:${x.c}">${x.l}</div><div class="ci-desc">${x.d}</div></div>`).join('')}
        </div>
    </div>
    </div>`;
},

_mmClick(id) {
    const n   = this.mindmapData.nodes.find(x => x.id === id);
    if (!n) return;
    const col = this.mindmapData.colors[n.type] || 'var(--accent)';
    const el  = document.getElementById('mm-info');
    if (el) el.innerHTML = `<strong style="color:${col};">${n.label}</strong> &mdash; ${n.d || ''}`;
    // Pulse clicked circle
    const circ = document.querySelector(`[data-id="${id}"] circle`);
    if (circ) {
        circ.style.strokeWidth = '4';
        circ.style.filter = `drop-shadow(0 0 10px ${col})`;
        setTimeout(() => { circ.style.strokeWidth = ''; circ.style.filter = ''; }, 1000);
    }
    // Init pan/zoom now SVG is confirmed in DOM
    if (!this._mmPZReady) this._mmInitPanZoom();
},

_mmPZReady: false,
_mmInitPanZoom() {
    const area = document.getElementById('mm-area');
    const g    = document.getElementById('mm-g');
    if (!area || !g) return;
    this._mmPZReady = true;
    let sc = 1, tx = 0, ty = 0, dragging = false, lx = 0, ly = 0;
    const apply = () => g.setAttribute('transform', `translate(${tx},${ty}) scale(${sc})`);
    area.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; area.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        tx += e.clientX - lx; ty += e.clientY - ly; lx = e.clientX; ly = e.clientY; apply();
    });
    window.addEventListener('mouseup', () => { dragging = false; area.style.cursor = 'grab'; });
    area.addEventListener('wheel', e => {
        e.preventDefault();
        sc = Math.max(0.25, Math.min(3.5, sc * (e.deltaY < 0 ? 1.12 : 0.89)));
        apply();
    }, { passive: false });
    let t0x = 0, t0y = 0, t0tx = 0, t0ty = 0;
    area.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { t0x = e.touches[0].clientX; t0y = e.touches[0].clientY; t0tx = tx; t0ty = ty; }
    }, { passive: true });
    area.addEventListener('touchmove', e => {
        if (e.touches.length === 1) { tx = t0tx + (e.touches[0].clientX - t0x); ty = t0ty + (e.touches[0].clientY - t0y); apply(); }
    }, { passive: true });
},

/* ====================================================================
   COMMANDS VIEW
==================================================================== */
renderCommands() {
    const q = (this.s.cmdQuery || '').toLowerCase();
    const filtered = q
        ? this.commandsData.map(s => ({
            ...s,
            commands: s.commands.filter(c =>
                c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q))
          })).filter(s => s.commands.length > 0)
        : this.commandsData;

    return `<div class="fade-up">
    <div class="pg-title">
        <h1>⚡ Commands</h1>
        <p>${this.commandsData.reduce((a,s)=>a+s.commands.length,0)} commands across ${this.commandsData.length} categories</p>
    </div>
    <input type="search" class="gl-search" placeholder="🔍  Search commands and descriptions..."
        value="${(this.s.cmdQuery||'').replace(/"/g,'&quot;')}"
        oninput="app.s.cmdQuery=this.value;app._rerenderCmds()">
    <div id="cs-body">
    ${filtered.map(s => `
    <div class="cs-section">
        <div class="cs-heading" style="color:${s.color||'var(--accent)'};">${s.icon} ${s.section}</div>
        <div class="cs-grid">
            ${s.commands.map(c => `<div class="cs-item" title="${c.desc}">
                <div class="cs-cmd">${c.cmd}</div>
                <div class="cs-desc">${c.desc}</div>
            </div>`).join('')}
        </div>
    </div>`).join('')}
    ${filtered.length === 0 ? '<div style="text-align:center;color:var(--text-dim);padding:2rem;">No commands match that search.</div>' : ''}
    </div>
    </div>`;
},

_rerenderCmds() {
    const wrap = document.getElementById('cs-body');
    if (!wrap) return;
    const q = (this.s.cmdQuery || '').toLowerCase();
    const filtered = q
        ? this.commandsData.map(s => ({
            ...s,
            commands: s.commands.filter(c =>
                c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q))
          })).filter(s => s.commands.length > 0)
        : this.commandsData;
    wrap.innerHTML = filtered.map(s => `
    <div class="cs-section">
        <div class="cs-heading" style="color:${s.color||'var(--accent)'};">${s.icon} ${s.section}</div>
        <div class="cs-grid">
            ${s.commands.map(c => `<div class="cs-item">
                <div class="cs-cmd">${c.cmd}</div>
                <div class="cs-desc">${c.desc}</div>
            </div>`).join('')}
        </div>
    </div>`).join('')
    + (filtered.length === 0 ? '<div style="text-align:center;color:var(--text-dim);padding:2rem;">No commands match that search.</div>' : '');
},


/* ====================================================================
   MAIN RENDER DISPATCHER
==================================================================== */
_updateNav() {
    document.querySelectorAll('.nav-btn').forEach(b => {
        const id = b.id.replace('nav-','');
        b.classList.toggle('active', id === this.s.view);
    });
},

render() {
    this._updateNav();
    const main = document.getElementById('app-main');
    const { view, lessonId } = this.s;

    if (view === 'learn' && lessonId !== null) {
        main.innerHTML = this.renderLesson();
        return;
    }

    const map = {
        home:     () => this.renderHome(),
        learn:    () => this.renderLearn(),
        glossary: () => this.renderGlossary(),
        mindmap:  () => this.renderMindMap(),
        commands: () => this.renderCommands(),
    };
    main.innerHTML = (map[view] || map.home)();
},

}; // end app

window.onload = () => app.init();
</script>
