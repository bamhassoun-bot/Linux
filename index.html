<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LinuxHero — Zero to Hero</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LinuxHero">
    <meta name="theme-color" content="#050e1a">
    <meta name="description" content="Learn Linux from zero to hero — interactive lessons, quizzes, glossary, mind map and command reference.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
    /* ============================================================
       DESIGN SYSTEM — CSS VARIABLES
    ============================================================ */
    :root {
        --bg:          #050e1a;
        --surface:     #0d1b2e;
        --surface-2:   #112240;
        --surface-3:   #172d4d;
        --text:        #ccd6f6;
        --text-dim:    #8892b0;
        --text-bright: #e6f1ff;
        --accent:      #64ffda;
        --accent-rgb:  100,255,218;
        --cyan:        #57cbff;
        --amber:       #f7b731;
        --purple:      #a29bfe;
        --danger:      #ff6b6b;
        --success:     #6bcb77;
        --border:      #1d3461;
        --border-2:    #2d4a7a;
        --code-bg:     #020c18;
        --shadow:      0 4px 24px rgba(0,0,0,0.5);
        --glow:        0 0 24px rgba(100,255,218,0.12);
        --nav-h:       66px;
        --header-h:    56px;
    }
    @media (prefers-color-scheme: light) {
        :root {
            --bg:          #f0f4f8;
            --surface:     #ffffff;
            --surface-2:   #f8fafc;
            --surface-3:   #eef2ff;
            --text:        #1e293b;
            --text-dim:    #64748b;
            --text-bright: #0f172a;
            --accent:      #0e7a68;
            --accent-rgb:  14,122,104;
            --cyan:        #0369a1;
            --amber:       #b45309;
            --purple:      #6d28d9;
            --danger:      #dc2626;
            --success:     #15803d;
            --border:      #cbd5e1;
            --border-2:    #94a3b8;
            --code-bg:     #f1f5f9;
            --shadow:      0 4px 24px rgba(0,0,0,0.08);
            --glow:        0 0 24px rgba(14,122,104,0.1);
        }
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
        font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
    }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    a { color: var(--accent); }

    /* ============================================================
       TYPOGRAPHY
    ============================================================ */
    h1, h2, h3, h4 {
        font-family: 'Rajdhani', sans-serif;
        color: var(--text-bright);
        letter-spacing: 0.03em;
        line-height: 1.2;
    }
    h1 { font-size: 1.85rem; font-weight: 700; }
    h2 { font-size: 1.5rem;  font-weight: 700; }
    h3 { font-size: 1.2rem;  font-weight: 600; }
    h4 { font-size: 1rem;    font-weight: 600; color: var(--cyan); }

    code {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        background: var(--code-bg);
        color: var(--accent);
        padding: 2px 7px;
        border-radius: 5px;
        font-size: 0.85em;
        border: 1px solid var(--border);
        word-break: break-all;
    }
    pre {
        font-family: 'JetBrains Mono', monospace;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        overflow-x: auto;
        font-size: 0.875rem;
        line-height: 1.75;
        color: var(--accent);
        margin: 0.75rem 0;
    }
    pre code { background: none; border: none; padding: 0; font-size: inherit; word-break: normal; }

    /* ============================================================
       LAYOUT — HEADER
    ============================================================ */
    #app-header {
        position: sticky; top: 0; z-index: 300;
        height: var(--header-h);
        background: rgba(5,14,26,0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.25rem;
    }
    @media (prefers-color-scheme: light) {
        #app-header { background: rgba(255,255,255,0.9); }
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
        width: 34px; height: 34px;
        background: linear-gradient(135deg, var(--accent), var(--cyan));
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
        box-shadow: var(--glow);
        flex-shrink: 0;
    }
    .logo-text {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.2rem; font-weight: 700;
        color: var(--text-bright);
        letter-spacing: 0.06em;
    }
    .logo-text span { color: var(--accent); }
    #rank-badge {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.72rem; font-weight: 700;
        letter-spacing: 0.12em;
        padding: 4px 13px;
        border-radius: 20px;
        border: 1px solid var(--accent);
        color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
        transition: all 0.3s;
    }

    /* ============================================================
       LAYOUT — MAIN SCROLL AREA
    ============================================================ */
    #app-main {
        max-width: 880px;
        margin: 0 auto;
        padding: 1.5rem 1rem calc(var(--nav-h) + 24px);
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
        #app-main { padding-bottom: calc(var(--nav-h) + 24px + env(safe-area-inset-bottom)); }
        #app-nav  { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
    }

    /* ============================================================
       LAYOUT — BOTTOM NAV
    ============================================================ */
    #app-nav {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        align-items: stretch;
        padding: 6px 4px 10px;
        gap: 2px;
    }
    .nav-btn {
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 3px; padding: 6px 4px;
        border: none; background: none;
        color: var(--text-dim);
        cursor: pointer;
        border-radius: 10px;
        transition: color 0.2s, background 0.2s;
        min-width: 0;
    }
    .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .nav-btn .nav-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; }
    .nav-btn.active { color: var(--accent); background: rgba(var(--accent-rgb),0.07); }
    .nav-btn:hover:not(.active) { color: var(--text-bright); background: var(--surface-2); }

    /* ============================================================
       COMPONENTS — CARDS
    ============================================================ */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.25rem;
        margin-bottom: 0.875rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card.interactive { cursor: pointer; }
    .card.interactive:hover { border-color: var(--border-2); box-shadow: var(--glow); }
    .card-glow { border-color: var(--accent); box-shadow: var(--glow); }

    /* ============================================================
       COMPONENTS — BUTTONS
    ============================================================ */
    .btn {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 9px 18px;
        border-radius: 9px;
        border: 1px solid var(--border-2);
        background: var(--surface-2);
        color: var(--text);
        font-size: 0.875rem; font-weight: 500;
        cursor: pointer;
        transition: all 0.18s;
        white-space: nowrap;
        text-decoration: none;
    }
    .btn:hover { border-color: var(--border-2); background: var(--surface-3); color: var(--text-bright); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .btn-primary {
        background: var(--accent); color: var(--bg);
        border-color: var(--accent); font-weight: 600;
    }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: var(--glow); color: var(--bg); }
    .btn-sm { padding: 6px 13px; font-size: 0.8rem; }
    .btn-danger { background: rgba(255,107,107,0.08); color: var(--danger); border-color: var(--danger); }

    /* ============================================================
       COMPONENTS — BADGES
    ============================================================ */
    .badge {
        display: inline-flex; align-items: center;
        padding: 3px 10px; border-radius: 20px;
        font-size: 0.72rem; font-weight: 700;
        font-family: 'Rajdhani', sans-serif;
        letter-spacing: 0.06em;
    }
    .badge-Foundation { background: rgba(var(--accent-rgb),0.1); color: var(--accent);   border: 1px solid rgba(var(--accent-rgb),0.4); }
    .badge-Filesystem  { background: rgba(87,203,255,0.1);  color: var(--cyan);    border: 1px solid rgba(87,203,255,0.4);  }
    .badge-Files       { background: rgba(87,203,255,0.1);  color: var(--cyan);    border: 1px solid rgba(87,203,255,0.4);  }
    .badge-Text        { background: rgba(162,155,254,0.1); color: var(--purple);  border: 1px solid rgba(162,155,254,0.4); }
    .badge-Users       { background: rgba(247,183,49,0.1);  color: var(--amber);   border: 1px solid rgba(247,183,49,0.4);  }
    .badge-Processes   { background: rgba(162,155,254,0.1); color: var(--purple);  border: 1px solid rgba(162,155,254,0.4); }
    .badge-Network     { background: rgba(87,203,255,0.1);  color: var(--cyan);    border: 1px solid rgba(87,203,255,0.4);  }
    .badge-Scripting   { background: rgba(247,183,49,0.1);  color: var(--amber);   border: 1px solid rgba(247,183,49,0.4);  }
    .badge-Security    { background: rgba(255,107,107,0.1); color: var(--danger);  border: 1px solid rgba(255,107,107,0.4); }

    /* ============================================================
       COMPONENTS — XP BAR
    ============================================================ */
    .xp-bar-track {
        height: 8px; background: var(--surface-3);
        border-radius: 4px; overflow: hidden;
    }
    .xp-bar-fill {
        height: 100%; border-radius: 4px;
        background: linear-gradient(90deg, var(--accent), var(--cyan));
        transition: width 0.9s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 0 10px rgba(var(--accent-rgb),0.4);
    }

    /* ============================================================
       COMPONENTS — LEVEL CARD
    ============================================================ */
    .level-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 13px;
        padding: 0.9rem 1.1rem;
        margin-bottom: 0.65rem;
        cursor: pointer;
        display: flex; align-items: center; gap: 0.875rem;
        transition: all 0.2s;
    }
    .level-card:hover { border-color: var(--border-2); box-shadow: var(--glow); transform: translateX(3px); }
    .level-card.done  { border-color: var(--success); background: linear-gradient(to right, rgba(107,203,119,0.04), var(--surface)); }
    .lc-icon {
        width: 46px; height: 46px; border-radius: 11px;
        background: var(--surface-2);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.6rem; flex-shrink: 0;
    }
    .lc-body { flex: 1; min-width: 0; }
    .lc-meta { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Rajdhani', sans-serif; margin-bottom: 2px; }
    .lc-title { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text-bright); }
    .lc-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .lc-check {
        width: 24px; height: 24px; border-radius: 50%;
        border: 2px solid var(--border-2);
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: var(--text-dim); flex-shrink: 0;
    }
    .lc-check.done { background: var(--success); border-color: var(--success); color: white; font-weight: 700; }

    /* ============================================================
       LESSON — CONTENT STYLES
    ============================================================ */
    .lesson-body { line-height: 1.8; }
    .lesson-body h3 { color: var(--accent); margin: 1.5rem 0 0.6rem; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .lesson-body h4 { color: var(--cyan); margin: 1.2rem 0 0.5rem; }
    .lesson-body p  { margin-bottom: 0.9rem; }
    .lesson-body ul, .lesson-body ol { padding-left: 1.4rem; margin-bottom: 0.9rem; }
    .lesson-body li { margin-bottom: 0.45rem; }
    .lesson-body strong { color: var(--text-bright); }
    .lesson-body em { color: var(--amber); font-style: normal; font-weight: 500; }

    .tip-box {
        background: linear-gradient(135deg, rgba(247,183,49,0.07), rgba(247,183,49,0.02));
        border: 1px solid rgba(247,183,49,0.3);
        border-left: 3px solid var(--amber);
        border-radius: 9px;
        padding: 11px 15px;
        margin: 0.9rem 0;
        font-size: 0.875rem;
        line-height: 1.6;
    }
    .tip-box::before { content: "💡  "; }

    .warn-box {
        background: linear-gradient(135deg, rgba(255,107,107,0.07), rgba(255,107,107,0.02));
        border: 1px solid rgba(255,107,107,0.3);
        border-left: 3px solid var(--danger);
        border-radius: 9px;
        padding: 11px 15px;
        margin: 0.9rem 0;
        font-size: 0.875rem;
        line-height: 1.6;
    }
    .warn-box::before { content: "⚠️  "; }

    .info-box {
        background: linear-gradient(135deg, rgba(87,203,255,0.07), rgba(87,203,255,0.02));
        border: 1px solid rgba(87,203,255,0.3);
        border-left: 3px solid var(--cyan);
        border-radius: 9px;
        padding: 11px 15px;
        margin: 0.9rem 0;
        font-size: 0.875rem;
        line-height: 1.6;
    }
    .info-box::before { content: "ℹ️  "; }

    .cmd-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 0.5rem;
        margin: 0.75rem 0;
    }
    .cmd-item {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        transition: border-color 0.15s;
    }
    .cmd-item:hover { border-color: var(--border-2); }
    .cmd-item .ci-cmd  { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 0.83rem; font-weight: 600; }
    .cmd-item .ci-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }

    /* ============================================================
       LESSON — HEADER / FOOTER
    ============================================================ */
    .lesson-topbar {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px;
    }
    .lesson-footer {
        display: flex; justify-content: space-between; align-items: center;
        margin-top: 2rem; padding-top: 1.25rem;
        border-top: 1px solid var(--border);
        gap: 8px; flex-wrap: wrap;
    }

    /* ============================================================
       COMPONENTS — STATS GRID
    ============================================================ */
    .stats-grid {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 0.65rem; margin-bottom: 0.875rem;
    }
    .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 13px;
        padding: 0.85rem 0.5rem;
        text-align: center;
    }
    .stat-val { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text-bright); line-height: 1; }
    .stat-lbl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 3px; }

    .daily-tip {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 0.875rem;
    }
    .daily-tip .dt-label {
        font-size: 0.68rem; text-transform: uppercase;
        letter-spacing: 0.1em; color: var(--accent);
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        margin-bottom: 6px;
    }
    .daily-tip .dt-text { font-size: 0.875rem; color: var(--text); line-height: 1.65; }

    /* ============================================================
       GLOSSARY
    ============================================================ */
    .gl-search {
        width: 100%;
        padding: 11px 15px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
        outline: none;
        transition: border-color 0.2s;
    }
    .gl-search:focus { border-color: var(--accent); }
    .gl-search::placeholder { color: var(--text-dim); }

    .cat-strip {
        display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.875rem;
    }
    .cat-btn {
        padding: 5px 13px; border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-dim);
        font-size: 0.75rem; font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
    }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .cat-btn:hover:not(.active) { border-color: var(--border-2); color: var(--text-bright); }

    .gl-list { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; }
    .gl-item { padding: 11px 16px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .gl-item:last-child { border-bottom: none; }
    .gl-item:hover { background: var(--surface-2); }
    .gl-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .gl-term { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .gl-full { font-size: 0.78rem; color: var(--text-dim); font-style: italic; flex: 1; min-width: 0; }
    .gl-cat  { font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.05em; }
    .gl-desc { font-size: 0.84rem; color: var(--text); line-height: 1.55; }

    /* ============================================================
       MIND MAP
    ============================================================ */
    .mm-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
    }
    .mm-controls {
        display: flex; gap: 6px; padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-2);
        align-items: center;
        flex-wrap: wrap;
    }
    .mm-controls span { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }
    .mm-svg-area {
        width: 100%; overflow: auto; cursor: grab;
        background: radial-gradient(ellipse at center, var(--surface-2) 0%, var(--surface) 70%);
    }
    .mm-svg-area:active { cursor: grabbing; }
    .mm-info {
        padding: 12px 16px;
        background: var(--surface-2);
        border-top: 1px solid var(--border);
        font-size: 0.875rem;
        min-height: 58px;
        line-height: 1.55;
        color: var(--text-dim);
        transition: all 0.2s;
    }
    .mm-node { cursor: pointer; transition: opacity 0.2s; }
    .mm-node:hover { opacity: 0.85; }

    /* ============================================================
       COMMANDS CHEAT SHEET
    ============================================================ */
    .cs-section { margin-bottom: 1.5rem; }
    .cs-heading {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.85rem; font-weight: 700;
        color: var(--accent); text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 6px 0; margin-bottom: 8px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px;
    }
    .cs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
        gap: 5px;
    }
    .cs-item {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 11px;
        transition: border-color 0.15s;
        cursor: default;
    }
    .cs-item:hover { border-color: var(--border-2); }
    .cs-cmd  { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent); font-weight: 600; word-break: break-all; }
    .cs-desc { font-size: 0.74rem; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }

    /* ============================================================
       QUIZ
    ============================================================ */
    .quiz-q {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.15rem; font-weight: 600;
        color: var(--text-bright);
        line-height: 1.45; margin-bottom: 1.1rem;
    }
    .q-opt {
        background: var(--surface-2);
        border: 2px solid var(--border-2);
        border-radius: 10px;
        padding: 11px 15px;
        margin: 7px 0;
        cursor: pointer;
        transition: all 0.18s;
        font-size: 0.875rem;
        display: flex; align-items: center; gap: 10px;
    }
    .q-opt:hover { border-color: var(--accent); background: var(--surface-3); }

<h3>The Origin Story</h3>
<p>In 1991, a 21-year-old Finnish student named <strong>Linus Torvalds</strong> posted this message online: <em>"I'm doing a (free) operating system (just a hobby, won't be big and professional like GNU) for 386(486) AT clones."</em> That hobby became the most important software in human history.</p>
<p>Today Linux powers <strong>96% of the world's top web servers</strong>, every Android device, the International Space Station, CERN's particle accelerators, Tesla cars, and most of the internet's core infrastructure. If you've ever used Google, Facebook, Amazon, or YouTube — you used Linux.</p>

<h3>How a Computer Boots — Step by Step</h3>
<p>Understanding boot order is fundamental. When you press the power button, this exact sequence happens:</p>
<ol>
    <li><strong>BIOS/UEFI</strong> — Firmware burned into the motherboard. Does a POST (Power-On Self Test), finds the boot device.</li>
    <li><strong>Bootloader (GRUB)</strong> — The Grand Unified Bootloader. Loads from the MBR or EFI partition. Presents OS choice menu. Loads the kernel into RAM.</li>
    <li><strong>Kernel</strong> — Takes control. Initializes hardware drivers, mounts the root filesystem, starts the init process.</li>
    <li><strong>Init / systemd</strong> — PID 1. The ancestor of all processes. Starts all system services (networking, login, display).</li>
    <li><strong>Shell / Desktop</strong> — You get a login prompt or GUI. The system is ready.</li>
</ol>
<div class="tip-box">Run <code>systemd-analyze blame</code> to see exactly which service took the longest to start at boot — great for diagnosing slow boot times.</div>

<h3>The Three Core Layers</h3>
<ul>
    <li><strong>Kernel</strong> — The absolute core. Written in C. Talks directly to hardware: CPU scheduling, RAM management, disk I/O, network packets. You never touch it directly. It lives at <code>/boot/vmlinuz-*</code>.</li>
    <li><strong>Shell</strong> — The command interpreter. Translates what you type into system calls the kernel understands. <strong>Bash</strong> (Bourne Again Shell) is the most common. Others: zsh, fish, dash.</li>
    <li><strong>GNU Utilities</strong> — The tools (ls, grep, cp, awk, sed). GNU provides most user-space tools. Together with the kernel, it's called <strong>GNU/Linux</strong>.</li>
</ul>
<div class="info-box">Linux is technically <em>just the kernel</em>. The full OS is GNU/Linux. When people say "Linux", they usually mean the whole system. Richard Stallman started GNU in 1983; Torvalds provided the missing kernel piece in 1991.</div>

<h3>Major Linux Distributions</h3>
<p>A <strong>distribution (distro)</strong> packages the Linux kernel + GNU tools + a package manager + apps into an installable OS. The major families:</p>
<ul>
    <li>🟠 <strong>Debian / Ubuntu</strong> — Most popular family. Beginner-friendly. Package manager: <code>apt</code>. Stable releases. Ubuntu is derived from Debian.</li>
    <li>🔴 <strong>Red Hat / CentOS / Fedora / Rocky Linux</strong> — Enterprise-focused. Package manager: <code>dnf</code> (formerly <code>yum</code>). RHEL is the gold standard in corporations.</li>
    <li>🔵 <strong>Arch Linux / Manjaro</strong> — Advanced, minimal, rolling release. You build it yourself. Package manager: <code>pacman</code>. Forces deep learning.</li>
    <li>🟢 <strong>Kali Linux</strong> — Penetration testing distro. 600+ security tools pre-installed. Based on Debian. Used by ethical hackers worldwide.</li>
    <li>⚪ <strong>Alpine Linux</strong> — Extremely minimal (5MB). Used inside Docker containers everywhere.</li>

<h3>Why Professionals Choose Linux</h3>

<p>In Linux, <strong>everything is treated as a file</strong>. Your hard drive (<code>/dev/sda</code>) is a file. Your keyboard input (<code>/dev/stdin</code>) is a file. Running processes (<code>/proc/1234/</code>) are files. Network connections are files. This unified model is the foundation of Linux's power and simplicity.</p>

<h3>Critical /etc Files Every Admin Knows</h3>

<pre><code>cat file.txt           # Print entire file to terminal
less file.txt          # Paginated viewer — arrow keys, / to search, q to quit
more file.txt          # Simpler paginator (older, less features)
head -n 20 file.txt    # First 20 lines
tail -n 20 file.txt    # Last 20 lines
tail -f /var/log/syslog  # FOLLOW mode — stream new lines as they appear
tac file.txt           # Print file in reverse line order</code></pre>
<div class="tip-box"><code>tail -f</code> is essential for monitoring logs in real time. Press Ctrl+C to stop.</div>

<h3>The Pipe — Linux's Most Powerful Idea</h3>
<p>The <strong>pipe operator <code>|</code></strong> sends the output of one command directly as input to the next. This lets you chain simple tools into powerful operations.</p>
<pre><code># Count how many lines contain "error"
cat /var/log/syslog | grep "error" | wc -l

# Find the top 5 largest processes
ps aux | sort -rk 3 | head -5

# Get unique IP addresses from a log file
cat access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -20

# Monitor only new SSH failures as they happen
tail -f /var/log/auth.log | grep "Failed"</code></pre>

<h3>grep — Search Text Like a Pro</h3>
<pre><code>grep "word" file.txt        # Search for "word" in file
grep -i "word" file.txt     # Case-insensitive search
grep -r "word" /etc/        # Recursive search in directory
grep -n "word" file.txt     # Show line numbers
grep -v "word" file.txt     # Invert: show lines WITHOUT "word"
grep -c "word" file.txt     # Count matching lines
grep -l "word" /etc/*.conf  # List only filenames that match
grep -A 3 "error" log.txt   # Show 3 lines AFTER each match
grep -B 3 "error" log.txt   # Show 3 lines BEFORE each match
grep -E "error|fail|warn" log.txt  # Extended regex: multiple patterns
grep -o "pattern" file.txt  # Print ONLY the matching text, not the full line</code></pre>

<h3>sed — Stream Editor (Find & Replace)</h3>
<pre><code>sed 's/old/new/' file.txt           # Replace first occurrence per line
sed 's/old/new/g' file.txt          # Replace ALL occurrences (global)
sed -i 's/old/new/g' file.txt       # Edit file IN-PLACE (modifies the file!)
sed -n '5,10p' file.txt             # Print only lines 5 to 10
sed '/pattern/d' file.txt           # Delete lines matching pattern
sed 's/^/    /' file.txt            # Add 4 spaces to start of every line
sed 's/ *$//' file.txt              # Remove trailing whitespace</code></pre>
<div class="warn-box"><code>sed -i</code> modifies the original file directly. Make a backup first: <code>cp file.txt file.txt.bak</code></div>

<h3>awk — Row and Column Processing</h3>
<p><code>awk</code> processes text column by column. Fields are split by whitespace by default. <code>$1</code> is column 1, <code>$2</code> is column 2, <code>$NF</code> is the last column.</p>
<pre><code>awk '{print $1}' file.txt           # Print only the first column
awk '{print $1, $3}' file.txt       # Print columns 1 and 3
awk -F: '{print $1}' /etc/passwd    # Use : as delimiter — print usernames
awk '{sum += $3} END {print sum}' data.txt  # Sum column 3
awk '$3 > 100 {print $1, $3}' data.txt     # Print rows where col 3 > 100
awk 'NR==5' file.txt                # Print only line 5
ps aux | awk '{print $1, $2, $11}' # User, PID, command from ps</code></pre>

<h3>sort, uniq, wc — Count & Organize</h3>
<pre><code>sort file.txt                # Alphabetical sort
sort -r file.txt             # Reverse sort
sort -n numbers.txt          # Numeric sort
sort -k2 file.txt            # Sort by second column
sort -u file.txt             # Sort and remove duplicates

uniq file.txt                # Remove ADJACENT duplicate lines
uniq -c file.txt             # Count occurrences of each line
uniq -d file.txt             # Show only duplicate lines

wc file.txt                  # Lines, words, bytes (all three)
wc -l file.txt               # Count lines only
wc -w file.txt               # Count words only</code></pre>

<h3>cut, tr, xargs — More Essentials</h3>
<pre><code>cut -d: -f1 /etc/passwd      # Cut field 1 using : as delimiter
cut -c1-10 file.txt          # Characters 1-10 from each line
tr 'a-z' 'A-Z' &lt; file.txt   # Translate: lowercase to uppercase
tr -d '\n' &lt; file.txt        # Delete all newlines
cat files.txt | xargs rm    # Execute rm on each line of files.txt</code></pre>

<h3>Redirection — Input and Output Control</h3>
<pre><code>command > file.txt           # Redirect stdout to file (OVERWRITE)
command >> file.txt          # Redirect stdout to file (APPEND)
command 2> errors.txt        # Redirect stderr (errors only)
command &> all.txt           # Redirect both stdout and stderr
command &gt;&amp;2                 # Redirect stdout to stderr
command &lt; input.txt          # Use file as stdin
command 2>/dev/null          # Silence all errors
command | tee file.txt       # Print to terminal AND write to file</code></pre>

    content:`
<h3>Users and Identity</h3>
<p>Every process and file in Linux is owned by a <strong>user</strong> and a <strong>group</strong>. Users have a unique <strong>UID</strong> (User ID). Root always has UID 0. System accounts use UIDs 1–999. Regular users start at 1000.</p>
<pre><code>whoami            # Your current username
id                # Your UID, GID, and all group memberships
id alice          # Check another user's identity
who               # Who is currently logged in (from which terminal)
w                 # Detailed: logged-in users + what they're doing
last              # Login history (from /var/log/wtmp)
lastfail          # Failed login attempts
finger alice      # User info (if finger is installed)</code></pre>

<h3>Managing Users and Groups</h3>
<pre><code># Create users
useradd -m -s /bin/bash alice     # Create user with home dir and bash shell
useradd -m -G sudo alice          # Create user and add to sudo group
passwd alice                      # Set password for alice

# Modify users
usermod -aG docker alice          # Add alice to the docker group (-a = append)
usermod -s /bin/zsh alice         # Change alice's shell to zsh
usermod -l newname oldname        # Rename a user account
usermod -L alice                  # Lock the account (disable login)
usermod -U alice                  # Unlock the account

# Delete users
userdel alice                     # Delete user (keeps home dir)
userdel -r alice                  # Delete user AND home directory

# Groups
groupadd developers               # Create a group
groupdel developers               # Delete a group
groups alice                      # Show which groups alice belongs to
cat /etc/group | grep alice       # Same, from the file</code></pre>

<h3>Understanding Permissions — The Permission String</h3>
<p>Run <code>ls -l</code> and you see: <code>-rwxr-xr--</code></p>
<pre><code> [type][owner][group][others]
    -    rwx    r-x    r--

Position 1:  - = file, d = directory, l = symbolic link
Positions 2-4:  Owner permissions (rwx)
Positions 5-7:  Group permissions (r-x)
Positions 8-10: Others permissions (r--)

r = read    (4)
w = write   (2)
x = execute (1)</code></pre>

<h3>chmod — Changing Permissions</h3>
<p>Two methods: <strong>symbolic</strong> (human-readable) and <strong>octal</strong> (numeric).</p>
<pre><code># Symbolic mode
chmod u+x script.sh       # Add execute for owner (u=user/owner)
chmod g-w file.txt        # Remove write for group
chmod o+r file.txt        # Add read for others
chmod a+x script.sh       # Add execute for ALL (a=all)
chmod u=rwx,g=rx,o=r f.txt # Set exact permissions symbolically

# Octal mode (add the values: r=4, w=2, x=1)
chmod 755 script.sh       # rwxr-xr-x  — standard executable
chmod 644 file.txt        # rw-r--r--  — standard file
chmod 700 private/        # rwx------  — only owner
chmod 600 id_rsa          # rw-------  — SSH private key (MUST be this)
chmod 777 public/         # rwxrwxrwx  — everyone (dangerous!)
chmod 000 locked.txt      # ---------- — nobody can access

# Recursive
chmod -R 755 webroot/     # Apply 755 to directory and all contents</code></pre>

<h3>Special Permission Bits</h3>
<ul>
    <li><strong>SUID (4)</strong> — Set User ID. When an executable with SUID runs, it runs AS its owner (often root), not as the person who launched it. Example: <code>/usr/bin/passwd</code> needs root to write /etc/shadow but any user can run it. <em>This is a top privilege escalation target.</em></li>
    <li><strong>SGID (2)</strong> — Set Group ID. On a file: runs as the file's group. On a directory: new files inherit the directory's group.</li>
    <li><strong>Sticky Bit (1)</strong> — On a directory: only the file owner can delete their own files. Set on <code>/tmp</code> so users can't delete each other's temp files.</li>
</ul>
<pre><code>chmod 4755 binary         # SUID: rws-r-xr-x
chmod 2755 directory/     # SGID: rwxr-sr-x
chmod 1777 /tmp           # Sticky: rwxrwxrwt
ls -l /tmp                # See the 't' at end (sticky)
find / -perm /4000 -type f 2>/dev/null  # Find all SUID binaries (security audit)</code></pre>

<h3>chown — Changing Ownership</h3>
<pre><code>chown alice file.txt          # Change owner to alice
chown alice:devs file.txt     # Change owner to alice, group to devs
chown -R www-data /var/www/   # Recursively change to www-data (web server)
chgrp devs file.txt           # Change only the group</code></pre>

<h3>sudo — Controlled Root Access</h3>
<p>Never work as root directly. Use <code>sudo</code> for individual commands that need elevated privileges. Sudo logs every command to <code>/var/log/auth.log</code>.</p>
<pre><code>sudo command              # Run command as root
sudo -u alice command     # Run command as another user
sudo -i                   # Start interactive root shell (be careful!)
sudo -l                   # List what you're allowed to sudo
visudo                    # Safely edit /etc/sudoers (ALWAYS use this)

# /etc/sudoers examples:
# alice ALL=(ALL:ALL) ALL     — alice can sudo everything
# %sudo ALL=(ALL) NOPASSWD:ALL — sudo group, no password needed</code></pre>
<div class="warn-box">Never edit /etc/sudoers directly with a text editor. Always use <code>visudo</code> — it validates syntax before saving, preventing lockouts.</div>
<div class="tip-box">The <code>umask</code> value determines default permissions for new files. <code>umask 022</code> means new files get 644 (666-022) and directories get 755 (777-022). Check with: <code>umask</code></div>
    `,

        { cmd:'chmod 600 ~/.ssh/id_rsa',  desc:'Secure private key (required by SSH)' },
        { cmd:'chown -R user:group dir/', desc:'Recursive ownership change' },
        { cmd:'useradd -m -s /bin/bash user', desc:'Create user with home and bash shell' },
        { cmd:'usermod -aG sudo user',    desc:'Add user to sudo group' },
        { cmd:'find / -perm /4000',       desc:'Find SUID binaries (privilege escalation check)' },
        { cmd:'last',                     desc:'Login history from /var/log/wtmp' },
        { cmd:'visudo',                   desc:'Safely edit sudoers file' },
    ]
},

<h3>What is a Process?</h3>
<p>Every running program is a <strong>process</strong> with a unique <strong>PID</strong> (Process ID). When you run a command, the shell <em>forks</em> itself, creating a child process. The very first process (PID 1) is <strong>systemd</strong> on modern Linux — the parent of all other processes.</p>
<pre><code>ps               # Your current shell's processes
ps aux           # ALL processes from ALL users (complete view)
ps -ef           # Another format: UID, PID, PPID, command
ps aux | grep nginx     # Find if nginx is running

<h3>top and htop — Live Process Monitors</h3>
<pre><code>top              # Live updating process list
# Inside top:
# k = kill a process (enter PID)
# r = renice (change priority)
# M = sort by memory
# P = sort by CPU
# q = quit

htop             # Better version (install: sudo apt install htop)
# htop supports mouse clicks, color, F-keys for actions</code></pre>

<h3>Signals — Controlling Processes</h3>
<p>You communicate with processes by sending <strong>signals</strong>. Each signal has a number and a name:</p>
<pre><code>kill -l                      # List all available signals
kill PID                     # Send SIGTERM (15) — polite: "please stop"
kill -9 PID                  # Send SIGKILL   — force immediate termination
kill -HUP PID                # SIGHUP (1) — reload config (graceful restart)
kill -STOP PID               # Pause the process
kill -CONT PID               # Resume a paused process
killall nginx                # Kill all processes named "nginx"
pkill -u alice               # Kill all processes owned by alice</code></pre>
<div class="tip-box"><code>kill -9</code> is the "nuclear option." The process has no chance to clean up. Try <code>kill PID</code> (SIGTERM) first and give it a few seconds.</div>

<h3>Jobs — Background & Foreground</h3>
<pre><code>command &              # Run command in the BACKGROUND
jobs                   # List background jobs
fg %1                  # Bring job 1 to foreground
bg %1                  # Send job 1 to background
Ctrl+Z                 # Suspend current foreground process
Ctrl+C                 # Terminate current foreground process

disown %1              # Detach job 1 from shell (won't die on logout)</code></pre>

<p>Nice value ranges from <strong>-20 (highest priority)</strong> to <strong>19 (lowest priority)</strong>. Only root can set negative (high priority) values.</p>

systemctl stop nginx          # Stop a service
systemctl restart nginx       # Stop and start
systemctl reload nginx        # Reload config without stopping
systemctl enable nginx        # Auto-start on boot
systemctl disable nginx       # Don't auto-start on boot
systemctl status nginx        # Detailed status + last log lines
systemctl is-active nginx     # Returns "active" or "inactive"

systemctl --failed            # Show failed units (good for debugging)

journalctl -xe                # Show recent system logs with explanations
journalctl -u nginx           # Logs for just the nginx service
journalctl -f                 # Follow live system logs (like tail -f)
journalctl --since "1 hour ago"  # Logs from the last hour
journalctl -p err             # Only error-level and above</code></pre>

<h3>Memory and Disk</h3>
<pre><code>free -h              # RAM and swap usage (human readable)
vmstat 1 5           # Memory/CPU stats every 1 second, 5 times
df -h                # Disk usage of all filesystems

lsof -p 1234         # Files open by process 1234

<h3>Why Script?</h3>
<p>Anything you type more than twice, automate. Shell scripts are the glue of Linux — they chain commands, make decisions, loop over files, and run on schedules. A good sysadmin writes scripts; a great one writes scripts that write scripts.</p>

<h3>Your First Script</h3>
<pre><code>#!/bin/bash

echo "System uptime: $(uptime -p)"</code></pre>
<p>Save as <code>hello.sh</code>, then:</p>
<pre><code>chmod +x hello.sh   # Make it executable
./hello.sh          # Run it
bash hello.sh       # Alternative: run without making executable</code></pre>

<h3>Variables</h3>
<pre><code>NAME="Alice"              # Assign (no spaces around =)
echo "Hello, $NAME"       # Use with $
echo "Hello, \${NAME}!"    # Curly braces for clarity

# Command substitution
DATE=$(date +%Y-%m-%d)    # Store command output in variable
FILES=$(ls -la | wc -l)

# Special variables
$0   # Script name
$1   # First argument
$2   # Second argument
$@   # All arguments as separate words
$#   # Number of arguments
$?   # Exit code of last command (0=success, non-zero=error)
$$   # Current script's PID
$!   # PID of last background command</code></pre>

<h3>Conditionals — if/elif/else</h3>
<pre><code>#!/bin/bash
if [ -f "/etc/passwd" ]; then
    echo "File exists"
elif [ -d "/etc/passwd" ]; then
    echo "It's a directory"
else
    echo "Not found"
fi

# Common test conditions
[ -f file ]     # File exists and is a regular file
[ -d dir ]      # Directory exists
[ -e path ]     # Any file/dir exists
[ -r file ]     # File is readable
[ -w file ]     # File is writable
[ -x file ]     # File is executable
[ -z "$VAR" ]   # String is empty
[ -n "$VAR" ]   # String is NOT empty
[ "$A" = "$B" ] # Strings are equal
[ "$A" != "$B"] # Strings are NOT equal
[ $N -eq 5 ]    # Numbers are equal
[ $N -gt 5 ]    # Greater than
[ $N -lt 5 ]    # Less than
[ $N -ge 5 ]    # Greater than or equal
[ $N -le 5 ]    # Less than or equal</code></pre>

<h3>Loops</h3>
<pre><code># For loop — iterate over items
for i in 1 2 3 4 5; do
    echo "Number: $i"
done

# For loop — over a range
for i in {1..10}; do
    echo "Counting: $i"
done

# For loop — over files
for file in /var/log/*.log; do
    echo "Processing: $file"
    wc -l "$file"
done

# While loop
COUNT=0
while [ $COUNT -lt 5 ]; do
    echo "Count: $COUNT"
    COUNT=$((COUNT + 1))
done

# Read lines from a file
while IFS= read -r line; do
    echo "Line: $line"
done &lt; /etc/hosts

# C-style for loop
for ((i=0; i&lt;10; i++)); do
    echo $i
done</code></pre>

<h3>Functions</h3>
<pre><code>#!/bin/bash
# Define a function
greet() {
    local NAME=$1          # local = only visible inside function
    echo "Hello, $NAME!"
    return 0               # Return exit code
}

# Call it
greet "Alice"
greet "Bob"

# Function with error handling
check_root() {
    if [ "$(id -u)" -ne 0 ]; then
        echo "ERROR: This script must be run as root" >&2
        exit 1
    fi
}

# Call early in your script
check_root</code></pre>

<h3>Input and Error Handling</h3>
<pre><code># Read user input
echo -n "Enter your name: "
read USERNAME
echo "Welcome, $USERNAME"

# Command line arguments
./script.sh arg1 arg2 arg3
echo "First arg: $1"
echo "All args: $@"

# Exit on error — IMPORTANT for safe scripts!
set -e            # Exit immediately if any command fails
set -u            # Treat unset variables as errors
set -o pipefail   # Catch errors in pipes too
set -euo pipefail # Combine all three (best practice)

# Check exit codes manually
if ! cp file.txt /backup/; then
    echo "Backup failed!" >&2
    exit 1
fi</code></pre>
<div class="tip-box">Always start production scripts with <code>set -euo pipefail</code>. It makes scripts exit on ANY error, treating unset variables as errors, and catching failures in pipes. This prevents silent data corruption.</div>

<h3>Cron — Scheduling Tasks</h3>
<p>Cron runs commands on a schedule. Edit your crontab with <code>crontab -e</code>. The format is: <code>minute hour day month weekday command</code></p>
<pre><code># Cron format:
# ┌─── minute (0-59)
# │ ┌─── hour (0-23)
# │ │ ┌─── day of month (1-31)
# │ │ │ ┌─── month (1-12)
# │ │ │ │ ┌─── day of week (0-7, 0&7=Sunday)
# │ │ │ │ │
# * * * * *  command

0 2 * * *    /opt/backup.sh           # 2 AM daily
*/5 * * * *  /usr/local/bin/check.sh  # Every 5 minutes
0 9 * * 1    /opt/weekly_report.sh    # Every Monday at 9 AM
0 0 1 * *    /opt/monthly.sh          # 1st of each month at midnight
@reboot      /opt/startup.sh          # On every system boot

crontab -l        # List your current crontab
crontab -e        # Edit your crontab
crontab -r        # Remove your entire crontab (careful!)
crontab -l -u alice  # List alice's crontab (as root)</code></pre>

<h3>The Security Mindset</h3>
<p>Security is not a product — it's a process. Every default installation is designed for convenience, not security. <strong>Hardening</strong> is the process of reducing the attack surface by removing unnecessary services, restricting access, and monitoring for anomalies.</p>

<h3>Principle of Least Privilege</h3>
<p>Every user, process, and service should have <strong>only the permissions it absolutely needs</strong> — nothing more. This is the single most important security principle in Linux:</p>
<ul>
    <li>Run web servers as <code>www-data</code>, not root</li>
    <li>Give developers only the access they need for their job</li>
    <li>Disable root SSH login (<code>PermitRootLogin no</code>)</li>
    <li>Use <code>sudo</code> for individual commands, not permanent root sessions</li>
</ul>

<h3>SSH Hardening — Critical Configuration</h3>
<p>Edit <code>/etc/ssh/sshd_config</code> (then <code>systemctl restart sshd</code>):</p>
<pre><code># /etc/ssh/sshd_config — recommended security settings

Port 2222                    # Change from default port 22 (slows scanners)
PermitRootLogin no           # NEVER allow root login over SSH
PasswordAuthentication no    # Disable passwords — keys only
PubkeyAuthentication yes     # Enable key-based auth
AllowUsers alice bob         # Whitelist only specific users
MaxAuthTries 3               # 3 failed attempts = disconnect
LoginGraceTime 30            # 30 seconds to authenticate
ClientAliveInterval 300      # Drop idle sessions after 5 min
X11Forwarding no             # Disable GUI forwarding (if not needed)
AllowTcpForwarding no        # Disable port forwarding (if not needed)
Protocol 2                   # Always use SSH protocol 2</code></pre>
<div class="warn-box">Before disabling PasswordAuthentication, make absolutely sure your SSH key works. Test with a new terminal window while keeping your current session open.</div>

<h3>Fail2Ban — Automatic Attack Blocking</h3>
<p>Fail2ban scans log files and automatically bans IPs that show malicious signs (too many failed logins).</p>
<pre><code>sudo apt install fail2ban

# Config: /etc/fail2ban/jail.local
[DEFAULT]
bantime  = 3600     # Ban for 1 hour
findtime = 600      # Within 10 minutes
maxretry = 5        # 5 failed attempts = ban

[sshd]
enabled = true
port    = 2222      # Must match your SSH port

# Manage fail2ban
sudo fail2ban-client status sshd      # Check SSH jail status
sudo fail2ban-client status           # All jails
sudo fail2ban-client set sshd unbanip 1.2.3.4  # Unban an IP</code></pre>

<h3>Log Analysis for Security</h3>
<p>Logs are your security camera footage. Know where to look:</p>
<pre><code># Authentication logs (login attempts, sudo usage)
tail -f /var/log/auth.log                    # Debian/Ubuntu
tail -f /var/log/secure                      # RHEL/CentOS
journalctl -u sshd -f                        # SSH service logs

# Find failed SSH login attempts
grep "Failed password" /var/log/auth.log | tail -20
grep "Failed" /var/log/auth.log | awk '{print $11}' | sort | uniq -c | sort -rn

# Find successful logins
grep "Accepted password" /var/log/auth.log
grep "Accepted publickey" /var/log/auth.log

# Detect port scanning (many connections, quick)
grep "Connection closed" /var/log/auth.log | awk '{print $11}' | sort | uniq -c | sort -rn

# System logs
tail -f /var/log/syslog         # General system events
tail -f /var/log/kern.log       # Kernel messages (hardware, network)
dmesg | tail -20                # Ring buffer — recent kernel messages</code></pre>

<h3>File Integrity & Auditing</h3>
<pre><code># Find recently modified files (potential indicators of compromise)
find / -mtime -1 -type f 2>/dev/null     # Modified in last 24 hours
find /etc -newer /etc/passwd             # Files in /etc newer than passwd
find / -perm /4000 -type f 2>/dev/null  # All SUID binaries (audit regularly)
find / -perm /2000 -type f 2>/dev/null  # All SGID binaries
find / -nouser -type f 2>/dev/null      # Files with no owner (orphaned — suspicious)
find / -nogroup -type f 2>/dev/null     # Files with no group

# Check file hashes (verify integrity)
md5sum    /etc/passwd           # Generate MD5 hash
sha256sum /etc/passwd           # Generate SHA-256 hash (stronger)
sha256sum -c checksums.txt      # Verify files against stored hashes

# List all world-writable files (potential security risk)
find / -perm -o+w -type f 2>/dev/null | grep -v /proc</code></pre>

<h3>Network Security Posture</h3>
<pre><code># Check what's listening (attack surface audit)
ss -lntp            # All listening TCP ports with process names
ss -lnup            # All listening UDP ports

# View firewall rules
sudo ufw status verbose
sudo iptables -L -n -v   # Raw iptables rules

# Check for active connections (spot unauthorized access)
ss -antp            # All established TCP connections
who                 # Who is logged in right now
w                   # Detailed: what each logged-in user is doing
last -a | head -20  # Recent login history with hostname

# Audit user accounts
awk -F: '($3 == 0) {print}' /etc/passwd    # Accounts with UID 0 (should only be root!)
awk -F: '($7 == "/bin/bash") {print $1}' /etc/passwd  # Accounts with bash shell</code></pre>

<h3>System Updates — The Most Important Security Step</h3>
<pre><code># Ubuntu/Debian

sudo apt autoremove          # Remove orphaned packages

sudo dnf check-update        # Check for updates
sudo dnf update              # Apply updates

# Enable automatic security updates (Debian/Ubuntu)
sudo apt install unattended-upgrades
sudo dpkg-reconfigure --priority=low unattended-upgrades</code></pre>

</ul>
